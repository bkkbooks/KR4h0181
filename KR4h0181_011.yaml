body:
  text: 卷十一徐陵司空河東康簡王墓誌銘夫聖人至德天道福謙大哉堯舜貽慶長遠明兩之盛中陽纂於豢龍百世之祀皇家兆於鳴鳳違青丘於海北應紫蓋於江南帝系皇基重光累葉高祖之建天柱列聖之補地維蕩蕩乎民無得而名焉者也王資神昴緯託曜房靈體斯孝烈不由師保月生之對曾何用於擬議日近之言亦無階於等級封河東王加侍中淑貌與金燧相宜清顏與玉壺同照授使持節南徐州刺史武羗旅拒亭障遷移漠草非長廣之東湖萊近荊門之北王常譏庾翼使白面之非才深慕曹彰歎黃鬚之為可火精不退奚應善言水蛭難消徒持陰德薨于沙鎮時年一十有七追贈司空加鼓吹班劍謚曰康簡王洛北占墳河南除道葭悲煙殿之聲劍動豐城之氣豈惟晉王寵悼重琅邪之贈官魏后高文制蒼舒之哀誄藝文類聚四十五司空章昭達墓誌銘周原膴膴佳氣葱葱王業攸興帝圖斯盛在昔光武佐命鄰縣者鄧侯高祖元臣同郡者蕭相公台輔之量便著綺紈瑚璉之姿無待雕琢起家為東宮直前所奉之君則梁簡文皇帝既而黑山巨盜憑陵上國白水彊胡虔劉中夏公傾其產業募其驍雄思報皇儲累殲鯨寇屬豳風有象代邸方隆搜荊楚之英才資班輸之妙略百樓忽起登雲霄而俯臨萬弩俱張隨雷霆而並震揚兵於九天之上決勝於千里之中殪彼群兇皆無旋踵陳寶應志懷反叛客引周迪資其食力更事窺窬公奉詔崇朝飲冰將力前茅後勁步驟奔馳仍向甌閩殄其巢窟若夫鳴虵之洞深谷隱於蒼天飛猿之嶺喬樹參於雲日宜越艇而登嶠蒙燕犀而涉江威武紛紜震山風海於是咸俘偽帥悉據高墉爰洎滄溟莫不懲乂既而齊人無信將謀郢藩鬭艦戈船窺江淹漢公纔聞羽檄遽稟師期馳襲荊鄖應時燒蕩方欲宣威隴汧大討梁華屬上將之韜光逢中台之掩曜大建三年薨於軍幕爾乃青烏相墓白鶴標墳林有逃車樹同華蓋前旍熊軾後乘龍轜介士發三河之民哀鐃同駟馬之曲長安傳坐恩禮盛於西京襄陽墮淚悲慟喧於南峴藝文類聚四十七裴使君墓誌銘君五音之候兼其方牧八陣之圖窮其巧變用能戰必勝攻必取督稱無難兵號解煩朝飛火箭夜聳雲梯燧象從奔聯狼已合於是嚴顏不撓極咍諸戎龐德高聲肆言群逆胡夷總至猶持子路之纓鋒刃相交終荷溫生之節每以財輕篻籜義重嵩衡割宅字貧友之孤開門延故人之殯篤好朋遊居常滿席每至鮮雲藹藹披王安之衣明月團團似班姬之扇日帶花以如笑風鳴條而若歌傍列絲桐對揚文酒一石之後逾能斷獄五斗之量猶未解酲嗟乎潘岳之詩致哀周密莊公之誄用愍相遺藝文類聚五十丹陽上庸路碑在天成象咸池屬於五潢在地成形滄海環於四瀆國險者固其金湯儲蓄者因於轉漕貨財為禮專俟會通厥田為上皆資滲漉大矣哉坎德之為用也是以握圖之主財以利民御斗之君因之顯教上哉少昊初命水官逖矣高陽爰重冥職舜為太尉于是九澤載疏禹作司空然後百川咸導開華山於高掌鑿靈沼於周源莫匪神功皆由聖德我大梁之受天明命勞己濟民有道稱皇無為曰帝若夫雲雷草創翦商黜夏之勳鑄寶鼎於昆吾安能紀勒陳鴻鐘於酆岳豈易揄揚斯固名言之所絕也及乎膺斯寶運大拯橫流屈至道於汾陽勞凝神於藐射聖人作樂簫韶備以九成哲王盡禮春官總於三代豈止金門桴竹玉尺調鐘公帶獻明堂之圖匡衡建后土之議若斯而已矣天降丹鳥既序孝經河出應龍乃弘周易若夫固天將聖垂意藝文五色相宣八音繁會不移漏刻纔命口占御紙風飛天章海溢皆紫庭黃竹之詞晨露卿雲之藻漢之兩帝徒有詠歌魏之三祖空云詩賦以為彭老之教終沒愛河儒墨之宗方離火宅豈如五詩八會之殊文天上人中之妙典雪山羅漢爭造論門鷲嶺名僧俱傳經藏香象之力特所未勝秋兔之毫書而莫盡忠信為寶禱祈免於白駒明德惟馨山川舍於騂犢至如月離金虎泥染石牛薈蔚朝興滂沱晚注而清蹕纔動纖羅不搖高閈將臨油雲自闢陽烏馭日寧懼武賁之弓飛雨彌天無待期門之蓋震維舉德非曰尚年若發居酆猶莊在漢濤如白馬既礙廣陵之江山曰金牛孰辨梅湖之路專州典郡青鳧赤馬之船皇子天孫鳴鳳飛龍之乘莫不欣斯利涉玩此修渠乍擁揖而長歌乃樅金而鳴籟斯曠世之奇功無疆之鴻烈者也銘曰后王降德於眾兆民高文象緯妙義幾神業冠遷夏功踰入秦時惟大畜象及同人慧雨方霤禪枝獨春帝德惟厚皇恩甚深觀乎禹迹見我堯心藝文類聚六十四又初學記二十四有銘詞徐州刺史侯安都德政碑巖巖天柱大矣周山之峰桓桓地軸壯哉崑崙之阜三光懸而不墜九土鎮以無疆承乾合德之君則天體元之后所以並咨四鎮咸建五臣業配蒼祇功成㝢縣至於流名雅頌著美風詩年代悠然寂寥無紀其能繼茲歌詠者司空侯使君乎自文昭武穆祚土開家濮水盛其衣簪滎波分其緒秩仁義之道夷門美於大梁儒雅之風司徒重於強漢自通人許劭託命於江湖高士袁忠寄身於交越俱違建安之難獨處衡山之陽祖天資秀傑世載雄豪卓富擬於公侯班佃必於旌鼓父光祿大夫邑里開通德之門州鄉無抗禮之客自茫茫禹迹赫赫宗周家滅驪戎國亡夷羿我高祖武皇帝迎河圖於浪泊括地象於炎州南興涿鹿之師北問共工之罪天生宰輔堯年致白虎之祥神賜英賢殷帝感蒼龍之傑公亦觀時佇聖嘯咤風雲跪開黃石之書高詠玄池之野沈吟梁甫自比管仲之才惆悵莘郊久負伊生之歎自羯虜侵華群蠻縱軼衡皋桂部之地四戰五達之郊郡境賢豪將謀禦難長者僉論推公主盟義士雄民星羅霧集公既膺五聘方啟六韜率是驍徒仍開嶺嶠自大討瀟湘同茲樊酈下軍違命上策不宣敗我王師受拘勍盜大陳格於文祖咸秩具神率土依風群靈稟朔公亦忠為令德天纂之謀吳帳斯開衛門無擁雖復季孫還魯隨武濟河國慶民歡相儔匪若即授使持節開府儀同三司丹陽尹昔光武不尤於馮異穆公深禮於孟明終報王官之師遂舉咸陽之地斯乃聖主之宏略而名臣之遠圖者焉皇帝以陶唐啟國致玉版於河宗顓頊承家佐金天於江水經綸草昧定鼎之業居多締構權輿斷鼇之功相半固以英聲馳於海外信義感於寰中主器攸歸當璧斯在公於是抗表長信清宮未央從億兆以同心引公卿而定策馳輕軒於軨轕奉侍駕於中都七廟之基於焉永固萬邦之本由此克寧乃復進公司空南徐州刺史於是鎮之以清靜安之以惠和望杏敦耕瞻蒲勸穡室歌千耦家喜萬鍾陌上成陰桑中可詠春鶊始囀必具籠筐秋蟀載呤競鳴機杼或肅拜靈祀躬瞻舞雩去駕擁於風塵還旌阻於飄沐京坻歲積非勞楚堰之泉倉廩年豐無用秦渠之水雖復東過小縣夏雨逐其輕輪南渡滄江秋濤弭其張蓋固不得同年而語矣若夫聽採民訟昏曉必通召引軒櫺躬親辨決立授符於前案無留諾於後曹接務高城之中非異甘棠之下欣欣美俗濟濟都塵以賈琮郭賀之風行建武永平之化於是州民散騎常侍王瑒等拜表宮闕請揚茲美化樹彼高碑民欲天從允彰絲誥銘曰鬱鬱三象茫茫九州綿天慘沴浹地虔劉赫矣高祖爰清國讎元勳佐命力牧風后亦既旋歸邦家有暉宮亭蠡浦奮翅高飛電卷勍寇風行國威文身被髮作貢來綏我皇纂武攀號東序謁渭同周迎門唯呂流矢為暴攙搶斯舉惵惵蒼黎危危刀俎自我徂征妖氛克平爰驅犬彘實翦長鯨北震巢浦南俘灌城青羗卷介赤狄迴兵蹈舞難喻歌謠靡宣曰我黎庶俱祈上玄山移兩越海變三田公為上相復倍斯年藝文類聚五十二廣州刺史歐陽頠德政碑廣州刺史歐陽顧頠德政碑弱水導其洪源軒臺表其增殖懿哉少府師儲皇於二京盛矣司徒傳儒宗於九世廣陵邕邕族擅江右渤海赫赫名重洛陽若夫岳鎮龍蟠星懸鶉火衡山誕其高德湘水降其清輝千仞孤標萬頃無渡年當小學志冠成童因孝為心欲仁成體屯騎府君早棄榮祿易簀之日幾將毀終不杖之言深非通制遺貲巨萬富擬猗頓裁變槐榆竝賑宗戚南茨大麓北眺清湘得性於橘洲之間披書於杏壇之上三冬文史五經縱橫頻致嘉招確乎難拔既而帝啟黃樞神亡赤伏天地崩霣川冢沸騰群悍酋豪更為禍亂朝披羽檄夜炤爟烽浴鐵蔽於山原摐金駭於樓堞公疲兵屢出獨據胡床勍賊重圍尚凭書几揚灰既散駕棒將揮咸剋凶渠以保衡服常以二主蒙塵三光掩曜出入逾於嘗膽殷憂獨其撫心不治第宅深符去病志梟群醜彌同越石自禹珪既錫堯玉已傳物變謳謠風移笙管商周之際孤竹尚其哀歌曹劉之間蘇子猶其狂哭況番禺連帥實謂宗枝迷我天機自窺梁鼎以公威名本重逼統前軍乾數難違剝象終悔高祖永言惟舊彌念奇功即訓皇家深弘朝綱檻車才至輿櫬已焚祝史祅於夷吾壇場延於井伯綢繆安樂造次訏謀爰珥豐貂允光金蟪但八桂之土蠻夷不賓九疑之陽兵凶歲積以公昔在衡皋深留風愛仁恩可以懷猛獸威名可以懼啼兒乃授持節散騎常侍衡州刺史我皇帝從唐侯以胤國屈啟筮而登家一恭寶祚開定江沔三改璇衡包羅湘峽昔中宗屈申於處仲高祖遺恨於平城漢武承基方通沙塞晉明紹運裁平姑孰方其盛業綽有光前踐祚之初進公位征南將軍廣州刺史又都督東衡州二十州諸軍事宜公乃務是民天敦其分地火耕水耨彌亘原野賊盜皆偃工賈競臻鬻米商鹽盈衢滿肆新垣既築外戶無扃脂脯豪家鐘鼎為樂揚袪灑汗振雨流風市有千金之租田多萬箱之詠僧釋慧羨等來朝絳闕備啟丹誠乞於大路康莊式刊豐琰庶樊卿寶鼎復述台司之功羊叟高碑更紀征南之德於是跪開黃素爰登紫泥鑒此誠祈皆如所奏乃詔庸臣為其銘曰赫赫宗陳桓桓鼎臣千乘建學五典攸因盛德斯遠公門日新嵩高惟岳貺甫生申去衡移廣遷征自鎮悠悠銅界藐藐金鄰莫遠非督無思不賓三江靡浪五嶺奚塵式歌式舞仁哉至仁公其饗福於萬斯春藝文類聚五十二晉陵太守王厲德政碑若夫睢陵世傳已詳載德之華徐州先賢亦著清風之美偉哉文獻光啟中興郭莖表其深源何籌慚其遠慶豈惟桓氏之鳴玉張家之珥貂袁姓之朱衣楊宗之華轂又有佽飛遮列班弓夾門濯龍俯望緹騎盈道奕世如此何其盛哉君以藍田美玉大海明珠灼灼美其聲芳英英照其符彩風神雅淡識量寬和既有崔琰之鬚眉非無鄭玄之腰帶爛爛如高巖下電騷騷若長松裏風勢利無擾於胸襟行藏不概於懷抱家門雍睦孝友為風上交不謟下交不瀆脫貂救厄情靡矜吝釋馬窮途唯濟危殆至於網羅圖籍脂粉藝文學侶挹其精微詞宗稱其妙絕出為仁武將軍晉陵太守五雞二彘勤恤有方問羊知馬鉤距兼設濟北移樹累政之所未治汝南爭水連年之所無斷一朝明決曾不留滯四民商販咸用殷阜銘曰康哉寶運美矣良臣冑自澧水源於洛濱公侯世及宰輔相因曰我民秀山川降神風情穆穆孝友恂恂學則經笥文為世珍高風遠矣曠代難倫鼎鉉虛職台階未臻安知霜霰遽夭松椿碣石斯表民情既陳徒然下拜何報陽春藝文類聚五十二齊國宋司徒寺碑無色之外方為化城非想之中猶稱火宅若夫眾生無盡世界無窮芬若披蓮遠如散墨善財童子南行未窺目連沙門北遊不見一一剎土皆由業緣萬萬僧祇終非常樂天宮蹇產猶傾四大之風魔殿崔嵬終懼三災之火朱樓寶塔輝煥增華既義暢中土道流遐域顯默同歸華夷俱慕自枕石漱流始終一概悟智交養三十餘年春秋八十三古人云道存人亡法師之謂凡我門徒感風徽之緬邈傷諮悟之永滅敢以淺見揚德金石銘曰九流依真三乘歸佛道往絕跡慈還接物孰是發蒙昭我慧日攝亂以定闢邪以律秦皇雄感蔽理通情王孫偏解遠死滯生夫子之悟萬劫獨明寒暑迭易悲欣皋壤秋蓬四轉春鴻五響孤松獨秀德音長往節有推遷情無遺想藝文類聚七十六東陽雙林寺傅大士碑夫至人無己屈體申教聖人無名顯用藏跡故維摩詰降同長者之儀文殊師利或現儒生之像提河獻供之旅王城迾眾之端抑號居士時為善宿大經所說當轉法輪大品之言皆紹尊位斯則神通應化不可思議者乎東陽郡烏傷縣雙林寺傅大士者即其縣人也昔巖谿蘊德渭浦呈祥天賜殷宗誕興元相景侯佐命樊滕是埒介子揚名甘陳為伍東京世載西晉重光惟是良家降神攸託若如本生本行或示緣起子長子雲自敘元系則云補處菩薩仰嗣釋迦法王真子是號彌勒雖三會濟濟華林之道未孚千尺巖巖穰佉之化猶遠但分身世界濟度群生機有殊源應無恆質自敘因緣大宗如此按停水經云觀世音菩薩有五百身在此閻浮提地示同凡品教化眾生彌勒菩薩亦有五百身在閻浮提種種示現利益眾生故其本迹難得而詳言者也爾其烝烝大孝肅肅惟恭厥行以禮教為宗其言以忠信為本加以風神爽朗氣調清高流化親朋善和紛諍豈惟更盈毀壁宜僚下丸而已哉至于王戎吏部鄧禹司徒同此時年有懷棲遁仍隱居松山雙林寺棄捨恩愛非梁鴻之竝遊拜辭親老如蘇耽之永別自修禪遠豁絕粒長齋非服流霞若食朝沆太守王烋言其詭詐乃使邦佐幽諸後曹迄至兼旬曾無假食於是州鄉媿伏遠邇歸依逃迹山林肆行蘭若又自敘云七佛如來十方竝現釋尊摩頂願受深法每至楗槌應叩法鼓裁鳴空界神仙共來行道其外人所見者拳握之內或吐異香胸臆之間乍表金色時有信安縣比丘僧朔與其同類遠來觀化未及祗肅忽見大士身長丈餘朔等驚慚相趨禮拜虔恭既畢更覩常形又有比丘智勰優婆夷錢滿願等伏膺累載頻覩異儀或見腳長二尺指長五寸餘兩眼光明雙瞳照耀皆為金色竝若金錢譬李老而相侔同周文而等狀姜嫄所履天步可以為儔河流大屐神足宜其相比支郎之彥既恥黃精瞿曇之師有慚青目既而四空妙定熏脩已成八解明心莊嚴斯滿時還鄉黨化度鄉親俱識還源竝知迴向或立捨鬚髮如聞善來大傾財寶同脩淨福大士熏禪所憩獨在高巖爰挺嘉木是名檮樹擢本相對似雙槐於俠門合幹成陰類雙桐於空井厥體貞勁無爽大年置霜停雪寒暑葱翠信可以方諸堅固譬彼娑羅既見守於神龍將為疑於變鶴乃於山根嶺下創造伽藍因此高柯故名雙林寺矣大士亦還其里舍貨貿妻兒營締支提繕寫尊法嘗以聚沙畫地皆成圖果芥子菴羅無疑褊陋乃起九層塼塔形相巋然六時虔拜巡繞斯託又以大乘方等靈藥寶珠眷言山谷希得傳寫龍鄉思其曉照象駕乏其流通復造五時經典千有餘卷與夫鬻子而葬同其至誠嫁妻而隱無殊高節若寄搏麨如因賣花共指菩提方成親眷至于一相無相之懷虛己虛心之德化雞在臂方推理於自然毒蛇傷體終無擾於深定門徒肅肅學侶詵詵通被慈悲義無偏黨大通元年縣中長宿傅普通等一百人詣縣令范胥連名薦述又以中大通四年縣中豪傑傅德宣等道俗三百人詣縣令蕭詡具陳德業夫以連城之寶照廡之珍野老怪而相捐工人迷而不識胥等體有流俗才無鑒真亟欲騰開終成虧怠梁高祖武皇帝紹隆三寶弘濟四生迹冠優填神高仙豫夫以陳蕃靜室猶懷天下之心伊尹躬耕思弘聖王之道況我有慧日明炬如風寶車濟是沉舟能升彼岸固宜光宣正法影響人王者乎於是以中大通六年正月二十八日遣弟子傅暀出都致書高祖其辭曰雙林樹下當來解脫善慧大士白國主救世菩薩今條上中下善希能受持其上善以虛懷為本不著為宗妄想為因涅槃為果其中善以治身為本治國為宗天上人間果報安樂其下善以護養眾生勝殘去殺普令百姓俱稟六齋夫以四海之君萬邦之主預居王土莫不祗肅爾時國師智者法師與名德諸眾僧等言辭謹敬多乖釋迦之書文牒卑恭翻豫山公之啟大士年非長老位匪沙門通疏乘輿過無虔恪京都道俗莫不嗟疑暀至都投太樂令何昌並有弘誓誓在御路燒其左手以此因緣希當聞達昌以此書呈同泰寺僧皓法師師眾所知識名稱普聞見書隨喜勸以呈奏皇心懽悅遽遣招迎來謁宸闈亟論經典同泰寺前臨北闕密邇南宮仍請安居備諸資給後徙居鍾山之下定林寺遊巖倚樹宴坐經行京洛名僧學徒雲聚莫不提函負帙問慧諮禪居蔭高松臥依盤石於是四徹之中恆泫甘露六旬之內常雨天酒豈非神僊影響示現禎祥者乎帝於華林園重雲殿自開講三慧般若經窮須真之所問御法勝之高堂百千龍像圍繞餐聽黑貂朱紱王侯滿筵國華民秀公卿連席乃令大士獨榻對揚天扆并遣傳詔及宣傳左右四人接受言論爾時納揆之於臺內司隸之在殿中杜預還朝馬防親貴舊儀懸席皆等庶僚以大士絕世通人故加其殊禮矣及玉輦升殿雲蹕在階晏然箕坐曾不山立憲司譏問愈見凝跱但答云法地若動則一切法不安應對言語皆為爽異昔漢皇受道欒大不臣魏祖優賢楊叟如客河上之老輕舉臨於孝文臺下之人高尚加於光武方其古烈信可為儔帝又於壽光殿獨延大士講論玄賾言無重頌句備伽陀音會宮商義兼華藻豈惟寶積獻蓋文成七言釋子彈琴歌為千偈而已固非論經於白虎之殿應詔於金馬之門說義雲臺受釐宣室可同年而語哉自火運將終民無先覺雖復五胡內奰蒼鵝之兆未萌四海橫流夷羊之牧匪見大士天眼所照預覩未來摩掌之明夙鑒時禍哀群生之版蕩泣世道之崩淪救苦為懷大悲為病誓欲虛中閉氣識食為齋非服名香但資禪悅方乃燒其苦器製造華燈願以此一光明遍照十方佛土勸請調御常住世間救現在之兵災除當來之苦集於是學眾悲號山門踊叫弟子居士徐普拔潘普成等九人求輸己命願代宗師其中或馘耳而刊鼻或焚臂而燒手善財童子重覩知識忍辱仙人是馮相輩大士乃延其教化更住閻浮弘訓門人備行眾善於是弟子居士范難陀弟子比丘法曠弟子優婆夷嚴比丘各在山林燒身現滅次有比丘寶月等二人窮身繫索挂錠為燈次有比丘慧海菩提等八人燒指供養次有比丘尼曇展慧光法纖等四十九人行不食齋法次有比丘僧拔慧品等六十二人割耳出血用和名香奉依師教竝載在碑陰書其名品夫二儀大德所貴曰生六趣合靈所重唯命雖復夢幻影響同歸摩滅愛使迷情唯貪長久自非善巧方便漚和含羅照以慈燈沾其妙藥豈或捨不貲之軀而能行希有之事若令割身奉鬼聞半偈於涅槃賣髓祠天能供養於般若理當刳心靡吝擢骨無疑者乎大士小學之年不遊黌舍大成之德自通墳典安禪合掌說偈論經滴海未盡其辭懸河不窮其義前後講維摩思益經等比丘智瓚傳習受持所應度者化緣既畢以太建元年朱明始獻奄然右臥將歸大空二旬初滿三心是滅爾時隆暑便已赫曦屈伸如常溫暖無異洗浴究竟扶坐著衣色貌敷渝光彩鮮潔爰經信次宛如平生烏傷縣令陳鍾耆即往臨赴猶復反手傳香皆如疇昔若此神變無聞前古雖復青牛道士白馬先生便遁形骸本慚希企若其滅定無想彈指而石壁已開法王在殯申足而金棺猶啟非斯矣莫與為儔遺誡於雙林山頂如法燒身一分舍利起塔於冢一分舍利起塔在山又造彌勒像二軀置此雙塔莫移我眠床當取法猛上人織成彌勒像永安床上寄此尊儀以標形相也於是門徒巨痛遂爽遺言用震旦之常儀乘闍維之舊法四部皆集悲同白車七眾攀號哀踰青樹弟子比丘法璿菩提智瓚等以為伯陽之德貞桓紀於賴鄉仲尼之道高碑書於魯縣亦有揚雄弟子鄭玄門人俱述清猷載刊玄石於是祈聞兩觀冒涉三江爰降絲綸克成豐琰陵雖不敏夙仰高風輕課庸音乃為銘曰大矣權迹勞哉赴時或現商主聊為國師卑同巧匠屈示良醫猗歟開士類此難思當來解脫克紹迦維妙道猶祕機緣未適弗降雞頭寧開狼迹北地爰徙東山攸宅族貴泥陽宗分蘭石莫測其本徒觀其迹邈有蒲塞心冥世雄明宣苦苦妙鑒空空汲引三界行藏六通爰初隱逸宴處林叢食等餐露齋疑服風敬禮珍塔歸依靈像未若天尊躬臨方丈慧炬常照慈燈斯朗釋梵天仙晨昏來往濟濟行法洗洗談講德秀臧丈風高廣成來儀上國抗禮承明妙辯無相深言不生撞鐘比說擊鼓慚英樂論天口誰其與京乍現仙掌爰標神足色豔沈檀香踰薝蔔我有邊際隨機延促誓毀身城當開心獄忽示泡影俄如風燭噭噭門人承師若親寧焚軟疊弗燎香薪合窟為窆方墳以堙須彌據海變灰揚塵淨土無壤靈儀自真何時涌塔復覩令身藝文類聚七十六孝義寺碑臣聞道階八地猶見后妃願生千佛無匪聖賢汲引之義雖同隨機之感非一至如媯汭有禮皇源所以前興周女斯歸陳宗所以流慶大矣哉神基帝系淑聖重光者也慈訓太后德佐初九道暉上六居天上天中之極處太任太姒之尊蘋藻之化斯深葛覃之風彌遠皇帝膺茲上聖契彼援神愛敬在乎一人德教刑乎四海是以明星皎皎流半月之光甘露團團灑如飴之味嘉禾自秀浪井恆清天降徵祥日聞書府自大明紹運神武應期至道傍通無思不格戊己挍尉西關玉門伏波將軍南表銅柱方使三千世界百億須彌同望飛輪共稟玄德天嘉三年正月二十一日詔旨仰惟聖德方被兆民乃敕有司改東成里為孝義里昔岱山徙號重華著其受終德水移名秦人表其嘉運豈若盡在地輿書茲里門仰述天經光臨父母臣陵稽首乃作銘曰願此良因宜資貴親三乘竝策四梵為賓紺殿安坐蓮花養神燈前禮佛地後邊身竝濟含識咸歸至真國家隆盛同饗遐慶謹勒豐碑陳其舞詠藝文類聚七十七長干寺眾食碑昔炎皇肇訓稷正修官信矣民天之言誠哉國寶之義自非道登正覺安住於大般涅槃行在真空深入於無為般若則菩薩應化咸同色身諸佛淨土皆為揣食證常住者爰乞乳糜補尊位者猶假香飯亦有三心未滅七反餘生應會天宮就齎龍海況復𦅼居地轉咸憩珠庭固以皆種仙禾並資靈粟者矣法師常願以智慧火燒煩惱薪普施眾生同飡甘露況復安居自恣碩學高年或次第於王城猶栖遑於貧里迦留乞䴵苦用神通須提請飯致貽詞貴於是思營眾業願造坊廚庶使應供之僧皆同自然之食升堂濟濟無勞四輩之頻高廩峨峨恆有千食之備其外鐵市銅街青樓紫陌辛家黑白之里甲第王侯之門莫不供施相高資儲轉眾法師善巧方便漚和舍羅教授滋生隨年增長假使桑林不雨瓠水楊波猶厭稻梁永無饑乏加以五鹽具足七菜芳軟䴵類天廚果同香樹羹鼎之大殷王未逢糜鑊之深齊都非擬昆吾在次皆鳴鷲嶺之鐘暘谷初升同洗龍池之鉢藝文類聚七十七天台山館徐則法師碑夫海水揚塵幾千年而可見天衣拂石幾萬歲而應平至人者譬彼晨昏方乎晷刻固非俗士之所能言寰中之所能量者也至如不死之草猶稱南裔長生之樹尚挺西崑百紀遊龜皆登蓮葉千齡壽鶴或舞松枝假矣生民何其夭脆譬彼風電同諸泡沫琢火之歎聞諸往賢逝水之悲嗟乎前聖樵人看博信未始乎淹留仙客彈琴固不移於俄頃然而子孫皆其數世鄉黨咸為草萊是以志士名賢飄然長騖臊羶榮利懕穢風塵服冕乘軒其猶桎梏朱庭紫閣事甚籠樊隱淪巖洞飡餌芝髓忽矣身輕俄然羽化金繩玉版受謁帝之符龍駕霓裳處仙宮之籙法師蕭然道氣卓矣仙才千仞孤標萬頃無度所以伊川控鶴葉縣乘鳧靈化無方去還斯在銘曰來去三島賓遊二童然香雨上擊磬雲中玉粒雖軟金膏未鎔方流道業濟彼昏蒙藝文類聚七十八
