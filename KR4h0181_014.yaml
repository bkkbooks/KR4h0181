body:
  text: 沈炯歸魂賦并序歸魂賦并序古語稱收魂升極周易有歸魂卦屈原著招魂篇故知魂之可歸其日已久余自長安反乃作歸魂賦其辭曰伊吾人之陋宗資玄聖而云始肇邵閟之靈源分昌發之世祀實聞之乎家記又孚之于惇史亢宗貴而博古四史成乎一身怪日月之遼遠而承襲之相因豈少賤之能察非末學之知津也若夫風流退讓在秦作相越江以東惟戎及酆出忠出孝且卿且公世歷十五爰逮余躬值天地之幅裂遭日月之氛虹去父母之邦國埋形影于胡戎絶君臣而辭胥宇蹐厚地而局蒼穹抱北思之胡馬望南飛之夕鴻泣霑襟而雜露悲微吟而帶風昔休明之云始余播棄于天地自太學而遊承明出書生而從下吏身豫封禪之官名入南宮之記登玉墀之深眇出金門之崇邃受北狄之奉書禮東夷之獻使實不嘗至屈膝遜言以殊方降意嗟五十之踰年忽流離于凶忒值中軍之失權而大盜之移國何赤沴之四起豈黃霧之云塞祈瘦弟于赤眉乞老親于劇賊免伏質以解衣遂窘身而就勒既而天道禍淫否終斯泰靈聖奮發風雲饗會掃欃槍之星斬蚩尤之旆余扳逆而效從遂妻誅而子害雖分圭而祚土迄長河之如帶肌膚之痛何泯潛翳之悲無伏我國家之沸騰我天下之匡復我何辜于上玄我何負于鄰睦背盟書而我欺圖信神而我戮彼孟冬之云季總官司而就紲託馬首之西暮隨檻車而回轍履峨峨之層冰面飀飀之巖雪去莫敖之所縊過臨江之軌折矧今古之悲涼並攢心而霑袂渡狹石之敧危跨清津之幽咽鳥虛弓而自隕猿號子而腹裂歷沔漢之逶迤及楚郡之參差望隆中之大宅映峴首之沈碑既縲然而就鞅非造次之能窺至若高祖武皇帝之基天下也岐周景亳之地龜圖雀書之祕醒醉之歌味絶讓畔之田鱗次余既長于克民覺何從而掩泗洧水兮深且清宛水兮澄復明昔南陽之穰縣今百雉之都城我太宗之威武遏宛洧而陳兵百萬之虜俄成魚鱉千仞之阜倏似滄瀛雖德刑成于赦服故蠻狄震乎雄名乃尋浙而歷商遂經秦而至洛覺高蹈之清遠具風雲之倏爍其山也則嶔岑㠑嵬巖㟬婆陀或孤峰而秀聚或逸出而橫羅千歲之木生嶺表百丈之石枕溪阿其水則砰訇瀄汩或寬或疾繫萬瀨而相奔聚千流而同出何武關之狹隘而漢祖之英雄山萬里而仰雲雨水百仞而寫蜿虹若一夫而守隘豈萬衆之能攻去青泥而踰白鹿越渥水而到青門長卿之賦可想邵平之迹不存咄嗟驪山之阜惆悵灞陵之園文恭儉而無隙嬴發握其何言訪軹道之長組捨藍田之璵璠無故老之可訊並膴膴之空原登未央之北闕望長樂之基趾伊太后之所居築旗亭而成市槐路鬱以三條方塗坦而九軌觀阡陌之遺蹤實不乖乎前史傍直城而北轉臨橫門而左趨南則董卓之塢北則苻堅所居即二賊之墟壘為彼主之庭除終南巃嵸太一嵯峨九嵕堀起八壘連河汨涇泥之混濁盥渭渚之清波指咸陽而長望何趙李而經過息甘泉而避暑猶爽塏而清和爾乃背長夏涉素秋臥寒野坐林陬霜微凝而侵骨樹裁動而風遒思我親戚之顏貌寄夢寐而魂求察故鄉之安否但望斗而觀牛稚子夭于鄭谷勉勵愧乎延州聞愛妾之長叫引寒風而入楸何精靈以堪此乃縱酒以陶憂至誠可以感鬼秉信可以祈天何精殞而魄散忽魂歸而氣旋解龍驂而見送走郵驛于亭傳出向來之大道反初入之山川受繞朝之贈策報李陵之別篇淚未悲而自墮語未咽而無宣于時和風四起具物初榮草極野而舒翠花分叢而落英魚則潛波渙濯鳥則應嶺俱鳴隨六合之開朗與風雲而自輕其所涉也州則二雍三荊昌歡江并唐安淅落巴郢雲平其水則淮江漢洧隋浩汗灃潦滻潏河涇渭相亂或浮深而揭淺或淩波而沿岸每日夕而靡依常一步而三歎蠻蜒之與荊吳玄狄之與羌胡言語之所不通嗜欲之所不同莫不疊足斂手低眉曲躬豈論生平與意氣止望首丘于南風悲城邑之毀撤喜風水之渺揚既盡地而謁帝乃懷橘而升堂何神仙之足學此即雲衣而虹裳也藝文類聚七十九又二十七作魂歸賦有刪節幽庭賦矧幽庭之間趣具春物之芳華轉洞房而隱景偃飛閣而藏霞築山川于戶牖帶林苑于東家草纖纖而垂緑樹搔搔而落花于是秦人清歌趙女鼓筑嗟光景之遲暮詠群飛之棲宿顧留情于君子豈含姿于嬌淑于是起而長謠曰故年花落今復新新年一故成故人那得長繩繫白日年年月月但如春藝文類聚六十四為王僧辨等勸進梁元帝初表衆軍薄伐塗次九水即日獲臨城縣使人報稱侯景弒逆皇帝賊害太子宗室在寇庭者竝罹禍酷六軍慟哭三辰改曜哀我皇極四海崩心我大梁纂堯構緒基商啓祚太祖文皇帝徇齊作聖肇有六州高祖武皇帝聰明神武奄龕天下依日月而和四時履至尊而制六合麗正居貞大橫固祉四葉相係三聖同基蠢爾凶渠遂憑天邑閶闔受白登之辱象魏致堯城之疑雲扆承華一朝俱酷金楨玉幹莫不同冤悠悠彼蒼何其罔極臣聞喪君有君春秋之茂典以德以長先王之通訓少康則牧衆撫職祀夏所以配天平王則居正東遷宗周所以卜世漢光以能捕不道故景曆重昌中宗以不違群議故江東可立儔今考古更無二謀伏惟陛下至孝通幽英武靈斷當七九之厄而應千載之期啓殷憂之明而居百王之會取威定霸嶮阻艱難建社治兵載循古道家國之事一至于斯天祚大梁必將有主軒轅得姓存者二人高祖五王代實居長乘屈完而陳諸侯拜子武而服大輅功齊九有道濟生民非奉聖明誰嗣下武臣聞日月貞明太陽不可以闕照天地貞觀乾道不可以久惕黃屋左纛本為億兆而尊鸞輅龍章蓋以郊禋而貴寶器存乎至重介石慎于易差黔首豈可一日無主伏願陛下掃地升中柴天改物事迫凶危運鍾擾攘蓋不勞宗正奉詔博士擇時南面即可居尊西向無所讓德四方既知有奉八百始可同期殘寇潛居器藏社處乾象既傾坤儀已覆斬莽輗車燒卓照市廓清函夏正為塋陵開雪宮闈庶存鍾鼎彼黍離離伊何可言陛下繼明闡祚即宮舊楚左廟右社之制可以權宜五禮六樂之容歲時取備金芝九莖瓊茅三脊要衛率職尉候相望坐廟堂以朝四夷登靈臺而望雲物禪梁甫而封泰山臨東濱而禮日觀然後與三事大夫更謀都鄙左瀍右澗夾雒可以為居抗殿疏龍惟王可以在鎬何必勤勤建業也哉臣等不勝控款之至謹拜表以聞梁書元帝紀太清五年十月太宗崩侍中征東將軍開府儀同三司江州刺史尚書令長寧縣侯王僧辨奉箋藝文類聚十四以為沈炯作第二表紫宸曠位赤縣無主百靈聳動萬國回皇雖醉醒相扶同歸景亳式歌且誦總赴唐郊猶懼陛下俯首潸然讓德不嗣傳車在道方慎宋昌之謀法駕已陳尚杜耿純之勸嶽牧翹首天民纍息臣聞星回日薄擊雷鞭電者之謂天嶽立川流吐霧蒸雲者之謂地苞天地之混成洞陰陽之不測而以裁成萬物者其在聖人乎故云天地之大德曰生聖人之大寶曰位黃屋廟堂之下本非獲已而居明鏡四衢之樽蓋由應物取訓伏惟陛下稽古文思英雄特達比以周旦則文王之子方之放勳則帝摯之季千年旦暮可不在斯庭闕湮亡鍾鼎淪覆嗣膺景曆非陛下而誰豈可使赤眉更立盆子隗囂託置高廟陛下方復從容高讓用執謙光展其矯行僞書誣罔正朔見機而作斷可識矣匪疑何卜無待蓍龜日者公卿失馭禍纏霄極侯景憑陵姦臣互起率戎伐潁無處不然勸明誅晉側足皆爾刁斗夜鳴烽火相照中朝人士相顧銜悲涼州義徒東望殞涕惵惵黔首將欲安歸陛下英略緯天沈明內斷橫劍泣血枕戈嘗膽農山圯下之策金匱玉鼎之謀莫不定算扆帷決勝千里擊靈鼉之鼓而建翠華之旗驅六州之兵而總九伯之伐四方雖虞一戰以霸斬其鯨鯢既章大戮何校滅耳莫匪姦回史不絶書府無虛月自洞庭安波彭蠡底定文昭武穆芳若椒蘭敵國降城和如親戚九服同謀百道俱進國恥家怨計期就雪社稷不墜緊在聖明今也何時而申帝啓之避凶危若此方陳泰伯之辭國有具臣誰敢奉詔天下者高祖之天下陛下者萬國之歡心萬國豈可無君高祖豈可廢祀即日五星夜聚八風通吹雲煙紛郁日月光華百官象物而動軍政不戒而備飛艫巨艦竟水浮川鐵馬銀鞍陵山跨谷英傑接踵忠勇相顧湛宗族以酬恩焚妻子以報主莫不覆楯銜威提斧擊衆風飛電耀志滅凶醜所待陛下昭告后土虔奉上帝廣發明詔師出以名五行夕返六軍曉進便當盡司寇之威窮蚩尤之伐執石趙而求璽斬姚秦而取鐘修掃塋陵奉近宗廟陛下豈得不仰存國計俯從民請漢宣嗣位之後即遣蒲類之軍光武登極既竟始有長安之捷由此言之不無前準臣等或世受朝恩或身荷重遇同休等戚自國刑家苟有腹心敢以死奪不任慺慺之至謹重奉表以聞梁書元帝紀藝文類聚十四第三表臣僧辨等言衆軍以今月戊子總集建康賊景鳥伏獸窮頻擊頻挫姦竭詐盡深溝自固臣等分勒武旅百道同趣突騎短兵犀函鐵楯結隊千群持戟百萬止紂七步圍項三重轟然大潰群凶四滅京師少長俱稱萬歲長安酒食于此價高九縣雲開六合清朗矧伊黔首誰不載躍伏惟陛下咀痛茹哀嬰憤忍酷自紫庭絳闕胡塵四起壖垣好畤冀馬雲屯泣血治兵嘗膽誓衆而吳楚一家方與七國俱反管蔡流言又以三監作亂西涼義衆阻強秦而不通并州遺民跨飛狐而見泯豺狼當路非止一人鯨鯢不梟倏焉五載英武克振怨恥竝雪永尋霜露如何可言臣等輒依故實奉修社廟使者持節分告塋陵嗣后升遐龍輴未殯承華掩曜梓宮莫測竝即隨由備辦禮具凶荒四海同哀六軍袒哭聖情孝友理當感慟日者百司嶽牧仰祈宸鑒以錫圭之功既歸有道當璧之禮允屬聖明而優詔謙沖窅然凝邈飛龍可躋而乾爻在四帝閽云叩而閶闔未開謳歌再馳是用翹首所以越人固執熏丹穴以求君周民樂推踰岐山而事主漢王不即位無以貴功臣光武止蕭王豈謂紹宗廟黃帝遊于襄城尚訪治民之道放勳入于姑射猶使樽俎有歸伊此儻來豈聖人所欲帝王所應不獲已而然伏讀璽書尋諷制旨顧懷物外未奉慈衷陛下日角龍顏之姿表于徇齊之日彤雲素氣之瑞基于應物之初博覽則大哉無所與名深言則曄乎昭章之觀忠為令德孝實動天加以英威茂略雄圖武算指麾則丹浦不戰顧眄則阪泉自蕩地維絶而重紐天柱傾而更植鑿河津于孟門百川復啓補穹儀以五石萬物再生縱陛下拂袗衣而遊廣成登崦山而去東土群臣安得仰訴兆庶何所歸仁況郊祀配天罍篚禮曠齊宮清廟匏竹不陳仰望鑾輿匪朝伊夕瞻言法駕載渴且飢豈可久稽衆議有曠彝則舊邦既復函雒已平高奴櫟陽宮館雖毀濁河清渭佳氣猶存皋門有伉甘泉四敞土圭測景仙人承露斯蓋九州之赤縣六合之樞機博士捧圖書而稍還太常定禮儀而已列豈得不揚清駕而赴名都具玉鑾而遊正寢昔東周既遷鎬京遂其不復長安一亂郟洛永以為居夏后以萬國朝諸侯文王以六州匡天下跡基百里劍杖三尺以殘楚之地抗拒九戎一旅之師翦滅三叛坦然大定御輦東歸解五牛于冀州秣六馬于譙郡緬求前古其可得歟對揚天命何所讓德有理存焉敢重所奏臣僧辨等誠惶誠恐頓首頓首死罪死罪梁書元帝紀南史八藝文類聚十四文苑英華六百經漢武通天臺為表奏陳思歸意臣聞喬山雖掩鼎湖之靈可祠有魯遂荒大庭之跡不泯伏惟陛下降德猗蘭纂靈豐谷漢道既登神仙可望射之罘于海浦禮日觀而稱功橫中流于汾河指柏梁而高宴何其甚樂豈不然歟既而運屬上仙道窮晏駕翠幕珠簾一朝零落茂陵玉碗遂出人間陵雲故基共原田而膴膴別風餘址帶陵阜而茫茫羇旅縲臣豈不落淚昔者承明見厭嚴助東歸駟馬可乘長卿西返恭聞故實竊有愚衷黍稷非馨敢望徼福爵臺之薦空愴魏君雍丘之祠未光夏后瞻仰徽猷伏增悽懼初學記九御覽八十八悽懼作悽悵又見陳書沈炯傳少末六句為周弘正讓太常表臣聞玉舄雕楹不取材于蟠木丹珠繡黼豈襲冕于薜蘿何則適用各有其宜朝野不可一指叔孫之野外定禮倍資典實刁協之躬為唱引豈易其儀儻九賓闕相封禪失儀責以司存云誰之咎況南史執𥳑轉見違才君舉必書尤難妄冒初學記十二又見藝文類聚四十九御覽二百二十八皆有誤字為陳太傅讓表奏六代之舞不能祈天具百神之歌無以動聖延首帝閽轉增危栗百川沸騰百室如燬釋位同謀諸侯總至盟書會府餘臣一人若使幅巾衡巷口絶平吳朝遊赤松暮過濟北出就侯服入禠龍章則四郊有壘誰守社稷如其雄戟在前強弩自衛負孺子之圖飾緣鶺之鼎軍威重于護將國禮貴于寒門則臣道尚卑孰云非逼臣所以出謝公卿入訓妻子拜長陵之園謁太祖之廟不以九族違恩義不以百姓負國家所期陛下與北極同壽朝廷與南山同固藝文類聚四十六初學記十一為百官勸進陳武帝表臣聞春榮秋落四時所以迭代金行水流五德所以互序昔陶唐告終有虞氏作漢魏禪讓晉宋以之登庸夫有非常之功有非常之賞能利天下者受天下之利陛下造化之功日用之德褰裳去之物誰仰訴頃五星夜聚八風通吹豐露呈甘卿雲舒族白狼遠至素雉朝飛天意顯然靈貺可覩藝文類聚十四為周儀同失律後復官表日者驂驚鄭馬害在晉軍獄囚悲其夜數縲人切其曉奏危光似燭察命如絲云誰之尤自貽其咎假令誅以妻子戮及墳墓漢非負德陵實孤恩況伏鑕俯眉遂受淮陰之閒吞聲飲恨不與臧洪共死陛下憐而宥之伊臣豈不獨愧喪其子弟六謝父兄百萬之師千夫有長問臣安在誰曰董司魂遊奉高不知何對藝文類聚四十七請歸養表臣嬰生不幸弱冠而孤母子零丁兄弟相長謹身為養仕不擇官宦成梁朝命存亂世冒危履險百死輕生妻息誅夷昆季冥滅餘臣母子得逢興運臣母妾劉今年八十有一臣叔母妾丘七十有五臣門弟姪故自無人妾丘兒孫又久亡泯兩家侍養餘臣一人前帝知臣之孤煢養臣以州里不欲使頓居草萊又復矜臣溫凊所以一年之內再三休沐臣之屢披丹款頻冒宸鑒非欲苟違朝廷遠離畿輦一者以年將六十湯火居心每跪讀家書前懼後喜溫枕扇席無復成童二者職居彝憲邦之司直若自虧身禮何問國章前德綢繆始許哀放內侍近臣多悉此旨正以選賢與能廣求明哲趑趄荏苒未始取才而上玄降戾奄至今日德音在耳墳土遽乾悠悠昊天哀此罔極兼臣私心煎切彌迫近時慺慺之祈轉忘塵觸伏惟陛下睿哲聰明嗣興下武刑于四海弘此孝治寸管求天仰歸帷扆有感必應實望聖明特乞霈然申其私禮則王者之德覃及無方矧彼翔沈孰非涵養陳書沈炯傳高祖受禪以母老表請歸養詔不許文帝嗣位又表又見文苑英華六百一答張種書若乃三江五湖洞庭巨麗寫長洲之茂苑登九曲之層臺山高水深雲蒸霧吐其中之秀異者實虎丘之靈阜焉冬桂夏柏長蘿修竹靈源祕洞轉側超絶遠澗深崖交羅戶穴藝文類聚八林屋館記夫玄之又玄處衆妙之極可乎不可成道行之致斯蓋寂寥窅冥希微恍惚故非淮南八仙之圖賴鄉九井之記至若崑山平圃銀榜相暉蓬閬仙宮金臺崛起南瞰胥臺傍連飛閣桂柱星羅瓊軒雲構銘曰大道既隱衆聖無門悠悠太極誰見玄根祈年立秦望仙表漢髣佛神靈依稀宮觀峨峨林屋輪奐徘徊庭羅花鳥室靜塵埃藝文類聚七十八太極殿銘臣聞在天成象紫宮所以昭著在地成形赤縣居其區宇太極殿者資兩儀之意焉大壯顯其全模土圭測其正影周曰路寢漢稱前殿雖名號參差其實一也主上未明求衣日旰忘食隳樂壞禮造次留神漢陛秦除莫不葺復而此殿興造纍歲未成外遘戎機內憂民力劬勞深慮荏苒移時至陳永定六合既清五禮稍備雕楹玉舄華榱璧璫揆之有日而猶一柱楩楠豫章地淪外寇楚材晉用非復我求既而新亭前江有流查甚壯盤根錯節枝葉葱蒨津人以聞正堪時用于是將作受詔冬官奉職百工竝作屢降乘輿匠石磨礱必經天旨儉而不固泰而不奢億兆填填而樂成也曾未數旬煥然雲搆昔晉朝繕造文杏有闕梅梁瑞至畫以標花自是迄今又獲神物即樟樹焉殿之某間即某柱是也銘曰軒轅狹堂夏后卑宮文來質往蹇産彌崇體制八都開茲萬戶灼爍雄梁徘徊大廡璧月霄懸卿雲晝聚豈伊開陽飛來應柱嘉辰令月新寢告成青槐赤棘郎將思兵翠被負扆百辟公卿鐘鼓八佾蕭韶九成庸臣再拜天子萬齡藝文類聚六十二武帝哀策文望三靈而摽目蹐九地而崩心哭仍几之將撤慟祖鬯之虛斟黃屋祲而白日掩紫極涵而浮雲陰其辭曰悠悠媯水鬱鬱姚墟惟帝之系在唐作虞正卿之後握此靈符雕雲布族祥星結樞負茲天鏡未拾遺珠爰初發跡斬蛇鞠旅大定番禺載戡海渚承釁而運席卷中流王室如燬乃合諸侯負鐵誓衆釋位同謀俱登涿鹿實斷蚩尤道濟一匡功歸四履爰總百官訓于天子儻來有運事非獲已翠龜負字赤雀銜書謳歌適夏禮樂遷虞負扆正位升壇受圖二儀協序五緯同符門歌麟趾室詠騶虞奉常定日大卜蠲時升中備物方告雍熙天甘玉露地秀金芝休禎未答靈貺徒欺吏求穆卜詔絶良醫羲躔失御天街褫蹕夏采升榮宮車晏出洞閨移凶充庭罷吉間窅窅之窮燈去昭昭之遊日歸大暮之不暘降幽宮而長畢巫咸筮告容成戒期文衛如在葆鐸想悲去畢陌而東顧望橋山而路遲臣攀龍而尚在魂過沛而何之侍低昂之靈纛奉寂寂之空帷銅雀沒于修松平陵隱于深柏節鼖鼓之哀音燎爟火于通夕薤露落而暮日寒玄霜凝而壟草白銘功德于旗常被徽音于鍾石回天儀于清廟祔祖考而來格播茂實與英聲鬱氛氳于宗祐藝文類聚十四太尉始興昭烈王碑古者帝王之興莫不崇建親屏泰伯讓而退封武哀終而受號則有之矣至若勒功鼎鼐銘德太常清廟尊乎國家揚名顯乎子弟在昭烈王見之焉若夫媯水遙源石砮遐集五絲作而詠南風八世興而和鳴鳳藉帝王之基居正卿之族有由來矣孔融汝潁之論許其少多傅暢諸公之書頗有賢哲自漢至魏涉江而東綿邈蟬聯言之耆舊皇上革命應運大啓邦國麟趾磐石之宗固具金楨玉幹之戚畢封文叔掩被之悲無泯仲謀援鞍之慟逾切乃封始興郡王永定元年下詔曰天倫所感義本因心名器追崇則惟恆典亡兄梁故南兗州刺史長城縣公德範沈邃風度寬厚性與天通深乎靡測昔彈冠入仕譽重城華宣力艱難遂顧洪業雖時非季漢勢異桓王海內挹其風流生民懷其大德者矣朕受天明命爰膺寶曆言尋永往興慕增懷可奉贈太尉公昔之密戚近親宗英令德若河閒之不群沛獻之受象東平之樂善陳思之藻麗實聞之也未有身死忠貞名存前代若王之義烈者銘曰稽古帝舜重瞳有裔曰陳祚土纂虞之系騰波汝潁承流媯汭四嶽有後六奇獻計唯實唯忠卿長郡公浮舟震澤佳氣葱葱岐周七十商亳百里婉婉中陽帝出攸止太常景皇季孫讓子天下不踐聞之惇史入孝出忠清輝何已苞指周藏風流懿德言為世範行成士則名山可鐫豐碑易勒惜哉往矣殞身凶慝鼎命既遷山河是始光啓代郡德表永祀周以別功魯侯戾止禮茂廟堂恩加松杞藝文類聚四十六為王僧辨與陳武帝盟文賊臣侯景凶羯小胡逆天無狀構造姦惡違背我恩義破掠我國家毒害我生民移毀我社廟我高祖武皇帝靈聖聰明光宅天下劬勞兆庶亭育萬民如我考妣五十所載哀景以窮見歸全景將戮之首置景要害之地崇景非次之榮我高祖于景何薄我百姓于景何怨而景長戟彊弩陵蹙朝廷鋸牙郊甸殘食含靈刳肝斫趾不懕其快曝骨焚尸不謂為酷高祖菲食卑宮春秋九十屈賊手大行皇帝溫嚴恭默丕守鴻名于景何有復加忍毒皇枝襁抱已上緦功以還窮刀極俎既屠且鱠豈有率土之濱謂為王臣食人之禾飲人之水忍聞此痛而不悼心況臣僧辨臣霸先等荷稱國藩湘東王臣諱泣血銜哀之寄摩頂至足之恩世受先朝之德身當將帥之任而不能瀝膽抽腸共誅姦逆雪天地之痛報君父之仇則不可以稟靈含識戴天履地今日相國至孝玄感靈武斯發已破賊徒獲其元帥止餘景身尚在京邑臣僧辨與臣霸先協和將帥同心共契必誅凶豎尊奉相國嗣膺鴻業以主郊祭前途若有一功獲一賞臣僧辨等不推己讓物先身帥衆則天地宗廟百神之靈共誅共責臣僧辨臣霸先同心共事不相欺負若有違戾明神殛之梁書王僧辨傳又類聚三十三祭梁吳郡袁府君文夫宮鳴徵應響韻相趍桂馥蘭芬期臭在斯道合一朝豈忘千載日者明德世彥振纓王室坐嘯大邦顯治巨麗竊以不敏出宰句吳上郡下邑都城接雉雖王事靡盬無失豫遊窺洞庭于五湖登姑蘇于九曲身後之事一至于斯今者長樂未央已夾樗里之墓公宮魯庫非復少昊之墟成土一棺未知何託解劍絮漿轉增欷歔藝文類聚三十八
