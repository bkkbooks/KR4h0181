body:
  text: 廢帝即位大赦詔上天降禍大行皇帝奄棄萬國攀號靡及五內崩殞朕以寡德嗣膺寶命煢煢在疚懼甚綴旒方賴宰輔匡其不逮可大赦天下陳書廢帝紀改元大赦詔昔昊天成命降集寶圖二后重光九區咸乂閔余沖薄王道末昭荷茲神器如涉靈海庶親賢竝建牧伯惟良天下雍熙緬同刑措今三元改厤萬國充庭清廟無追具僚斯在言瞻宁位觸感崩心思播遺恩俾覃黎獻可大赦天下改天康二年為光大元年孝悌力田賜爵一級陳書廢帝紀收到仲舉等付廷尉詔到仲舉庸力小才坐叨顯貴受任前朝榮寵隆赫父參王政子據大邦禮盛外姻勢均戚里而肆其驕闇淩慠百司遏密之初擅行國政排黜懿親欺蔑台袞韓子高蕞尒細微擢自卑末入參禁衛委以心腹蜂蠆有毒敢行反噬仲舉子高共為表裏陰構姦謀密為異計安成王朕之叔父親莫重焉受命導揚稟承顧託以朕沖弱屬當保祐家國安危事歸宰輔伊周之重物無異議將相舊臣咸知宗仰而率聚凶徒欲相掩襲屯據東城進逼崇禮規樹仲舉以執國權陵斥司徒意在專政潛結黨附方危社稷賴祖宗之靈姦謀顯露前上虞令陸昉等具告其事竝有據驗并剋今月七日縱其凶惡領軍將軍明徹左衛將軍衛尉卿寶安及諸公等又竝知其事二三舋迹彰于朝野反道背德事駭聞見今大憝克殲罪人斯得竝可收付廷尉肅正刑書罪止仲舉父子及子高三人而已其餘一從曠蕩竝所不問陳書到仲舉傳誅華皎家口詔逆敗華皎極惡窮凶遂樹立蕭巋謀危社稷棄親即讎人神憤惋王師電速水陸爭前梟翦之期匪朝伊暮其家口在北里尚方宜從誅戮用明國憲陳書廢帝紀曲赦湘巴二郡詔賊皎輿皂微賤特逢獎擢任據藩牧屬當寵寄背斯造育興構姦謀樹立蕭氏盟約彰露鴆毒存心志危宗社扇結邊境驅逼士庶蟻聚巴湘豕突鄢郢逆天反地人神忿嫉征南將軍量安南將軍明徹郢州刺史靈洗受律專征備盡心力撫勞驍雄舟師俱進義烈爭奮兇惡奔殄獻捷相望重氛載廓言念泣罪思與惟新可曲赦湘巴二州凡厥為賊所逼制預在兇黨悉皆不問其賊主帥節相竝許開恩出首一同曠蕩陳書華皎傳卹死事軍人詔討華皎軍人死王事者竝給棺槥送還本鄉仍復其家陳書廢帝紀即位改元大赦詔夫聖人受命王者中興竝由懿德方作元后高祖武皇帝揖拜堯圖經綸禹跡配天之業光辰象而利貞格地之功侔川岳而長遠世祖文皇帝體上聖之姿當下武之運築宮示儉所務唯德定鼎初基厥謀斯在朕以寡薄才非聖賢夙荷前規方傳景祚雖復親承訓誨志守藩維詠季子之高風思城陽之遠託自元儲紹國正位君臨無道非幾佇聞刑措豈圖王室不造頻謀亂階天步艱難將傾寶厤仰惟嘉命爰集朕躬我心貞確堅誓蒼昊而群辟啟請相諠渭橋文母尊嚴懸心長樂對揚璽紱非止殷湯之三辭履涉春冬何但代王之五讓今便肅奉天策欽承介圭若據滄溟踰增兢業思所以雲行雨施品物咸亨當與黔黎普同斯慶可改光大三年為大建元年大赦天下在位文武賜位一階孝悌力田及為父後者賜爵一級異等殊才竝加策序鰥寡孤獨不能自存者人賜穀五斛陳書宣帝紀卹軍士死傷詔自討周迪華皎已來兵交之所有死亡者竝令收斂竝給棺槥送還本鄉瘡痍未瘳者各給醫藥陳書宣帝紀安處新附詔懷遠以德抑惟恆典去戎即華民之本志頃平江介繈負相隨崎嶇歸化亭候不絕宜加卹養荅其誠心維是荒境自投有在都邑及諸州鎮不問遠近竝蠲課役若克平舊土反我侵地皆許還鄉一無拘限州郡縣長明加甄別良田廢村隨便安處若輒有課訂即以擾民論陳書宣帝紀行新政詔民惟邦本著在典謨治國愛民抑又通訓朕聽朝晏罷日仄劬勞方流惠澤覃被億兆有梁之季政刑廢缺條綱弛紊僭盜荐興役賦征徭尤為煩刻大陳御寓拯茲餘獘滅扈戡黎弗遑創改年代彌流將及成俗如弗解張物無與厝夕惕疚懷有同首疾思從卑菲約已濟民雖府帑未充君孰與足便可刪革去其泰甚冀永為定準令𥳑而易從自今維作田值水旱未收即列在所言上折除軍士年登六十悉許放還巧手于役死亡及與老疾不勞訂補其籍有巧隱并王公百司輒受民為程蔭解還本屬開恩聽首在職治事之身須通相檢示有失不推當局任罪令長代換具條解舍戶數付度後人戶有增進即加擢賞若致減散依事準給有能墾起荒田不問頃畝少多依舊蠲稅陳書宣帝紀原逆黨詔犯逆子弟支屬逃亡異境者悉聽歸首見縶繫者量可散釋其有居宅竝追還陳書宣帝紀班宣兵法詔國之大事受脤興戎師出以律稟策于廟所以乂安九有克成七德自頃掃滌群穢廓清諸夏乃貔貅之戮力亦帷幄之運籌雖左衽已戡干戈載戢呼韓來謁亭鄣無警但不教民戰是謂棄之仁必有勇無忘武備磻溪之傳韜訣穀城之授神符文叔懸制戎規孟德頗言兵略朕既慚暗合良皆披覽兼昔經督戎備嘗行陣齊以七步肅之三鼓得自胸襟指掌可述今竝條制凡十三科宜即班宣以為永準陳書宣帝紀令內外舉賢極諫詔舉善從諫在上之明規進賢謁言為臣之令範朕以寡德嗣守寶圖雖世襲隆平治非寍一辨方分職旰食早衣傍闕爭臣下無貢士何其闕爾鮮能抗直豈余獨運匪薦讜言置鼓公車罕論得失施石象魏莫陳可否朱雲摧檻良所不逢禽息觸楹又為難值至如衣褐以見擔簦以遊或耆艾絕倫或妙年異等干時而不偶左右莫之譽黑貂改獘黃金且殫終身滯淹可為太息又貴為百辟賤有十品工拙竝騖勸沮莫分街謠徒擁廷議斯闕實朕之弗明而時無獻替永言至治何迺爽歟外可通示文武凡厥在位風化乖殊朝政紕蠹正色直辭有犯無隱兼各舉所知隨才明試其莅政廉穢在職能否分別矢言俟茲黜陟陳書宣帝紀分留罷任之徒住姑孰詔姑孰饒曠荊河斯擬博望關畿天限嚴峻龍山南指牛渚北臨對熊繹之餘城邇全琮之故壘良疇美柘畦畎相望連宇高甍阡陌如繡自梁末兵災凋殘略盡比雖務優寬猶未克復咫尺封畿宜須殷阜且眾將部下多寄上下軍民雜俗極為蠹耗自今有罷任之徒許分留部下其已在江外亦令迎還悉住南州津裏安置有無交貨不責市估萊荒墾闢亦停租稅臺遣鎮監一人共刺史津主分明檢押給地賦田各立頓舍陳書宣帝紀創築東宮詔梁氏之季兵火薦臻承華焚蕩頓無遺構寶命惟新迄將二紀頻事戎旅未遑脩繕今工役差閑椽楹有擬來歲開肇創築東宮可權置起部尚書將作大匠用主監作同上皇孫胤生詔皇孫初誕國祚方熙思與群臣共同斯慶內外文武賜帛各有差為父後者賜爵一級陳書吳興王胤傳克壽陽下詔梁末得懸瓠以壽陽為南豫州今者克復可還為豫州以黃城為司州治下為安昌郡滻湍為漢陽郡三城依梁為義陽郡竝屬司州陳書宣帝紀以吳明徹為豫州刺史詔壽春者古之都會襟帶淮汝控引河洛得之者安是稱要害侍中使持節都督征討諸軍事征北大將軍開府儀同三司南平郡開國公明徹雄圖克舉宏略蓋世在昔屯夷締構皇業乃掩衡岳用清氛沴實吞雲夢即敘上游今茲蕩定恢我王略風行電埽貔武爭馳月陣雲梯金湯奪險威陵殊俗惠漸邊氓惟功與能元戎是屬崇麾廣賦茂典恆宜可都督豫合建光朔北徐六州諸軍事車騎大將軍豫州刺史增封并前三千五百戶餘如故陳書吳明徹傳還王琳等首詔古者反噬叛逆盡族誅夷所以藏其首級誡之後世比者所戮止及一身子胤或存梟懸自足不容久歸武庫長比月支惻隱之懷有仁不忍維熊曇朗留異陳寶應周迪鄧緒等及今者王琳首竝還親屬以弘廣宥陳書宣帝紀赦江右淮北等州詔王者以四海為家萬姓為子一物乖方夕惕猶厲六合未混旰食彌憂朕嗣纂鴻基思弘經略上符景宿下叶人謀命將興師大拯淪溺灰琯未周凱捷相繼拓地數千連城將百蠢彼餘黎毒茲異境江淮年少猶有剽掠鄉閭無賴摘出陰私將帥軍人罔顧刑典今使苛法蠲除仁聲載路且肇元告慶邊服來荒始覩皇風宜覃曲澤可赦江右淮北南司定霍光建朔合豫北徐仁北兗青冀南譙南兗十五州郢州之齊安西陽江洲之齊昌新蔡高唐南豫州之歷陽臨江郡士民罪無輕重悉皆原宥將帥職司軍人犯法自依常科陳書宣帝紀緩南川等州田租詔去歲南川頗言失稔所督田租于今未即豫章等六郡太建五年田租可申半至秋豫章又逋太建四年檢首田稅亦申至秋南康一郡嶺下應接民間尤獘太建四年田租未入者可特原除庶脩墾無廢歲取方實陳書宣帝紀慰撫朐山黃郭詔戢情懷善有國之令圖拯獘救危聖範之通訓近命師薄伐義在濟民青齊舊隸膠光部落久患凶戎爭歸有道棄彼農桑忘其衣食而大軍未接中途止憩朐山黃郭車營布滿扶老攜幼蓬流草跋既喪其本業咸事遊手饑饉疾疫不免流離可遣大使精加慰撫仍出陽平倉穀拯其懸磬并充糧種勸課士女隨近耕種石鱉等屯適意脩墾陳書宣帝紀贈諡周弘正詔追遠襃德抑有恆規故尚書右僕射領國子祭酒豫州大中正弘正識宇凝深蓺業通備辭林義府國老民宗道映庠門望高禮閣卒然殂殞朕用惻然可贈侍中中書監喪事所須量加資給便出臨哭諡曰𥳑子陳書周弘正傳給吳明徹麾鉞詔昔者軍事建旌交鋒作鼓頃日訛替多乖舊章至于行陣不相甄別今可給司空大都督鈇鉞龍麾其次將各有差陳書吳明徹傳凱旋大會詔元戎凱旋群師振旅旌功策賞宜有饗宴今月十七日可幸樂遊苑設絲竹之樂大會文武陳書宣帝紀原逋租詔朕昧旦求衣日旰方食思弘億兆用臻俾乂而牧守莅民廉平未洽年常租賦多致逋餘即此務農宜弘寬省可起太建以來訖八年流移叛戶所帶租調七年八年叛義丁五年訖八年叛軍丁六年七年逋租田米粟夏調綿絹絲石麥等五年訖七年逋貲絹皆悉原之陳書宣帝紀量酬軍功詔懋賞之言明于訓誥挾纊之美著在撫巡近歲薄伐廓清淮泗摧鋒致果文武畢力櫛風沐雨寒暑亟離念功在茲無忘終食宜班榮賞用酬厥勞應在軍者可竝賜爵二級并加賚卹付選即便量處陳書宣帝紀停減供御詔惟堯葛衣鹿裘則天為大伯禹獘依菲食夫子曰無閒然故儉德之恭約失者鮮朕君臨宇宙十變年籥旰日勿休乙夜忘寢跂予思治若濟巨川念茲在茲懷同馭朽非貪四海之富非念黃屋之尊導仁壽以寘群生寍勞役以奉諸已但承梁季亂離斯瘼宮室禾黍有名亡處雖輪奐未覩頗事經營去泰去甚猶為勞費加以戎車屢出千金日損府帑未充民疲征賦百姓不足君孰與足興言靜念夕惕懷抱垂訓立法良所多慚斲雕為朴庶幾可慕雉頭之服既焚戈綈之衣方襲損撤之制前自朕躬草偃風行冀以變俗應御府堂署所營造禮樂儀服軍器之外其餘悉皆停息掖庭常供王侯妃主諸有俸卹竝各量減陳書宣帝紀僑置淮北郡縣詔淮北義人率戶口歸國者建其本屬舊名置立郡縣即隸近州賦給田宅喚訂一無所預陳書宣帝紀清乂文案詔昔軒轅命于風后力牧放勛咨爾稷契朱武冕旒垂拱化致隆平爰逮漢列五曹周分六職設官理務各有攸司亦幾期刑措卜世彌永竝賴群才用康庶績朕日昃劬勞思弘治要而機事尚擁政道未凝夕惕于懷罔知攸濟方欲使茲舟楫委成股肱徵名責實取寍多士自今應尚書曹府寺內省監司文案悉付局參議分判其軍國興造徵發選序三獄等事前須詳斷然後啟聞凡諸辯決務令清乂約法守制較若畫一不得前後舛互自相矛楯致有柱滯紆意舞文糾聽所知靡有攸赦陳書宣帝紀改重受財律詔舊律以枉法受財為坐雖重直法容賄其制甚輕豈不長彼貪殘生其舞弄事涉貨財寍不尤切今可改不枉法受財者科同正盜陳書宣帝紀大赦詔畫冠弗犯革此澆風孥戮是蹈化于薄俗朕肅膺寶命迄將一紀思經邦濟治憂國愛民日仄劬勞夜分輟寢而還淳反朴其道靡階雍熙盛美莫云能致遂乃鞫訊之牒盈于聽覽春釱之人煩于牢犴周成刑措漢文斷獄杼軸空勞邈焉既遠加以蕞爾醜徒軼我彭汴淮汝氓庶企踵王略治兵誓旅義存拯救飛芻挽粟征賦頗煩暑雨祁寒寍忘咨怨兼宿度乖舛次舍違方若曰之誡責歸元首愧心斯積馭朽非懼即建子令月微陽初動應此嘉辰宜播寬澤可大赦天下陳書宣帝紀尚儉詔昔堯舜在上茅屋土階湯禹為君藜杖韋帶至如甲帳絑絡華榱璧璫未能雍熙徒聞侈欲朕企仰前聖思求訟平正道多違澆風又靡至今貴里豪家金鋪玉舄貧居陋巷彘食牛衣稱物平施何其遼遠爟烽未息役賦兼勞文吏姦貪妄動科格重以旗亭關市稅斂繁多不廣都內之錢非供水衡之費逼遏商賈營謀私蓄靖懷眾獘宜事改張弗弘王道安拯民蠹今可宣敕主衣尚方諸堂署等自非軍國資須不得繕造眾物後宮僚列若有游長掖庭啟奏即皆量遣太子祕戲非會禮經樂府倡優不合雅正竝可刪改市估津稅軍令國章更須詳定唯務平允別觀離宮郊閒野外非恆饗宴勿復脩治并敕內外文武車馬宅舍皆循儉約勿尚奢華違我嚴規抑有刑憲所由具為條格標榜宣示令喻朕心焉陳書宣帝紀丹陽等十郡田稅原半詔朕君臨四海日旰劬勞思弘至治未臻斯道而兵車驟出軍費尤煩芻漕控引不能徵賦夏中亢旱傷農畿內為甚民失所資歲取無託此則刑政未理陰陽舛度黎元阻饑君孰與足靖言興念余責在躬宜布惠澤溥沾氓庶其丹陽吳興晉陵建興義興東海信義陳留江陵等十郡并謝署即年田稅祿秩竝各原半其丁租半申至來歲秋登陳書宣帝紀遺詔朕爰自遘疾曾未浹旬醫藥不瘳便屬大漸終始定分夫復奚言但君臨寰宇十有四載誠則雖休勿休日慎一日知宗廟之負重識王業之艱難而邊鄙多虞生民未乂方欲蕩清四海包吞八荒有志莫從遺恨幽壤皇太子叔寶繼體正嫡年業韶茂纂統洪基社稷有主群公卿士文武內外俱罄心力同竭股肱送往事居盡忠誠之節當官奉職引翼亮之功務在叶和無違朕意凡厥終制事從省約金銀之飾不須入壙明器之具皆令用瓦唯使儉而合禮勿得奢而乖度以日易月既有通規公除之制悉依舊制在位百司三日一臨四方州鎮五等諸侯各守所職竝停奔赴陳書宣帝紀敕禁海際捕漁滬業智禪師請禁海際捕漁滬業此江苦無烏賊珍味宜依所請永為福地國清百錄敕釋靖高等供給至人為法以身許道法師等善明治亂歸寄有敘可謂懷道正士深可嘉之宜于都郭大寺安置所司供給務令周洽續高僧傳敕北伐今歲出師薄伐邊服所獲梁土則江淮二百許城東西五千餘里然龜腹長文號千里也遠驗明言宛同符契續高僧傳敕留釋智顗不許入天台京師三藏雖弘皆一途偏顯兼之者寡朕聞瓦官濟濟深用慰懷宜停訓物豈遑獨善一二曹義達口具得朕意也釋藏起字一號國清百錄一敕給釋智顗智顗禪師佛法雄傑時匠所宗訓兼道俗國之望也宜割始豐縣調以充眾費蠲兩戶民用供薪水主者施行同上又見纓字二號續高僧傳十七敕給修禪寺名具左僕射徐陵啟智顗禪師創立天台宴坐名嶽宜號修禪寺也同上與邊將書盧潛猶在壽陽聞其何當還北此虜不死方為國患卿宜深備之北齊書盧潛傳從釋智顗受法文仰惟化導無方隨機濟物衛護國土汲引天人照燭光輝託迹師友比丘入夢符契之像久彰和上來儀高座之德斯炳是以翹心十地渴仰四依大小二乘內外兩教尊師重道由來尚矣伏希俯提所謂世世結緣遂其本願日日增長今奉請為菩薩戒師續高僧傳勝天王般若懺文菩薩戒弟子皇帝稽首十方諸佛無量尊法一切賢聖自鶴林滅迹鷲嶺凝神瓶寫總持遺文不墜傳燈流布法輪踰廣方軌宏宣既昭著于西域分鑣顯說亦漸移于東土而周朝徵應止見夜明漢帝感通不過宵夢香象所載虎觀寂而未聞龍宮所藏麟閣闃其無取山海為隔傳授蓋微華夷不同翻譯何幾天王所問止得經名金剛之經纔見一品歷魏晉而未備經宋齊而恆闕我皇帝承家建國光前絕後道格天地通被幽微大啟慈悲廣開智慧施造化以仁壽濟蒼生于解脫異世界而承風殊剎土而響應真人閒出法寶傳通粵以天嘉六年外國王子月婆首那來遊匡嶺慧解深妙靡測聖凡奉持勝天王般若經一部于彼翻譯表獻京師某校彼前名冥合符契總三乘之通教貫六度之淵海如開暗室以照優曇十方眾生若貧人之獲寶四部弟子等力士之得珠金牒寶印始茲辰而一啟智慧實法洎爾時而方具故知如來咐囑必俟仁王般若興隆期于聖運弟子纂承洪緒思宏大業願此法門遍諸幽顯今謹于某處建如干僧如干日勝天王般若懺見前大眾至心敬禮本師釋迦如來禮般若波羅蜜禮勝天王願一切眾生勤求般若不避寒暑如薩陀波崙不愛身命如精進力菩薩得般若之性相與般若而相應攝諸萬有住安隱地念靈有識悉獲歸依稽首敬禮常住三寶廣宏明集二十八下
