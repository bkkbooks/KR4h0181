body:
  text: 卷十徐陵答族人梁東海太守長孺書息報近歲奉使來歸辱彼河清年中告行并惠以明鏡亟離寒暑雖復時陳梁隺日照孫鸞言慰相思反增離眷劉傅二常侍還又承書札銀鉤甚麗玉疏依然開封伸紙破愁為笑素秋方屆溽暑稍闌體中何如善保元吉藂臺之璧少海之珠何必鄉里所在為貴卿託身大國既已積年彼朝英彥理相欽挹方當交辟三命清官兩宮何乃闊然遲有問也吾七十之歲崦嵫已迫朽老之疾隨年而甚徒懷北邙之切未遂東都之期牽役承閒但有衰頓賢從君政佐佑興基中舍諶殿中竝休宜自別有書問來告訪吾文章自歸來鄉國亟徙炎涼牽課疲朽不無辭製而應物隨時未曾編録既承今告輒復搜撿行人相繼別簡知音但既乏新聲全同古樂正恐多慚於協律致睡於文侯耳燕南趙北地角天涯言接末由但以潛欷善敬德中郎竝北境之良選皇華之上求若可輶軒別當委白君問文苑英華六百七十八與李那書籍甚清徽常懷虛眷山川緬邈河渭像於經星顧望風流長安遠於朝日青要戒節白露為霜君子惟宜福履多豫雍容廊廟獻納便繁留使催書駐馬成檄車騎將軍賓客盈座丞相長史瞻對有勞脫惠箋繒慰其翹想吾栖遲茂陵之下臥病漳水之濱迫以崦嵫難為砭藥平生壯意竊愛篇章忽覿高文載懷勞佇此後殷儀同至止王人授館用阻班荊常在公筵敬析名作獲殷公所借陪駕終南入重陽閣詩及荊州大乘寺宜陽石像碑四首鏗鏘竝奏能驚趙鞅之魂輝煥相華時瞬安豐之眼山澤暗靄松竹參差若見三嵕之峰依然四皓之廟甘泉鹵簿盡在清文扶風輦路悉陳華簡昔魏武虛帳韓王故臺自古文人皆為詞賦未有登茲舊閣歎茲幽宮標句清新發言哀斷豈止悲聞帝瑟泣望羊碑一詠歌梁之言便掩盈懷之淚至如披文相質意致縱橫才壯風雲義深淵海方今二乘斯悟同免化城六道知歸皆踰火宅宜陽之作特會幽襟所覩黃絹之詞彌懷白雲之頌但恨耆闍遠嶽擅特高峰開士羅浮康公懸溜不獲銘茲雅頌耀彼幽巖循環省覽用忘飢渴握之不置恆如趙璧玩之不足同於玉枕京師長者好事才人爭造蓬門請觀高製軒車滿路如看太學之碑街巷相填無異華陰之市但豐城兩劍尚不俱來韓子雙環必希皆見莫以好龍無別木鴈可嗤載望瓊瑤因乏行李金風已徑玉質宜調書不盡言但聞爻繫徐陵頓首文苑英華六百七十九答李顒之書近謬枉清音無申窮眷忽辱來告文製兼美君山西盛族素挺風流河北辭林本所嗟賞子桓虛座寧不敬期伯喈倒屣固以相屬一日復其草土思襒衣裾披素清顏但覺形穢公輔之量不負高名王佐之才信表天骨孺子之榻雖其可懸仲舉之車彌軫恆眷孤子昔緣素乏叨簉皇華今日形容無關天壤殘光炯炯慮在昏明餘息綿綿待盡鐘漏安可以樹揚名士游處盛賓來喻泰高如為善謔文艷質寡何似上林華而不實將同桂樹但忘年之款昔有張裴鄰國之交非無嬰札儻哀駘可悅甕盎非疑方願投襟庶比傾蓋頃陳湯之疾歲月增深羊祜之疴秋冬彌劇且年光遒盡觸目崩心扶力含毫諸不申具孤子徐陵頓首文苑英華六百七十九報尹義尚書別離二國雲雨十年目懸河陽追銅爵而無遠神遊漳水與金鳳而俱飛北使還辱去冬十月十一日告忽同言敘循環巧製欣慰良深河朔年芳雖當淹晚白溝浼浼春流已清紫陌依依長楊稍合體中何如豈無鄉思第三秦世胄六輔良家文武兼能志懷開遠谷永之筆無慚古人蓋延之弓高視前彥而淹留趙魏亟歷寒暄企望鄉關理多悲切聖朝欽明纂曆大拯生民戮巨海之奔鯨殲中原之封豕晉君之說長安遠於日邊揚雄有言交州在於天際則輸賝王府屈膝閶門川洞酋豪強梁溟海神兵一指率土咸康方當偃伯於靈臺韜戈于武庫變大風于五禮驅蒸民於昌辰物色英聲搜揚俊傑投竿負鼎馳步蒼龍巖穴丘園爭趨金馬而弟留連河北義等周南懷此殊才實可傷嗟吾崦嵫既暮容鬢皤然風氣彌留砭藥無補追惟疇昔共備行人室家安危賓禮升降懸壺代哭俱歷春冬移館于箕同茲辛苦鳴蜩抱樹亟見藏冰歸鴈銜蘆多經寒食靖言念此如何可忘握玩來書彌其承臉夫以擁腫之木得免因於不才觳觫之牛自保由其無用以余鄙陋未友龔生惟歎吾賢不同蘧瑗耳若推溝拯溺每切皇衷逸翮飄鱗見優機檻所以降尺一之書馳輶軒之使心期與國必遂還途寧謂親鄰更成難請言尋雅告所及縲囚便訪鴻臚幸無淹使聞諸司寇或有邊俘前歲中流是維同惡燕禽望闕冀馬臨江裁頓雲羅自投天網京觀之冢宜彰武功周醜之門方申明罰而聖朝好生惡殺收雷寢電兵車所獲雖同長萬之來恩澤從容無異荀罃之禮方之於弟況擬非倫伊昔梁朝共奉嘉聘張茲大帛處彼高閎庭奏歌鐘座延僑肸賓客之敘方於阼階田獵之禽同於君膳正以鄉關阻亂致爾拘留家國隆平義應旋反況復韓宣屢至宰孔頻還翻爾遲回豈云鄰睦弟遂鍾儀之操對此皇華高厚之詩一何非類關徐廉樂之況三戰七擒之言此日借子之矛攻子之室彼之使客猶尚不還此於齊都豪門貴戚周行匪例事義相懸豈與大弟同年而語吾本自凡流已復衰老稍近東岱不奢擊壤之年惟欣堯俗若耶之復長保安臥時思之不棄忝亞宗卿非得侵官天扆但當今芃芃在詠濟濟盈朝才冠卿雲智同荀郭文辭富於江海高論薄於雲霄趨走丹墀之門侍奉清規之內弟來款言至欲附所聞聯類非宜更其多惑若使良有猶希贈鯉之書郵驛方通復行飛鶬之信執筆潛然不知何向文苑英華六百八十五又見藝文類聚三十有刪節薦陸瓊書新安王文學陸瓊見識優敏文史足用進居郎署歲月過淹左西掾缺允膺茲選階次小踰其屈滯已積陳書陸瓊傳高宗為司徒妙簡僚佐吏部尚書徐陵薦瓊於高宗與天台智者大師書陵和南昨預沈儀同法席餐奉甘露無畏之吼衆咸歸伏然正法炬朗諸未悟自慶餘年得逢妙說尋事咨展書不申心謹和南釋藏起字二號國清百録二又與天台智者大師書陵和南注傾之心難可敷具拔公至蒙三月念日示用慰積歲傾心麥冷體中何如願一日康勝山中春夏無餘障惱耳遲復存旨弟子二三年來溘然老至眼耳聾暗心氣昏塞故非復在人兼去歲第六兒夭喪痛苦成疾猶未除愈適今月中又有哀故頻歲如此窮慮轉深自念餘生無復能幾無由禮接係仰何言敬重璪公今還白書不次弟子徐陵和南同上諫仁山深法師罷道書竊聞出家間曠猶若虛空在俗籠樊比於牢獄非但經有明文亦自世間共見瞥聞法師覆彼舟航趣返緇衣之務此為目下之英奇非久長之深計何以知然從苦入樂未知樂中之樂從樂入苦方知苦中之苦弟子素與法師雖無曩舊相知以來亦復不疏夫良藥必自無甘忠諫者決乎逆耳倚見其僻是以不忍不言且三十年中造莫大之業如何一旦捨已成之功深為可惜敬度高懷未解深意將非帷帳之策欲集留侯形類臥龍擬求葛氏黃石兵法寧可再逢三顧茅廬無由兩遇封爵五等唯見不逢中閣外門難朱易白鳴笳鳳管非有或聞儛女歌姬空勞反玩覓之者等若牛毛得之者譬猶麟角以此之外何所窺窬法師今若退轉未必有一稱心交失現前十種大利何者佛法不簡細流入者則尊歸依則貴上不朝天子下不讓諸侯獨玩世間無為自在其利一也身無執作之勞口餐香積之飯心不妻妾之務身飾芻摩之衣朝無踐境之憂夕不千里之苦俯仰優游寧不樂哉其利二也躬無重任居必方域白壁朱門理然致敬夜琴晝瑟自是娛懷曉筆暮詩論情頓足其利三也假使棘生王路橋化長溝巷吏門兒何由仰喚寸絹不輸官庫升米不進公倉庫部倉司豈須求及其利四也門前擾擾我足安眠巷裏云云余無驚色家休大小之調門停強弱之丁入出隨心往還自在其利五也出家無當之僧猶勝在俗之士假使心存殺戮手無斷命之愆密裏通情決勝灼然矯俗如斯煩垢萬倍勝於白衣一入愛河永沉無出其利六也聽鐘聲而致敬尋香馥以生心朝覩尊儀暮披寶軸剎那之善逐此而生水滴微功漸盈大器未知因緣果報善惡皎然就此而言其利難陳矣假使達相白衣猶有埃塵之務縱令遙寄彈指遠近低頭形去心留身移意往間有者得如此貧苦者本無因近在目前不言可見其利七也山間樹下故自難期枕石漱流實為希有猶斯之類不可思議如此者難逢一心人悕遇法師未能不學交習聽勝之因一旦退心於理邈矣其利八也開織成之帙見過去之因摛琉璃之卷驗當來之果識因識果不以為愆知福知報何由作罪上無舟楫交見沒溺之悲下失浮囊則有沉身之患其利九也曠濟群品為天人之師水陸空行皆所尊貴言必闍黎和尚書輒致敬和尚遠近嗟詠貴賤顒仰法師今必退轉立成可驗才脫袈裟逢人輒稱汝我始解偏袒姓名便亦可呼平交者故自不論下劣者亦恐不讓薄言稱已榻席懸異從來小得自在便以君為題封若不屈膝斂手自達無由俯仰承迎未間合度如此專專何由可與其利十也略言十事空失此機其間深道寧容具述仰度仁者心居魔境為魔所迷意附邪途受邪易性假使眉如細柳何足關懷頰似桃花詎能長久同衾分枕猶有長信之悲坐臥忘時不免秋胡之怨洛川神女尚復不惑東阿世上班姬何關君事夫心者面焉若論繾綣則共氣共心一遇纏綿則連宵厭起法師未通返照安悟賣花未得他心那知彼意嗚呼桂樹遂為豆火所焚可惜明珠乃受淤泥埋沒弟子今日橫咨必為法師所哂世上白衣可訾何限且一人退道而不安危推此而言實成難解譬如瓦礫盈路人所不驚片子黃金萬夫息步正言法師入道之功已備染俗之法未加何異金博赤銅銀換鉛錫可悲可惜猶可優量能忍難忍方知其最願棄俗事務息塵勞正念相應行志兩全薄加詳慮更可思維悔之在前無勞後恨如弟子算遠即十數年中決知惻惻近即三五歲內空唱如何萬恨萬悲寧知遠及自誤自錯永棄一生乃知斷絃可續情去難留或若火裏生花可稱希有迷人知返去道不遙幸速推排急登正路法師非是無智遂為愚者所迷類似阿難便為魔之所嬈猶須承三寶之力制彼群凶豎般若之幢天魔自款若此言旨當即便冀棄芻蕘若不會高懷幸停深怪耳釋藏經九廣弘明集二十四為護軍長史王質移文比金風已徑玉露方圓宜及窮秋幸踰高塞當使孤旌不反隻騎無還非止湯羅豈知堯德其承比年昏墊仍歲蘊隆粒粟貴於隋珠分糜乏於齊鼎且氐羌旅拒已跨伊瀍胡羯憑陵方踰汾潞刺虎之勢時期卞生拾蚌之機彌驗蘇子但國家體茲明信有同皎日豈惟風雨之旦猶救匹夫宵夢之言無欺幽壤賊華皎近以臨蕃有譴作牧無章既懼檻車之徵便憂齊斧之戮遂乃治兵楚夢竊戴干戈傍引西戎共謀東夏僞周遣其衛國公宇文直等總統獯獫為其羽翼醜徒濟岸來攻郢城逆豎浮舟同趣夏浦王師櫂素在中流群帥爭驅應時殲蕩羌胡寶馬縱橫七澤之中荊楚樓船彌滿三江之上俘禽所獲水陸無遺華皎擢自芻微叨居蕃翰情慚犬馬罔顧恩靈翻執干戈自圖家國聞諸間諜具彼鄰謀乃授冬官即為鄉導雖傷仁義之俗非敢有私期和與國之情猶冀無失藝文類聚五十八移齊文獲去月二十日移承羯寇平殄同懷慶悅眷言鄰睦深副情佇夫天網之大固無微而不擒神武之師本無征而不克至如戎王傾其部落逆豎道其鄉關非厥英圖殆難戡戮況復洞庭遐曠兵食殷阜西窮版屋北罄氈廬聲冠苻姚勢兼聰勒庸蜀寶馬彌山不窮巴漢樓船陵波無際我之元戎上將協力同心承稟朝謨致行明罰為風為火殪彼蒙衝如霆如雷擊其舟艦羌兵楚賊赴水沈沙棄甲則兩岸同奔橫尸則千里相枕江川盡滿譬睢水之無流原隰窮胡等陰山之長哭於是黑山叛邑諸城洞開白虜連群投戈請命長沙鵩鳥靡復為妖湘川石燕自然還儛克翦無算縲禽不資欲計軍俘終難巧曆所獲龍駒驥子百千其群更開苜蓿之園方廣騊駼之廄於是衛霍甘陳虬髭瞋目心馳隴路志飲河源乘勝長驅未知所限豈如桓溫不武棄彼關中殷浩無能長茲羌賊方且西踰酒郡抵我境而置邊亭東略鹽池為齊朝而反侵地此政亦翦妖氛未窮巢窟便聞慶捷愧佩良深藝文類聚五十八檄周文主上恭膺寶歷嗣奉瑤圖既稟聖人之材兼富神武之略乂安兆庶共靖戎華用戢干戈永銷鋒鏑況復追惟在楚無忘玉帛之言軫念過曹猶感盤餐之惠年馳玉節之使歲降銀車之恩庶使懷音微悟知感而反其藏匿招我叛臣翊從瀟湘空竭關隴荊梁左右漢沔東西籲天呼地望佇哀救夫一人掩泣猶愴滿堂百姓為心彌切宸扆大都督吳明徹台司上將德茂勳高威著荊湘化聞庸蜀叱咤而平宿豫吹噓而定壽陽席捲江淮無淹弦望藝文類聚五十八玉臺新詠序凌雲概日由余之所未窺千門萬戶張衡之所曾賦周王璧臺之上漢帝金屋之中玉樹以珊瑚作枝珠簾以玳瑁為柙其中有麗人焉其人也五陵豪族充選掖庭四姓良家馳名永巷亦有潁川新市河間觀津本號嬌娥曾名巧笑楚王宮內無不推其細腰魏國佳人俱言訝其纖手閲詩敦禮非直東鄰之自媒婉約風流無異西施之被教弟兄協律自小學歌少長河陽由來能舞琵琶新曲無待石崇箜篌雜引非因曹植傳鼓瑟于楊家得吹簫于秦女至若寵聞長樂陳后知而不平畫出天仙閼氏覽而遙妒且如東鄰巧笑唯侍寢于更衣西子微顰將橫陳于甲帳陪游馺娑騁纖腰于結風長樂鴛鴦奏新聲于度曲粧鳴蟬之薄鬢照墮馬之垂鬟反插金鈿橫抽寶樹南都石黛最發雙蛾北地胭脂偏開兩靨亦有嶺上仙童分丸魏帝腰中寶鳳授曆軒轅金星與婺女爭華麝月共嫦娥競爽驚鸞冶袖時飄韓掾之香飛燕長裾宜結陳王之珮雖非圖畫入甘泉而不分言異神仙戲陽臺而無別真可謂傾國傾城無對無雙者也加以天情開朗逸思雕華妙解文章尤工詩賦琉璃硯匣終日隨身翡翠筆床無時離手清文滿篋非惟芍藥之花新製連篇寧止葡萄之樹九日登高時有緣情之作萬年公主非無纍德之辭其佳麗也如彼其才情也如此既而椒房宛轉柘館陰岑絳鶴晨嚴銅鋪晝靜三星未夕不事懷衾五日猶賖誰能理曲優游少託寂寞多間厭長樂之疏鐘勞中宮之緩箭輕身無力怯南陽之搗衣生長深宮笑扶風之織錦雖復投壺玉女為歡盡於百驍爭博齊姬心賞窮於六箸無怡神于暇景惟屬意于新詩可得代彼萱蘇微蠲愁疾但往世名篇當今巧製分諸麟閣散在鴻都不藉篇章無由披覽於是燃脂暝寫弄墨晨書撰録艷歌凡為十卷曾無參于雅頌亦靡濫于風人涇渭之間若斯而已於是麗以金繩裝之寶軸三臺妙札龍伸蠖屈之書五色花箋河北膠東之紙高樓鉛粉仍定魯魚之文辟惡生香聊防羽陵之蠹靈飛六甲高擅玉函鴻烈仙方長推丹枕至如青牛帳裏餘曲既終朱鳥窗前新粧已竟方當開茲縹帙散此縚繩永對玩于書帷長循環于纖手豈如鄧學春秋儒者之功難習竇傳黃老金丹之術不成固勝西蜀豪家託情窮于魯殿東儲甲館流詠止于洞簫孌彼諸姬聊同棄日猗與彤管麗矣香奩藝文類聚五十五文苑英華七百一十二皇太子臨辟雍頌臣聞天大王大詳於道德之言天文人文顯於爻象之說是以大君革命黔首所以庇焉聖人創物文籍所以生焉咸由此道制為民極莫不對越上靈裁成庶類濟世育德昭彼昆蟲皇帝世膺下武體茲上德握天鏡而授河圖執玉衡而運乾象皇太子耀彼重離光茲匕鬯儀天以行三善儷極以照四方惟忠惟孝自家刑國乃武乃文化成天下侍中國子祭酒新安王宗室羽儀衣冠準的惟善為樂造次必儒粵以十一年三月二十一日受詔弘宣發論語題攝齊升堂摳衣即席對揚天人開闢大訓清言既吐精義入神副德爰動音鋒起問難泉涌辨紛綸之異定倫理之疑玉振鏘鏘雲浮雨布介王奉繫聖蹤馳辨秀出信令張禹慚其師法何晏忸其訓詁穆穆焉洋洋焉此實虞朝之盛德生民之壯觀者也臣抑又聞之魯頌聿興史克宣其懿晉雍大啓王廙逞其詞所以述休平之風揚君上之德輕以下才敢為頌曰皇運勃啓膺圖受命紫蓋東臨黃旌南映積仁纍德重明疊聖四海無浪三階已平儲駕戾止和鸞有聲弘風講肆崇儒肅成丹書貴道黃金賤籯洙泗興業闕里增榮藝文類聚三十八太極殿銘夫紫蓋黃旗揚都之王氣長久虎踞龍蟠金陵之地體貞固天居爽塏大寢尊嚴高應端門仰模營室歸于有德譬彼河圖傳我休明義同商鼎太極殿者法氐象亢王者之位以尊左平右墄天子之堂為貴往朝煨燼多歷年所世道隆平宜其休復監軍鄒子度啓稱即日忽有一大梓柱從流來泊在後渚岸嵯峨容與若漢水之仙槎搖漾波濤似新亭之龍剎孤拔靈山允彰天貺昔梁氏承聖將圖繕修東虜窺江西胡犯蹕定之方中亟興師旅揆之以日輒有災故是知秦人所止實漢祖而為宮吳都佳氣乃元皇而斯宅千櫨赫奕萬栱崚嶒植緑芰而動微風舒丹蓮而制流火甘泉遠望觀正殿之崢嶸函谷遙看美皇居之佳麗信可以齊三光而示宇宙會萬國而朝諸侯爰命微臣乃為銘曰雍畤相望參差未央偃師回顧崔嵬德陽高捫太乙正睹瑤光峨峨靈柱赫赫流樟美矣宮室嘉哉令日御扆垂旒當朝靖蹕樂備韶夏禮兼文質帝旅無喧王旗斯謐肅肅卿士雍雍承弼漢座雕屏周人檻櫺城隅有勒殿省皆銘況復皇寢宜昭國經方流典訓永樹天廷藝文類聚六十二初學記二十四後堂望美人山銘高堂凝雨洛浦無洲何處相望山邊一樓峰因五婦石是三侯險逾地肺危鄰天柱禁苑斜通春人恆聚樹裏聞歌枝中見舞恰對妝臺諸窗竝開遙看已識試喚便回豈如織女非秋不來藝文類聚七又見文苑英華七百八十七以為庾信作麈尾銘爰有妙物窮茲巧制員上天形平下地勢靡靡絲垂綿綿縷細入貢宜吳出先陪楚壁懸石拜帳中王舉既落天花亦通神語用動捨默出處隨時揚斯雅論釋此繁疑拂靜塵暑引飾妙詞誰云質賤左右宜之藝文類聚六十九四無畏寺剎下銘皇帝升乾行于九五闢世界于三千神人開錦石之山小國獻栴檀之柱乃命將作修成梵宮復殿重軒淩霄負漢慈訓宮朝文母協道方祗鍾愛東平更踰燕后若夫外家問訊遙疑緣構御者衣服曾無綵繡咸傾寶飾用構支提僧若檀林寺同祗苑辭曰寶蓋王子金輪託生皇家茂戚抑有齊名業水餘潤災風所驚徒悲馬角孰獻雞鳴奈苑初築菴園重成金臺日麗玉殿雲平梵衆朝禮天歌夜清峰疑畫壁雀避雕楹福履斯大皇基永禎衆生不盡寶剎無傾藝文類聚七十七報德寺剎下銘昔者明王大孝感動神祇助月致景星之祥非煙流慶雲之色然而嚴敬之道惟事盡於配天明發之懷誠不過於饗帝豈如以梵宮之樂資乎廟堂淨土之因歸於園寢雖復青雲譙郡之境碧泉春陵之鄉上幼懷凝重未曾遊陟年將志學即事登庸宣力淮潯屬有嘉夢其夢也畢陌弘敞橋山屈盤氣象靈長風煙騰使隊雙表其高百尋左則青龍蟠蜿右則白虎蹲踞軒轅之駕譬婉婉而多慚吳王之墳狀耽耽而非擬有人指其地云此是國陵自爾迄永定初其間二十有餘年至歲紀頻移崇塋乃作觀其山川形勢王相徵圖瞻拜高巒宛如前夢大矣哉孝悌之至通於神明者與銘曰壯矣金表傍依壖垣高連彩霓極睇翔鶤梵偈宵唱雲花晝翻三心斷縛六道除怨趙夢天樂秦遊帝閽王靈在上巨勝奚論福彼群品俱排大昏皇家七百於萬維孫藝文類聚七十七陳文皇帝哀冊文維天康元年太歲丙戌四月丁未朔二十七日癸酉大行皇帝崩于有覺殿殯于太極之西階粵六月丙寅將遷於永寧陵禮也宮車晚駕幄殿晨張旌銘具列綍翿成行哀子嗣皇帝諱劈蜃輅於丹陛攀龍帷於紫庭趨過窮於屏闕拜慟感於明靈東京飛其瑞露北陸霣其祥星乃詔雲臺之史稽採咸池之曲叶大雅於鳴金同藏書於群玉其辭曰若水傳帝薰風御民重光所集世載于陳赫矣高祖悠哉上旻蟬聯寶胄暉煥郊禋我皇誕聖應此家慶道主衢鐏神凝懸鏡洛書天表河紀靈命納揆馳芳賓門流詠稽陰克伐震野勤王亳道增搆豳風會昌言瞻少昊實仗高陽效駕轇轕清宮未央歡覃兆庶德洎遐荒穆齊高寢上膳長樂肅肅承顏哀哀薦酌悼園恭儉章陵謙約大寶崇明無間改作纂武升歷遺愛實繁三湘九派沴氣雲昏力折天柱才傾地門甘泉夜照細柳朝屯谷魅山鬼橫流塞源赫赫英謨赳赳雄斷行天討無遺神算鬱掃江淮長驅巴漢九夷百越雷隨風渙北俘昆邪西戡伊靬荷負皇極劬勞萬幾勤民聽政昃食宵衣服貴綈皂風移閫闈唐山罷奏濮水韜徽訪採狂狷搜揚仄微世感中孚民惟大畜外戶無閉高垣奚築降情儒雅凝懷庠孰御廡為歡臨雍彌肅禮兼三代樂備九成天資武德地照文明墨屨斯在幪巾自清連珠合璧曜爽流精獸舞時豫禽歌頌平帝載維遠王靈維大候雨占風荒中海外憬彼鞮譯咸承冠帶是曰君臨斯為交泰白環已貢玄圭克貞東河佇楫北狄思征鉞斧將戒璁珩未鳴星淫去楚日沴悲荊億兆何舋穹昊遽傾嗚呼哀哉大禹胼胝重華腒臘仰惟勞務同斯違懌吉夢無徵昭祈奚益聽茂陵之鐘鼓抱喬陽之劍舄雖髣佛於神儀終纏綿以號劈嗚呼哀哉三占已吉四海星奔列賵天宇崩號帝閽千門啓於閶闔萬乘警於靈轀槐風悲於輦道松雨思於郊原鑾旆動而虛蹕宿衛靜而空尊嗚呼哀哉畢陌平夷流山蟠固紀無遷市唐有通樹經白社之修途回青門之廣路思沛邑以東臨懷周京以西顧嗚呼哀哉機神不測性道難稱充窮靡寄孺慕奚憑唯封云亭之與禪父肅玉牒之與金繩揚英聲而永久共日月而俱升嗚呼哀哉藝文類聚十四文苑英華八百三十五
