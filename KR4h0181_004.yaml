body:
  text: 後主棗賦芳園列幹森梢繁羅蕊餘莖少葉暗枝多復有奇樹風閒臨柯入夜影來未若丹心美實絳質嘉枝重針共暗枝瓠同瑰羞金盤于冰水薦玉案于深杯此歡心之未已方夢腸而屢回初學記二十八徐守銘本有此賦宋本無夜亭度雁賦春望山楹石暖苔生雲隨竹動月共水明暫消搖于夕徑聽霜鴻之度聲度聲已悽切猶含關塞鳴從風兮前倡駛帶暗兮後群驚帛久兮書字滅蘆束兮斷銜輕行雜響時亂響雜行時散已定空閨愁還長倡樓歎空閨倡樓本寂寂況此寒夜褰珠幔心悲調管曲未成手撫弦聊一彈一彈管且陳歌翻使怨情多初學記三十報尚書八座奏治始興王叔陵罪制凶逆梟獍反噬宮闈賴宗廟之靈時從仆滅撫情語事酸憤兼懷朝議有章宜從所奏也陳書始興王叔陵傳即位大赦詔上天降禍大行皇帝奄棄萬國攀號劈踊無所逮及朕以哀煢嗣膺寶曆若涉巨川罔知攸濟方賴群公用匡寡薄思播遺德覃被億兆凡厥遐邇咸與惟新可大赦天下在位文武及孝弟力田為父後者竝賜爵一級孤老鰥寡不能自存者賜穀人五斛帛二匹陳書後主紀許新安王伯固以庶人禮葬詔伯固同茲悖逆殞身途路今依外議意猶弗忍可特許以庶人禮葬陳書新安王伯固傳又詔伯固隨同巨逆自絶于天俾無遺育抑有恆典但童孺靡識兼預葭莩置之甸人良以惻憫及伯固所生王氏可竝特宥為庶人同上課農詔躬推為勸義顯前經力農見賞事昭往誥斯乃國儲是資民命攸屬豐儉隆替靡不由之夫入賦自古輸槀惟舊沃饒貴于十金磽確至于三易腴塉既異盈縮不同詐僞日興簿書歲改稻田使者著自西京不實峻刑聞諸東漢老農懼于祗應俗吏因而侮文輟耒成群游手為伍永言妨蠹良可太息今陽和在節膏澤潤下宜展春耨以望秋坻其有新闢塍畎進墾蒿萊廣袤勿得度量征租悉皆停免私業久廢咸許占作公田荒縱亦隨肆勤儻良守教耕淳民載酒有茲督課議以賞擢外可為格班下稱朕意焉陳書後主紀求賢詔夫體國經野長世字氓雖因革儻殊弛張或異至于旁求俊乂爰逮側微用道和羹是隆大廈上智中主咸由此術朕以寡薄嗣膺景祚雖哀疚在躬情慮惛舛而宗社任重黎庶務殷無由自安拱默敢忘康濟思所以登顯髦彥式備周行但空勞宵夢屢勤史卜五就莫來八能不至是用申旦凝慮景夜損懷豈以食玉炊桂無因自達將懷寶迷邦咸思獨善應內外衆官九品已上可各薦一人以會彙征之旨且取備實難舉長或易小大之用明言所施勿得南箕北斗名而非實其有負能仗氣擯壓當時著賓戲以自憐草客嘲以慰志人生一世逢遇誠難亦宜去此幽谷翔茲天路趨銅駝以觀國望金馬而來庭便當隨彼方圓飭之矩矱陳書後主紀求言詔昔睿后宰民哲王御㝢雖德稱汪濊明能普燭猶復紆己乞言降情訪道高咨嶽牧下聽輿臺故能政若神明事無悔吝朕纂承丕緒思隆大業常懼九重已邃四聰未廣欲聽昌言不疲痺足若逢廷折無憚批鱗而口柔之辭儻聞于在位腹誹之意或隱于具僚非所以弘理至公緝熙帝載者也內外卿士文武衆司若有智周政術心練治體救民俗之疾苦辨禁網之疏密者各進忠讜無所隱諱朕將虛己聽受擇善而行庶深鑒物情匡我王度陳書後主紀禁繁費詔朕臨御區宇撫育黔黎方欲康濟澆薄蠲省繁費奢僭乖衷實宜防斷應鏤金銀薄及庶物化生土木人綵花之屬及布帛幅尺短狹輕疏者竝傷財廢業尤成蠹患又僧尼道士挾邪左道不依經律民閒淫祀祅書諸珍怪事詳為條制竝皆禁絶陳書後主紀發遣北邊質任詔中歲克定淮泗爰涉青徐彼土酋豪竝輸罄誠款分遣親戚以為質任今舊土淪陷復成異域南北阻遠未得會同念其分乖殊有愛戀夷狄吾民斯事一也何獨譏禁使彼離析外可即檢任子館及東館并帶保任在外者竝賜衣糧頒之酒食遂其鄉路所之阻遠便發遣船仗衛送必令安達若已預仕宦及別有事義不欲去者亦隨其意陳書後主紀改元大赦詔朕以寡薄嗣守鴻基哀惸切慮疹恙纏織訓俗少方臨下靡算懼甚踐冰栗同馭朽而四氣易流三光遄至纓紱列陛玉帛充庭具物匪新節序疑舊緬思前德永慕昔辰對軒闥而哽心顧扆筵而慓氣思所以仰遵遺構俯勵薄躬陶鑄九流休息百姓用弘寬𥳑取叶陽和可大赦天下改太建十五年為至德元年陳書後主紀追封吳明徹詔李陵矢竭不免請降于禁水漲猶且生獲固知用兵上術世罕其人故侍中司空南平郡公明徹爰初躡足迄屆元戎百戰百勝之奇決機決死之勇斯亦侔于古焉及拓定淮肥長驅彭汴覆勍寇如舉毛掃鋭師同沃雪風威懾于異俗功效著于同文方欲息駕陰山解鞍瀚海既而師出已老數亦終奇不就結纓之功無辭入褚之屈望封崤之為易冀平翟之非難雖志在屈伸而奄中霜露埋恨絶域甚可嗟傷斯事已往纍逢肆赦凡厥罪戾皆蒙灑濯獨此孤魂未霑寬惠遂使爵土湮沒饗醊無主棄瑕録用宜在茲辰可追封邵陵縣開國侯食邑一千戶以其息惠覺為嗣陳書吳明徹傳追封程文季詔故散騎常侍前重安縣開國公文季纂承門緒克荷家聲早歲出軍雖非元帥啓行為最致果有聞而覆喪車徒允從黜削但靈洗之立功扞禦久而見思文季之埋魂異域有足可憫言念勞舊傷茲廢絶宜存廟食無使餧而可降封重安縣侯邑一千戶以子饗襲封陳書程靈洗附傳贈諡徐陵詔慎終有典抑乃舊章令德可甄諒宜追遠侍中安右將軍左光祿大夫太子少傅南徐州大中正建昌縣開國侯陵弱齡學尚登朝秀穎業高名輩文曰詞宗朕近歲承華特相引狎雖多臥疾方期克壯奄然殞逝震悼于懷可贈鎮右將軍特進其侍中左光祿鼓吹侯如故并出舉哀喪事所須量加資給諡曰章陳書徐陵傳詔答姚察省表具懷卿行業淳深聲譽素顯理徇情禮未膺刀筆但參務承華良所期寄允茲抑奪不得致辭也陳書姚察傳原除望訂租調積逋詔耕鑿自足乃曰淳風貢賦之興其來尚矣蓋由庚亟務不獲已而行焉但法令滋章姦盜多有俗尚澆詐政鮮惟良朕日旰夜分矜一物之失所泣辜罪己愧三千之未措望訂初下使彊蔭兼出如聞貧富均起單弱重斃斯豈振窮扇暍之意歟是乃下吏箕斂之苛也故曰百姓不足君孰與足自太建十四年望訂租調逋未入者竝悉原除在事百僚辨斷庶務必去取平允無得便公害民為己聲績妨紊政道陳書後主紀改築孔子廟詔宣尼誕膺上哲體資至聖祖述憲章之典竝天地而合德樂正雅頌之奧與日月而偕明垂後昆之訓範開生民之耳目梁季湮微靈寢忘處鞠為茂草三十餘年敬仰如在永惟愾息今雅道雍熙由庚得所斷琴故履零落不追閲笥開書無因循復外可詳之禮典改築舊廟蕙房桂棟咸使惟新芳蘩潔潦以時饗奠陳書後主紀大赦詔惟刑止暴惟德成物三才是資百王不改而世無抵角時鮮犯鱗渭橋驚馬弗聞廷爭桃林逸牛未見其旨雖剽悍輕侮理從鉗釱蠢愚杜默宜肆矜弘政乏良哉明慚則哲求諸刑措安可得乎是用屬寤寐以軫懷負黼扆而於邑復茲合璧輪缺連珠緯舛黃鍾獻呂和氣始萌玄英告中履長在御因時宥過抑乃斯得可大赦天下陳書後主紀贈諡司馬申詔慎終追遠欽若舊則闔棺定諡抑乃前典故散騎常侍右衛將軍文始縣開國伯申忠肅在公清正立己治繁處約投軀殉義朕任寄情深方康庶績奄然化往傷惻于懷可贈侍中護軍將軍進爵為侯增邑為五百戶諡曰忠給朝服一具衣一襲剋日舉哀喪事所須隨由資給陳書司馬申傳改元大赦詔柏皇大庭鼓淳和于曩日姬王嬴后被澆風于末載刑書已鑄善化匪融禮義既乖姦宄斯作何其淳朴不反浮華競扇者歟朕居中御物納隍在眷頻恢天網屢絶三邊元元黔庶終罹五辟蓋乃康哉寡薄抑焉法令滋章是用當寧弗怡矜此向隅之意今三元具序萬國朝辰靈芝獻于始陽膏露凝于聿歲從春施令仰乾布德思與九有惟新七政可大赦天下改至德五年為禎明元年陳書後主紀訊獄詔夫議獄緩刑皇王之所垂範勝殘去殺仁人之所用心自畫冠既息刻吏斯起法令滋章手足無措朕君臨區宇屬當澆末輕重之典在政未康小大之情興言多愧眷茲狴犴有軫哀矜可克日于大政殿訊獄陳書後主紀聞隋軍至下詔犬羊陵縱侵竊郊畿蜂蠆有毒宜時掃定朕當親御六師廓清八表內外竝可戒嚴南史十采石戍主徐子建至告變乃下詔手敕姚察卿羸瘠如此齊菲纍年不宜一飯有乖將攝若從所示甚為佳也陳書姚察傳敕施文慶謝貞在王家未有祿秩可賜米百石南史七十四謝貞傳敕迎釋智顗春寒猶厲道體何如宴坐經行無乃為斃都下法事恆興希相助弘闡今遣宣傳左右趙君卿迎接遲能即出也釋藏起字一號國清百録一第二敕得使人趙君卿啓并省來答表志存林野兼有疾病願停山寺不欲出都不具一二巖壑高深乃幽人之節佛法示現未必如此且京師甚有醫藥在疾彌是所宜故遣前主書朱宙迎接想便相隨出都唯遲法流不滯會言在近同上第三敕前雖遣兩使殊未委悉意存三寶故有相迎今復遣龍宮寺道升竝令面陳一二也同上敕東揚州刺史永陽王聞王在州迎顗禪師大弘法事甚會朕心今迎出都王宜敦諭申朕意也同上敕書迎候智顗敕書迎候智顗近得永陽王啓知禪師遂能屈德隨朕使出都甚有欣遲當稍次近路涉險道殊足為勞今遣敕左右黃吉寶迎候但未知欲安止何寺想示使人仍令前還即勒所由料理房舍也遲近會言此未委悉三月二十四日同上敕治光宅寺光宅是梁武龍潛之地不整處多今敕繕量隨由就功一二羅闡取來意同上敕報謝貞省啓具懷雖知哀煢在疚而官俟得才禮有權奪可便力疾還府也陳書謝貞傳敕答江總姚察非惟學藝優博亦是操行清修典選難才今得之矣陳書姚察傳尚書令江總等薦察為吏部尚書敕答授江總尚書令冊文於戲夫文昌政本司會治經韋彪謂之樞機李固方之斗極況其五曹斯綜百揆是諧同冢宰之司專臺閣之任惟爾道業標峻宇量弘深勝範清規風流以為準的辭宗學府衣冠以為領袖故能師長六官具瞻允塞明府八座儀形載遠其端朝握揆朕所望焉往欽哉懋建爾徽猷亮采我邦國可不慎歟陳書江總傳初學記十一宣旨誡諭姚察知比哀毀過禮甚用為憂卿迥然一身宗奠是寄毀而滅性聖教所不許宜微自遣割以存禮制憂懷既深故有此及陳書姚察傳與江總書悼陸瑜管記陸瑜奄然殂化悲傷悼惜此情何已吾生平愛好卿等所悉自以學涉儒雅不逮古人欽賢慕士是情尢篤梁室亂離天下糜沸書史殘缺禮樂崩淪晚生後學匪無牆面卓爾出群斯人而已吾識覽雖局未曾以言議假人至于片善小才特用嗟賞況復洪識奇士此故忘言之地論其博綜子史諳究儒墨經耳無遺觸目成誦一褒一貶一激一揚語玄析理披文摘句未嘗不聞者心伏聽者解頤會意相得自以為布衣之賞吾監撫之暇事隙之辰頗用談笑娛情琴樽閒作雅篇豔什迭互鋒起每清風明月美景良辰對群山之參差望巨波之滉漾或玩新花時觀落葉既聽春鳥又聆秋雁未嘗不促膝舉觴連情發藻且代琢磨閒以嘲謔俱怡耳目竝留情致自謂百年為速朝露可傷豈謂玉折蘭摧遽從短運為悲為恨當復何言遺迹餘文觸目增泫絶絃投筆恆有酸恨以卿同志聊復敘懷涕之無從言不寫意陳書陸瑜傳瑜卒太子親製祭文遣使者弔祭仍與詹事江總書揚都興皇寺釋法朗墓銘洪源遠采傳芳馥蕙君子哲人英芬是繼朱旄既杖青組仍曳紉虎戎印二貌狄制功可冠軍業非出世揖彼聲色超此津濟津濟伊何裂斷網羅忍衣早記乘樓夜過航斯苦海涸此愛河若非智士孰寄宣揚法雲廣被慧日舒光既摧衝櫓自闢金湯夢齊鼓說應異鐘霜識機知命同彼現病夙心棲遁度脫難竟化緣已矣乃宅丘穽智炬寂滅頽巖遼敻遼敻空岑搖落寒侵弦餘月暗霧下松深香滅窮壟幡橫宿林切切管清遙遙鼓聲野煙四合孤禽一鳴風悽唄斷流急寒生神之淨土形沈終古勒此方墳用旌蘭杜續高僧傳題江總所撰孫瑒墓志銘後四十字題江總所撰孫瑒墓志銘後四十字秋風動竹煙水驚波幾人樵徑何處山阿今時日月宿昔綺羅天長路遠地久雲多功臣未勒此意如何陳書孫瑒傳臨川王入纂令昊天不弔上玄降禍大行皇帝奄捐萬國率土哀號普天如喪窮酷煩冤無所逮及諸孤藐爾反國無期須立長主以寧寓縣侍中安東將軍臨川王蒨體自景皇屬惟猶子建殊功于牧野敷盛業于戡黎納麓時敘之辰負扆乘機之日竝佐時雍是同草創祧祏所繫遐邇宅心宜奉大宗嗣膺寶録使七廟有奉兆民寧晏未亡人假延餘息嬰此百罹尋繹纏綿興言感絶陳書文帝紀永定三年六月高祖崩遺詔徵世祖入纂甲寅至自南皖入居中書省皇后令廢少主為臨海王以安成王入纂令中軍儀同鎮北儀同鎮右將軍護軍將軍八座卿士昔梁運季末海內沸騰天下蒼生殆無遺噍高祖武皇帝撥亂反正膺圖御籙重懸三象還補二儀世祖文皇帝克嗣洪基光宣寶業惠養中國綏寧外荒竝戰戰兢兢劬勞締構庶幾鼎運方隆殷夏伯宗昔在儲宮本無令聞及居崇極遂騁凶淫居處諒暗固不哀戚嬪嬙丱角就館相仍豈但依車所納是譏宗正衰絰生子得誚右師七百之祚何憑三千之罪為大且費引金帛令充椒閫內府中藏軍備國儲未盈基稔皆已空竭大傅親承顧託鎮守宮闈遺詔綢繆義深垣屏而欑塗未御翌日無淹仍遣劉師知殷不佞等顯言排斥韓子高小豎輕佻推心委仗陰謀禍亂決起蕭牆元相雖持但除君側又以余孝頃密邇京師便相徵召殃慝之咎凶徒自擒宗社之靈祅氛是滅于是密詔華皎稱兵上流國祚憂惶幾移醜類乃至要招遠近叶力巴湘支黨縱橫寇擾黟歙又別敕歐陽紇等攻逼衡州嶺表紛紜殊淹弦望豈止罪浮于昌邑非唯聲醜于太和但賊豎皆亡祅徒已散日望懲改猶加淹抑而悖禮忘德情性不悛樂禍思亂昏慝無已張安國蕞爾凶狡窮為小盜仍遣使人蔣裕鉤出上京即置行臺分選凶黨賊皎妻呂舂徒為戮納自奚宮藏諸永巷使其結引親舊規圖戕禍蕩主侯法喜等太傅麾下慣遊府朝啖以深利謀興肘腋適又蕩主孫泰等潛相連結大有交通兵力殊彊指期挺亂皇家有慶曆數遐長天誘其衷同然開發此諸文迹今以相示是而可忍誰則不容祖宗基業將懼傾霣豈可復肅恭禋祀臨御兆民式稽故實宜在流放今可特降為臨海郡王送還藩邸太傅安成王固天生德齊聖廣深二后鍾心三靈佇眷自前朝不悆任總邦家威惠相宣刑禮兼設指揮嘯咤湘郢廓清闢地開疆荊益風靡若太戊之承殷曆中都之奉漢家校以功名曾何髣佛且地彰靈璽天表長彗布新除舊禎祥咸顯文皇知子之鑒事甚帝堯傳弟之懷又符太伯今可還申曩志崇立賢君方固宗祧載貞辰象中外宜依舊典奉迎輿駕未亡人不幸屬此殷憂不有崇替容危社稷何以拜祠高寢歸祔武園攬筆潸然兼懷悲慶陳書廢帝紀黜始興王伯茂令伯茂輕薄爰自弱齡辜負嚴訓彌肆凶狡常以次居介弟宜秉國權不涯年德逾逞狂躁圖為禍亂扇動宮闈要招粗險觖望臺閣嗣君喪道由此亂階是諸凶德咸作謀主允宜罄彼司甸刑斯剭人言念皇支尚懷悲悶可特降為溫麻侯宜加禁止別遣就第不意如此言增泫歎陳書始興王伯茂傳皇太后令黜廢帝為臨海王其日又下令遺令喪事所須竝從儉約諸有饋奠不得用牲牢陳書宣皇后章氏傳與釋智顗手書妙覺和南今遣內師許大梵往稽首乞傳香火願賜菩薩名庶𧂐熏修菩提眷屬謹和南釋藏起字一號國清百録一齎書召何之元孔璋無罪左車見用陳書何之元傳叔陵遣功曹史柳咸齎書召之元又見南史何之元傳
