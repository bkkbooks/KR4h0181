body:
  text: 張正見石賦連山蔽虧巨石嶔崎上興雲而蔚會下激水而推移舒丹霞于九折混白露于三危鎮方城于漢水固天闕于湯池依島嶼而緜邈住谿壑之嶮巇開五嶽之靈圖集九老之仙都韜神弓于射的產利劍于昆吾魚躍湘鄉之水雁浮平固之湖墮山鵲之金印碎驪龍之寶珠奄藹披衣氤氳翠微精衛取而填海天孫用以支機隨西王而不落傍東武而俱飛爾乃蘊怪含靈懷奇蓄變獸形鳥像畜身人面已休陳倉之雞復舞零陵之燕迎一童于洛陽之水送五婦于成都之縣帝王憩而投壺仙人坐而高宴架滄海之神塘儼夷陵之瑞場發黃金之祕簡隱白玉于仙床雙立天門之郡特起縉雲之堂李廣射而為虎初平叱以成羊圖孔明之八陣亙吳橘之三梁驚神人于武落駭商客于翟塘藝文類聚六初學記五山賦何神山之峻美諒苞結之所成東垂曰泰南服稱衡西戎所擅北狄標名于是堯值洪流滔天襄陵禹敷水土奠高槎木眾川既導群岳自修潛通四瀆鎮壓九州森羅辰象吐吸雲霧深不可測遠不可步於廓靈山長為作固爾其為狀也則武當太和武功太白崑崙五門扶寍三石峰高一萬峭峙三百登而眺之則千里無極俯而臨之則萬仞難測映白鶴而同高混青天而共色藝文類聚七衰桃賦巖巖秀峰吐桂榮松獨夭桃之灼灼輕擢采于寒蹤爾乃萬株成錦千林似翼苔畫波文花然樹色發秦源而逸氣飄漢綬而流芳譬蘭缸之夜炷似明鏡之朝妝成蹊列逕光崖豔氾閒真定之蒼梨雜房陵之縹李芬芳難歇照曜無儔舒若霞光欲起散似電采將收既而風落新枝霜飛故葉歎垂釣之妖童怨傾城之麗妾藝文類聚八十六初學記二十八謝賜錢啟豈期疲痾壁立猥蒙殊賜名稱榆莢非投飲馬之橋價重圓泉寍棄呪雞之野暫移周府纔經漢鑄始降王門忽光私室青鳧委質笑夷甫之不言赤仄垂緡重河閒之能數初學記二十七應詔語賦覈生民之要技實言語以為前樞機誠為急務筆札乃是次焉擬金人于右階稱石人于左邊鄭僑戎服而無媿張儀舌存而理痊唯諾唯辯何者是與故知于時言言于時語語若乃遼城嶮峻齊陳交加燕將恐懼漢帝咄嗟魯連纔吐數句酈子直御單車息十重之縈帶賢百萬之諠譁至于蘭臺靜祕華燭高明徐斟桂醑緩奏秦聲二三朋好數四才英既說前賢之往行重覩生死之交情扼腕抵掌攘袂盱衡當斯時也何者為榮欲同吃如鄧士載欲作辯似婁君卿為守為相竝如此少意少事不成名蓺文類聚十九食梅賦魏無林而止渴范留信而前嘗賜一時之名果遂懷核而矜莊昔詠酸棗之臺今食酸味之梅眼同曹瞞之見樹形異韋誕之聞雷胸既咽而思鳩杖悶欲死而想仙杯非投壺而天笑等王孫而客咍蓺文類聚八十六初學記二十八奏請詔智顗還都瓦官禪師德邁風霜禪鏡淵海昔在京邑群賢所宗今高步天台法雲東譪願陛下詔之還都使道俗咸荷續高僧傳二十一智顗與兄子秀書旦見汝書與孝典陳吾飲酒過差吾有此好五十餘年昔吳國張長公亦稱耽嗜吾見張時伊已六十自言引滿大勝少年時吾今所進亦多于往日老而彌篤唯吾與張季舒耳吾方與此子交歡于地下汝欲笑吾所志邪昔阮咸阮籍同遊竹林宣子不聞斯言王湛能玄言巧騎武子呼為癡叔何陳留之風不嗣太原之氣巋然翻成可怪吾既寂漠當世朽病殘年產不異于顏原名未動于卿相若不日飲醇酒復欲安歸汝以飲酒為非吾不以飲酒為過昔周伯仁度江唯三日醒吾不以為少鄭康成一飲三百盃吾不以為多然洪醉之後有得有失成廝養之志是其得也使次公之狂是其失也吾常譬酒之猶水亦可以濟舟亦可以覆舟故江諮議有言酒猶兵也兵可千日而不用不可一日而不備酒可千日而不飲不可一飲而不醉美哉江公可與共論酒矣汝驚吾墮馬侍中之門陷池武陵之第徧布朝野自言焦悚丘也幸苟有過人必知之吾生平所願身沒之後題吾墓云陳故酒徒陳君之神道若斯志意豈避南征之不復賈誼之慟哭者哉何水曹眼不識盃鐺吾口不離瓢杓汝寍與何同日而醒與吾同日而醉乎政言其醒可及其醉不可及也速營糟丘吾將老焉爾無多言非爾所及南史六十一陳暄傳笛賦貞筠翠節冒霜停雪江潭薦竿巴人所截五音是備六孔斯設殊響抑揚似出平陽曲疑高殿聲幽洞房既逐舞而迴袖亦將歌而繞梁忽從弄而危短乍調吹而柔長于是時也趙瑟輟謳齊竿息唱見象筵之悅耳聽清笛之寥亮初學記十六博山香鑪賦器象南山香傳西國下諼巧鑄兼資匠刻麝火埋朱蘭烟毀黑結搆危峰橫羅雜樹寒夜含暖清霄吐霧制作巧妙獨稱珍淑氣氛氳長似春隨風本勝千釀酒散馥還如一碩人初學記二十五獄中上陳後主書夫君人者恭事上帝子愛下民省嗜慾遠諂佞未明求衣日旰忘食是以澤被區宇慶流子孫陛下頃來酒色過度不虔郊廟之神專媚淫昏之鬼小人在側宦豎弄權惡忠直若仇讎視生民如草芥後宮曳綺繡廄馬食菽粟百姓離散僵尸蔽野貨賄公行帑藏捐耗神怒民怨眾叛親離恐東南王氣自斯而盡矣陳書傅縡傳南史六十九文苑英華六百七十三明道論縡篤信佛教從興皇惠朗法師受三論盡通其學時有大心暠法師著無諍論以詆之縡乃為明道論用釋其難其論曰無諍論言比有弘三論者雷同詆訶恣言罪狀歷毀諸師非斥眾學論中道而執偏心語忘懷而競獨勝方與數論更為讎敵讎敵既構諍鬭大生以此之心而成罪業罪業不止豈不重增生死大苦聚集荅曰三論之興為日久矣龍樹創其源除內學之偏見提婆揚其旨蕩外道之邪執欲使大化流而不擁玄風闡而無墜其言矌其意遠其道博其流深斯固龍象之騰驤鯤鵬之摶運蹇乘決羽豈能觖望于其閒哉頃代澆薄時無曠士苟習小學以化蒙心漸染成俗遂迷正路唯競穿鑿各肆營造枝葉徒繁本源日翳一師解釋復異一師更改舊宗各立新意同學之中取寤復別如是展轉添糅倍多總而用之心無的準擇而行之何者為正豈不渾純傷竅嘉樹獘牙雖復人說非馬家握靈虵以無當之卮同畫地之餅矣其于失道不亦宜乎攝山之學則不如是守一遵本無改作之過約文申意杜臆斷之情言無預說理非宿構覩緣爾乃應見敵然後動縱橫絡繹忽恍杳冥或彌綸而不窮或消散而無所煥乎有文章蹤朕不可得深平不可量即事而非遠凡相酬對隨理詳覈有何嫉詐干犯諸師且諸師所說為是可毀為不可毀若可毀者毀故為衰若不可毀毀自不及法師何獨蔽護不聽毀乎且教有小大備在聖誥大乘之文則指斥小道今弘大法寍得不言大乘之意邪斯則襃貶之事從弘放學與奪之辭依經議論何得見佛說而信順在我語而忤逆無諍平等心如是邪且忿恚煩惱凡夫恆性失理之徒率皆有此豈可以三脩未愜六師懷恨而蘊涅槃妙法永不宣揚但冀其忿憤之心既極恬淡之悟自成耳人面不同其心亦異或有辭意相反有心口相符豈得必謂他人說中道而心偏執已行無諍外不違而內平等讎敵鬭訟豈我事焉罪業聚集鬭諍者所畏耳無諍論言攝山大師誘進化導則不如此即習行于無諍者也導悟之德既往淳一之風已澆競勝之心呵毀之興盛于茲矣吾願息諍以通道讓勝以忘德何必排撥異家生其恚怒者乎若中道之心行于成實亦能不諍若以偏著之心說于中論亦得有諍固知諍與不諍偏在一法荅曰攝山大師實無諍矣但法師所賞未衷其節彼靜守幽谷寂爾無為凡有訓勉莫匪同志從容語嘿物無閒然故其意雖深其言甚約今之敷畼地勢不然處王城之隈聚落之內呼吸顧望之客脣吻縱橫之士奮鋒穎勵羽翼明目張膽披堅執銳騁異家衍別解窺伺閒隙邀冀短長與相酬對榷其輕重豈得默默無言唯唯應命必須掎摭同異發摘玼瑕忘身而弘道忤俗而通教以此為病益知未達若令大師當此之地亦何必默已而為法師所貴邪法師又言吾願息諍以通道讓勝以忘德道德之事不止在諍與不諍讓與不讓也此語直是世閒所重法師慕而言之竟未知勝若為可讓也若他人道高則自勝不勞讓矣他人道劣則雖讓而無益矣欲讓之辭將非虛設中道之心無處不可成實三論何事致乖但須息守株之解除膠柱之意是事皆中也來旨言諍與不諍偏在一法何為獨襃無諍邪詎非矛盾無諍論言邪正得失勝負是非必主于心矣非謂所說之法而有定相論勝劣也若異論是非以偏著為失言無是無非消彼得失以此論為勝妙者他論所不及此亦為失也何者凡心所破豈無心于能破則勝負之心不忘寍不在勝者乎斯則矜我為得棄他之失即有取捨大生是非便是諍論荅曰言為心使心受言詮和合根塵鼓動風氣故成語也事必由心實如來說至于心造偽以使口口行詐以應心外和而內險言隨而意逆求利養引聲名入道之人在家之士斯輩非一聖人所以曲陳教誡深致防杜說現在之殃咎敘將來之患害此文明著甚于日月猶在忘愛軀冒峻制陷湯炭甘齏粉必行而不顧也豈能悅無諍之作而回首革音邪若弘道之人宣化之士心知勝也口言勝也心知劣也口言劣也亦無所包藏亦無所忌憚但直心而行之耳他道雖劣聖人之敬也已德雖優亦聖人之教也我勝則聖人勝他劣則聖人劣聖人之優劣蓋根緣所宜然于彼于此何所厚薄哉雖復終日案劍終夜擊柝瞑目以爭得失作氣以求勝負勝負在誰處乎有心之與無心徒欲分別虛空耳何意不許我論說而使我謙退此謂鷦鵬已翔于寥廓而虞者猶窺藪澤而求之嗟乎丈夫當弘斯道矣無諍論言無諍之道通于內外子所言須諍者此用末而救本失本而營末者也今為子言之何則若依外典尋書契之前至淳之世朴質其心行不言之教當于此時民至老死不相往來而各得其所復有何諍乎固知本末不諍是物之真矣荅曰諍與不諍不可偏執本之與末又安可知由來不諍寍知非末于今而諍何驗非本夫居後而望前則為前居前而望後則為後而前後之事猶如彼此彼呼此為彼此呼彼為彼彼此之名的居誰處以此言之萬事可知也本末前後是非善惡可恆專邪何得自信聰明廢他耳目夫水泡生滅火輪旋轉入牢穽受羈紲生憂畏起煩惱其失何哉不與道相應而起諸見故也相應者則不然無為也無不為也善惡不能偕而未曾離善惡生死不能至亦終然在生死故得永離而任放焉是以聖人念繞桎之不脫愍黏膠之難離故殷勤教示備諸便巧希向之徒涉求有類雖鱗角難成象形易失寍得不髣髴遐路勉勵短晨日常念己身之善惡莫揣他物而欲分別而言我聰明我知見我計較我思惟以此而言亦為疏矣他人者實難測或可是凡夫真爾亦可是聖人俯同時俗所宜見果報所應覩安得肆胸襟盡情性而生譏誚乎正應虛己而遊乎世使俛仰于電露之閒耳明月在天眾水皆見清風既至群籟畢響吾豈逆物哉不入鮑魚不甘腐鼠吾豈同物哉誰能知我共行斯路浩浩乎堂堂乎豈復見有諍為非無諍為是此則諍者自諍無諍者自無諍吾俱中取而用之寍勞法師費功夫點筆紙但申于無諍弟子疲脣舌消晷漏唯對于明道戲論於糟粕哉必欲且攷真偽蹔觀得失無過依賢聖之言檢行藏之理終始研究表裏綜覈使浮辭無所用詐道自然消請待後筵以觀其妙矣陳書傅縡傳文苑英華七百四十七上後主書昔高祖南平百越北誅逆虜世祖東定吳會西破王琳高宗克復淮南辟地千里三祖之功亦至勤矣陛下即位于今五年不思先帝之艱難不知天命之可畏溺于嬖寵惑于酒色祠七廟而不出拜妃嬪而臨軒老臣宿將棄之草莽諂佞讒邪昇之朝廷今疆埸日蹙隋軍壓境陛下如不改弦易張臣見麋鹿復遊于姑蘇臺矣陳書傅縡傳禎明初華上書極諫後主大怒即日命斬之為王寬與婦義安主書昔魚嶺逢車芝田息駕雖見妖婬終成揮忽遂使家勝陽臺為歡非夢人慚蕭史相偶成仙輕扇初開欣看笑靨長眉始畫愁對離妝猶聞徙佩顧長廊之未盡尚分行幰冀迥陌之難迴廣攝金屏莫令愁擁恆開錦幔速望人歸鏡臺新去應餘落粉燻罏未徙定有餘煙淚滴芳衾錦花長溼愁隨玉軫琴鶴恆驚已覺錦水丹鱗素書稀遠玉山青鳥仙使難通綵筆試操香牋遂滿行雲可託夢想還勞九重千日詎想倡家單枕一宵便如蕩子當令照影雙來一鸞差鏡勿使窺窗獨坐姮娥笑人蓺文類聚三十二遺疏告族子凱吾少罹酷罰十四傾外蔭十六鍾太清之禍流離絕國二十餘載號天蹐地遂同有感得還侍奉守先人墳墓于吾之分足矣不悟朝廷採拾空薄累致清階縱其殞絕無所酬報今在憂棘晷漏將盡斂手而歸何所多念氣絕之後若直棄之草野依僧家尸陁林法是吾所願正恐過為獨異耳可將薄板周身載以靈車覆以葦茨坎山而埋之又吾終鮮兄弟無他子孫靖年幼少未閑人事但可三月施小床設香水盡卿兄弟相厚之情即除之無益之事勿為也陳書謝貞傳又略見南史謝貞傳作載以露車覆以草席風裏蟬賦有秋風之來庭于高柳之鳴蟬或孤吟而暫斷乍亂響而還連垂玄緌而嘶定避黃雀而聲遷秋人兮易驚靜聽兮傷情聽蟬兮靡惓更相和兮風生終不校樹兮寂寞方復飲露兮光榮初學記三十
