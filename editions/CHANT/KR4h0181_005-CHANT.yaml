body:
  text: 周弘正請梁武帝釋乾坤二繫義表臣聞易稱立象以盡意繫辭以盡言然後知聖人之情幾可見矣自非含微體極盡化窮神豈能通志成務探賾致遠而宣尼比之桎梏絕韋編于漆字軒轅之所聽瑩遺玄珠于赤水伏惟陛下一日萬機匪勞神于瞬息凝心妙本常自得于天真聖智無以隱其幾深明神無以淪其不測至若爻畫之包于六經文辭之窮于兩繫名儒劇談以歷載鴻生抵掌以終年莫有試遊其藩未嘗一見其涘自制旨降談裁成易道析至微于秋毫渙曾冰于幽谷臣親承音旨職司宣授後進詵詵不無傳業但乾坤之蘊未剖繫表之妙莫詮使一經深致尚多所惑臣不涯庸淺輕率短陋謹與受業諸生清河張譏等三百一十二人于乾坤二繫象爻未啟伏願聽覽之閒曲垂提訓得使微臣鑽仰成其篤習後昆好事專門有奉自惟多幸懽沐道于堯年肄業終身不知老之將至天尊不閒而冒陳請冰谷寘懷罔識攸厝陳書周弘正傳弘正啟梁武帝周易疑義五十條又請釋乾坤二繫又見蓺文類聚五十五測獄刻數議未知獄所測人有幾人款幾人不款須前責取人名及數并其罪目然後更集得梁代舊律測囚之法日一上起自暔鼓盡于二更及比部郎范泉刪定律令以舊法測立時久非人所堪分其刻數日再上廷尉以為新制過輕請集會尚書省詳議都官尚書周弘正云云凡小大之獄必應以情政言依準五聽驗其虛實豈可全恣考掠以判刑罪且測人時節本非古制近代已來方有此法起自晡鼓迄于二更豈是常人所能堪忍所以重械之下危墯之上無人不服誣枉者多朝晚二時同等刻數進退而求于事為衷若謂小促前期致實罪不伏如復時節延長則無愆妄款且人之所堪既有彊弱人之立意固亦多途至如貫高榜笞刺爇身無完膚戴就熏針竝極困篤不移豈關時刻長短掠測優劣夫與殺不辜寍失不經罪疑惟輕功疑惟重斯則古之聖王垂此明法愚謂依范泉著制于事為允陳書沈洙傳又南史七十一奏記晉安王竊聞撝謙之象起于羲軒爻畫揖讓之源生于堯舜禪受其來尚矣可得而詳焉夫以廟堂汾水殊途而同歸稷契巢許異名而一貫出者稱為元首處者謂之外臣莫不內外相資表裏成治斯蓋萬代同規百王不易者也暨于三王之世寖以陵夷各親其親各子其子乃至七國爭雄劉項競逐皇漢扇其俗有晉揚其波謙讓之道廢多歷年所矣夫文質遞變澆淳相革還樸反古今也其時伏惟明大王殿下天挺將聖聰明神武百辟冠冕四海歸仁是以皇上發德音下明詔以大王為國之儲副乃天下之本焉雖復夏啟周誦漢儲魏兩此數君者安足為大王道哉意者願聞殿下抗目夷上仁之義執子臧大賢之節逃玉輿而弗乘棄萬乘如脫屣庶改澆競之俗以大吳國之風古有其人今聞其語能行之者非殿下而誰能使無為之化復興于遂古讓王之道不墜于來葉豈不盛歟豈不盛歟弘正陋學書生義慚稽古家自汝潁世傳忠烈先人決曹掾燕抗辭九諫高節萬乘正色三府雖盛德之業將絕而狂直之風未墜是以敢布腹心肆其愚瞽如使芻言野說少陳于聽覽縱復委身烹鼎之下絕命肺石之上雖死之日猶生之年陳書周弘正傳中大通三年昭明太子薨其嗣華容公不得立以晉安王為皇太子弘正乃奏記謝梁元帝賚春秋糊屏風啟昔琉璃見重雲母稱珍雖盡華麗有傷真樸豈若三體五例對玩前史一字襃貶坐臥箴規無復楚臺之風得同鄒谷之暖蓺文類聚六十九謝梁元帝賚玉門棗啟安期舊美安息高名臣金馬之榮未獲趨奉方朔之賜遽降洪恩蓺文類聚八十七謝敕賚烏紗帽等啟雖復魏宣二端豈能比今茲賜廣微四縫未足方其華飾既受非望之恩方貽匪服之誚蓺文類聚六十七謝東宮賜縠袍啟或儔名麗辭等質輕霧或色華少海用寶叢臺或粲彼三英縫茲五緎品頒歲襲綠奪春耕蒿席可充縕袍易足蓺文類聚六十七謝敕賚紫鮓啟珍韜江浦味越名川昔聞八駿東征上收黑水之麥七華西討才獲苦山之菜豈如兩階干舞四方來格臨朝拱默任土爭貢蓺文類聚七十二山蘭賦爰有奇特之草產于空崖之地仰鳥路而裁通視行蹤而莫至挺自然之高介豈眾情之服媚寍紉結之可求兆延佇之能洎稟造化之均育與卉木而齊致入坦道而銷聲屏山幽而靜異獨見識于琴臺竊逢知于綺季蓺文類聚八十一奏宋齊故事齊氏承宋咸用元徽舊式宗祀朝饗奏樂俱同唯北郊之禮頗有增益皇帝入壝門奏永至飲福酒奏嘉胙太尉亞獻奏凱容埋牲奏隸幽帝還便殿奏休成眾官竝出奏肅成此乃元徽所闕永明六年之所加也唯送神之樂宋孝建二年秋起居注云奏肆夏永明中改奏昭夏隋書音樂志上陳初武帝詔求宋齊故事太常卿周弘讓奏荅王襃書甚矣悲哉此之為別也雲飛泥沈金鑠蘭滅玉音不嗣瑤華莫因家兄至自鎬京致書于窮谷故人之跡有如對面開題申紙流臉沾膝江南燠熱橘柚冬青渭北沍寒楊榆晚葉土風氣候各集所安餐衛適時寢興多福甚善甚善與弟分袂西陜言反東區雖保周陵還依蔣徑三姜離析二仲不歸麋鹿為曹更多悲緒丹經在握貧病莫諧芝朮可求恆為采掇昔吾壯日及弟富年俱值邕熙竝歡衡泌南風雅操清商妙曲弦琴促坐無乏名晨玉瀝金華冀獲難老不虞一旦翻覆波瀾吾已愒陰弟非茂齒禽尚之契各在天涯永念生平難為胸臆且當視陰數箭排愁破涕人生樂耳憂戚何為豈能遽悲次房游魂不返遠產骸柩無託但願愛玉體珍金相保期頤享黃髮猶冀蒼雁赬鯉時傳尺素清風明月俱寄相思子淵子淵長為別矣搦管操觚聲淚俱咽周書王襃傳蓺文類聚三十與徐陵書薦方圓吾荷朝恩得安丘壑身名兩泰夫復奚言但願沐浴堯風遨遊舜日安服飽食以送餘齒然性靈未能灰弭其閒復須友生言晤後來英俊竝出方為時生林谷之中鮮逢退逸唯趙郡方圓棲遲天目年過強仕不慕時榮文史足用學蓺優敏中歲暫遊宛洛蒙弟識異其人方儲之胤衣冠未絕雅奉閑逸得性丘林與吾朋遊積有年歲今復同在巖壑畢志風雲琴案清商詩題空谷比幽貞道缺考盤絕詠賁五履二兩爻無閒方今公旦作輔億兆攸賴激貪懲競儻自圓起弟以搜揚佐世水鏡求賢脫能登此仄陋論言是屬翹弓遠賁則山谷咸勸足令廉風復振懦夫能立豈不弘哉圓若蒙此旌招未必不鑿坯而達于廊廟之用脫不能賁然來思而于退讓之道于斯為貴恐弟未究東川人士聊復起予今言吾家上宰之貴無以微裨萬一此舉脫復入聽少得不負夙心周弘讓白文苑英華六百七十七遺疏敕其家吾今年已來筋力減耗可謂衰矣而好生之情曾不自覺唯務行樂不知老之將至今時制云及將同朝露七十餘年頗經稱足啟手告全差無遺恨氣絕已後便買市中見材材必須小形者使易提挈斂以時服古人通制但下見先人必須備禮可著單衣裙衫故履既應侍養宜備紛帨或逢善友又須香烟棺內唯安白布手巾麤香爐而已其外一無所用陳書周弘直傳梁典序記事之史其流不一編年之作無若春秋則魯史之書非帝皇之籍也案三皇之𥳑為三墳五帝之策為五典此典義所由生也至乃尚書述唐帝為堯典虞帝為舜典斯又經文明據是以典之為義久矣哉若夫馬史班漢述帝稱紀自茲厥後因相祖習及陳壽所撰名之曰志總其三國分路揚鑣唯何法盛晉書變帝紀為帝典既云師古在理為優故今之所作稱為梁典梁有天下自中大同以前區寓寍晏太清以後寇盜交侵首尾而言未為盡美故開此一書分為六意以高祖創基因乎齊末尋宗討本起自永元今以前如干卷為追述高祖生自布衣長于獘俗知風教之臧否識民黎之情偽爰逮君臨弘斯政術四紀之內實云殷阜今以如干卷為太平世不常夷時無恆治非自我後仍屬橫流今以如干卷為敘亂洎高祖晏駕之年太宗幽辱之歲謳歌獄訟向西陜不向東都不庭之民流逸之士征伐禮樂歸世祖不歸太宗撥亂反正厥庸斯在治定功成其勳有屬今以如干卷為世祖至于四海困窮五德升替則敬皇紹立仍以禪陳今以如干卷為敬帝驃騎王琳崇立後嗣雖不達天命然是其忠節今以如干卷為後嗣主至在太宗雖加美諡而大寶之號世所不遵蓋以拘于賊景故也承聖紀厤自接太清神筆詔書非宜輒改詳之後論蓋有理焉夫事有始終人有業行本末之閒頗宜詮敘案臧榮緒稱史無裁斷猶起居注耳由此而言實資詳悉又編年而舉其歲次者蓋取分明而易尋也若夫獫狁孔熾鯁我中原始自一君終為二主事有相涉言成混漫今以未分之前為北魏既分之後高氏所輔為東魏宇文所挾為西魏所以相分別也重以蓋彰殊體繁省異文其閒損益頗有凡例陳書何之元傳梁典總論歷究前書詳觀往行昭晰千載氛氳萬古攷其寬猛知布政之善惡驗其黜陟識其主之是非以曩求今工拙可見齊季昏虐政由群小朝宰被無辜之誅藩戚懼淫刑之害高祖痛兄弟之戮因天下之心舉荊雍之師興易武之伐指揮則智勇風從號令則遐邇嚮應取鄢郢若拉枯定金陵如沃雪黃越既斬白旗乃懸師不疲勞民無怨讟樂推在代德是膺逆取順治享年四紀萬幾事廣六職務殷負扆君臨勤于聽覽兢兢罔倦乾乾不已加以蓺業之美莫以比倫洞曉儒玄該羅內外舉洙泗之餘教針其膏肓采周孔之遺文正其魚魯于是廣開庠序敦勸後生親自觀試策其優劣由近及遠咸從風化執經者連袂負笈者排肩濟濟多士于斯為盛至若御民之術未為得也敢以狂瞽請究其說夫根深者葉茂源廣者流長故聖王欲其茂長前為深廣是以擇沃壤以置王畿國都圜于六鄉封域號于千里其外則布之以五等列之以萬國分疆畫野立樹黨閭境隴以懷其仁桑梓以安其俗諸侯守境土以事于上天子執賞罰以臨于下有功則襃無道則廢二伯弼于內朝九牧佐于外政閒之以賢戚參之以懿親弘仁義于區中被禮樂于遐表忠信之禮達謙讓之風行爾乃覬覦之心絕兵戈疊息刑辟靡用獄訟罔興然後龜龍遊於池沼鸞鳳棲于苑囿及其末世雖主昏于上民亂于下猶晉鄭有依桓文是相絕而更續顛而必扶數百年內方至于滅周道既沒斯風漸喪洎于後代其獘尤甚罔恤民之不存而憂士之不祿蒞民之長守次更為前人未安後人便及迎新送故疲于道塗為君者甚多為民者甚少由是君臣之義薄狡惡之萌興下上遞憎甚于仇敵百城恣其暴奪億兆困其徵求損棄舊卿奔亡他縣地荒邑散私少官多于是倉庫既空賦斂更重天示譴禍地出妖祥饑疫互生水旱交至民不堪命轟然土崩數十年閒還為黎庶高祖博覽今古備觀興亡猶復躡其遺風襲其獘法澆薄逾甚淆紊日滋梁氏之有國少漢之一郡大半之人竝為部曲不耕而食不蠶而衣或事王侯或依將帥攜帶妻累隨逐東西與藩鎮共侵漁助守宰為蝥賊收縛無罪逼迫善人民蓋流離邑皆荒毀由是劫抄蜂起盜竊群行陵犯公私經年累月抵父者比室陷辟者接門眚災亟降囹圍隨滿夕散朝聚有若市廛加以朝霧內叢而官方外曠有其位而無其職非其事而侵其官四海至殷機事輻湊人君雖敏有所不周人君雖明有所不照豈可專于親覽忘彼責成就此而言大失有二習守膠之獘棄更張之善屈子投江寍論其痛賈生慟器豈喻斯悲自五胡競逐晉室東徙權寓江濱遂淹時代桓伐燕秦而不振劉克函洛而還亡至于宋齊疆埸侵蹙高祖躡斯頹運有志吞并斯實王者之宏材有國之通準然六納魏主一入洛陽竟無所成得不補失民既勞止訖可小康昔勾踐之欲滅吳前為其政兵強國富然後用之一舉而虜夫差再舉而霸中國高祖進不擇將退不教民雖慕古人安能有濟孫子曰善戰者前勝而後求戰善勝者前戰而後求勝明者出師必前料敵豈可暗茲人事幸彼天時者哉且國有累卵之憂俗有土崩之勢開幸人之志兆亂臣之心遂使侯景被吾甲而寇王城驅我入而圍天闕勢如破竹易若轉圜萬里靡沸四方瓦解社稷淪胥龜玉毀廢事非一夕其所由來漸矣太宗孝慈仁愛實守文之君惜乎為賊所殺至乎文章妖豔隳墜風典誦于婦人之口不及君子之聽斯乃文士之深病政教之厚疵然雕蟲之技非關治忽壯士不為人君焉用世祖聰明特達才蓺兼美詩筆之麗罕與為匹伎能之事無所不該極星象之功窮蓍龜之妙明筆法于馬室不愧鄭玄辨雲物于魯臺無慚梓慎至于帷籌將略朝野所推遂乃撥亂反正夷凶殄逆紐地維之已絕扶天柱之將傾黔首蒙拯溺之恩蒼生荷仁壽之惠微管之力民其戎乎鯨鯢既誅天下且定早應移鑾西楚旋駕東都禋祀宗祊清蹕宮闕西周岳陽之敗績信口宇文之和通以萬乘之尊居二境之上夷虜乘釁再覆皇基率土分崩莫知攸暨謀之不善乃至于斯敬皇世祖之裔允膺下武而貞陽以旁枝外入濫尸非次陳武興勤王之師至正當璧之后驅斥潛王誅鉏亂臣國亡重康彝倫復敘既而天不福善早世登遐土德代興火行告謝驃騎王琳懷申胥之志蘊荀息之忠爰納嗣君更紹頹運于是嘯命方岳大興師旅龍虎戰鬭水潰山崩君臣播越寄命齊土若乃萇弘興周而速咎王永復秦而延殃天欲亡之非人能救夫創天下者至明者也喪天下者至暗者也是以禹湯興其功桀紂廢其業莫不得之者前主失之者後君逮茲梁室有異于此何則高祖撥亂除殘反身招于禍亂世祖復讎雪恥翻手命于寇讎敬皇繼祀而鼎移後嗣紹基而祚徙書曰皇天無親惟德是輔自天所祐歸于有德之元官自有梁備觀成敗昔因出軸流寓齊都窮愁著書竊慕虞子但梁室極促𥳑牘多闕所得遺逸略不盡舉未獲旋反更窮搜訪採其聞見撮其眾家一代之事可得觀矣文苑英華七百五十四
