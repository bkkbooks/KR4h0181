body:
  text: 沈洙沈孝軌諸弟除服議禮有變正又有從宜禮小記云久而不葬者唯主祭者不除其餘以麻終月數者除喪則已注云其餘謂傍親如鄭所解眾子皆應不除王衛軍所引此蓋禮之正也但魏氏東關之役既失亡屍柩葬禮無期時議以為禮無終身之喪故制使除服晉氏喪亂或死于虜庭無由迎殯江左故復申明其制李胤之祖王華之父竝存亡不測其子制服依時釋縗此竝變禮之宜也孝軌雖因奉使便欲迎喪而戎狄難親還期未剋愚謂宜依東關故事在此國內者竝應釋除縗麻毀靈附祭若喪柩得還別行改葬之禮自天下寇亂西朝傾覆流播絕域情禮莫申若此之徒諒非一二寍可喪期無數而弗除衰服朝廷自應為之限制以義斷恩通訪博識折之禮衷陳書沈洙傳皇太后服安吉君禫除議至親朞斷加降故再朞而再周之喪斷二十五月但重服不可頓除故變之以纖縞創巨不可便愈故稱之以祥禫禫者淡也所以漸袪其情至加父在為母出適後之子則屈降之以朞朞而除服無復衰麻緣情有本同之義許以心制心制既無杖絰可除不容復改玄綅既是心憂則無所更淡其心也且禫杖㫷者十五月巳有禫制今申其免懷之感故斷以再周止二十五月而已所以宋元嘉立義心喪以二十五月為限大明中王皇后父喪又申明其制齊建元中太子穆妃喪亦同用此禮唯王儉古今集記云心制終二十七月又為王逡所難何佟之儀注用二十五月而除案古循今宜以再周二十五月為斷今皇太后于安吉君心喪之期宜除于再周無復心禫之禮隋書禮儀志三天嘉元年八月尚書儀曹請今月晦皇太后服安吉君禫除儀注沈洙議詔可之又見通典八十測獄刻數議夜中測立緩急易欺兼用晝漏于事為允但漏刻賒促今古不同漢書律厤何承天祖沖之𣈶之父子漏經竝自關鼓至下鼓自晡鼓至關鼓皆十三刻冬夏四時不異若其日有長短分在中時前後今用梁末改漏下鼓之後分其短長夏至之日各十七刻冬至之日各十二刻伏承命旨刻同勒令檢一日之刻乃同而四時之用不等廷尉今牒以時刻短促致罪人不款愚意願去夜測之昧從晝漏之明斟酌今古之閒參會二漏之義捨秋冬之少刻從夏日之長晷不問寒暑竝依今之夏至朝夕上測各十七刻比之古漏則上多昔四刻即用今漏則冬至多五刻雖冬至之時數刻侵夜正是少日于事非疑庶罪人不以漏短而為捍獄囚無以在夜而致誣求之鄙意竊謂允合陳書沈洙傳臨終戒子蔓華吾于朝廷素無功績瞑目之後斂手足旋葬無得輒受贈諡陳書袁泌傳泌臨終戒其子蔓華其子述泌遺意表請之朝廷不許追贈錢蕆及子岊官議昔王姬下嫁必適諸侯同姓為主聞于公羊之說車服不繫顯于詩人之篇漢氏初興列侯尚主自斯以後降嬪素族駙馬都尉置由漢武或以假諸功臣或以加于戚屬是以魏曹植表駙馬奉車趣為一號齊職儀曰凡尚公主必拜駙馬都尉魏晉以來因為常準蓋以王姬之重庶姓之輕若不加其等級寍可合巹而酳所以假駙馬之位乃崇于皇女也今宮主早薨伉儷已絕既無禮數致疑何須駙馬之授案杜預尚晉宣帝第二女高陵宣公主晉武踐祚而主已亡泰始中追贈公主元凱無復駙馬之號梁武帝女新安穆公主早薨天監初王氏無追拜之事遠近二例足以據明公主所生既未及成人之禮無勞此授今宜追贈亭侯陳書袁敬附傳高祖長女永世公主先適陳留太守錢蕆生子岊主及岊竝卒于梁世高祖受命唯公主追封至永定三年將葬尚書主客請詳議欲加蕆駙馬都尉并贈岊官都官尚書袁樞議又見通典二十九舞影賦燿金波兮綉戶列銀燭兮蘭房出妙舞于仙殿倡雅韻于清商頓珠履于瓊簟影嬌態于雕梁圖長袖于粉壁寫纖腰于華堂縈紆雙轉芬馥一房類隻鸞于合鏡似雙鴛之共翔愁冬宵之尚短欣此樂之方長初學記十五箏賦調宮商于促柱轉妙音于繁絃既留心于別鶴亦含情于採蓮始掩抑于紈扇時怡畼于升天初學記十六笙賦聲流洛渚器重汾陽協歌鍾于宿夕詠月扇于繞梁同離鴻于流徵會別鶴于清商初學記十六拂塵篠賦詩詠淇水騷美江干崖憐拂石神貴埽壇既來儀于鳴鳳亦擾狎于翔鸞入扇璧之宵月映沅澧之驚湍帶金風之爽朗雜玉潤之檀欒陪嘉宴于秋夕等貞節之歲寒初學記二十八上呈玉篇啟竊聞兩儀俶啟九皇始君情性初動有巢肇制三聖代立十紀遞興龍牒浮河龜書起洛八卦既陳六爻攸敘篆素之流是焉而出至于精課源妙求其本始末學敷淺誠所未詳雖復研攷六經校讎百氏殊非庸菲所能與奪謹依條例同異具以上呈伏惟聖皇馭寓膺籙受圖德尚昊軒功超媯姒通妙廣運乃聖乃神經天曰文止戈為武百工維理庶績咸熙勸以九歌撝之八柄脩文德以來要服舞干戚以格有苗是故仁風所扇九服蒙靈正朔可班四荒懷德取衣雒樹則肅慎識受命之興夷波海水則越裳知聖人之德豈但中和樂職近播岷峨德廣所覃旁流江漢殿下天縱岳峙壑哲淵凝三善自然匪須勤學六行前哲寍以勞喻是以聲覃八表譽決九垓規範百司陶鈞萬品猶復留心圖籍俛情篆素糾先民之積謬振往古之重疑𥳑冊所傳莫令比盛野王沾濡聖道沐浴康衢不揆愚賤妄陳狂狷徒夢收腸終當覆瓿空思朱墨燿必無傳悚悸交心罔知攸錯謹啟宋本玉篇玉篇序昔在庖犧始成八卦暨乎蒼頡肇創六爻政罷結繩教興書契天粟晝零市妖夜哭由來尚矣爰至玄龜龍馬負河洛之圖赤雀素鱗摽受終之命鳳羽為字掌理成書豈但人功亦猶天授故能傳流奧典鉤探至賾揚顯聖謨耀光洪範文遺百代則禮樂可知驛宣萬里則心言可述授民軌物則縣方象魏興功命眾則誓威師旅律存三尺政仰八成聽稱責于附別執士師于兩造勒功名于鍾鼎頌美德于神祇故百官以治萬民以察雕金鏤玉升崧岱而告平汗竹裁縑寫憲章而授政莫不以版牘施于經緯文字表于無窮者矣所以垂帷閉戶而覿遐年之世藏形晦跡而識遠方之風遵覽篆素以測九垓則靡差膚寸詳觀記錄以游八裔則不謬毫釐鑒水鏡于往謨遺元龜于今體仰瞻景行式備昔文戒慎荒邪用存古典設教施法無以尚茲經世治俗豈先乎此但微言既絕大旨亦乖故五典三墳競開異義六書八體今古殊形或字各而訓同或文均而釋異百家所談差互不少字書卷軸舛錯尤多難用尋求易生疑惑猥承明命預纘過庭總會眾篇校讎群籍以成一家之製文字之訓備矣而學慚精博聞見尢寡才非通敏理辭彌躓既謬先蹤且乖聖旨謹當端笏擁篲以俟嘉猷宋本玉篇虎丘山序夫少室作鎮以峻極而標奇太華神掌以削成而稱貴若茲山者高不概雲深無藏影卑非培塿淺異棘林秀壁數尋被杜蘭與苔蘇椿枝十仞挂藤葛與懸蘿曲㵎潺湲修篁蔭映路若絕而復通石將頹而更綴抑巨麗之名山信大吳之勝壤若乃九功六義之興依永和聲之製志由興作情以詞宣形言諧于韶夏成文畼于鍾律由來尚矣未有登高能賦而韜斐麗之章入谷忘歸而忽鏗鏘之節故總轡齊鑣競雕蟲于山水雲合霧集爭歌頌于林泉于時風清邃谷景麗修巒蘭佩堪紉胡繩可索林花翻灑乍飃颺于蘭皋山禽囀響時弄聲于喬木班草班荊坐蟠石之上濯纓濯足就滄浪之水傾縹瓷而酌旨酒翦綠葉而賦新詩肅爾若與三逕齊蹤鎗然似共九成偕韻盛矣哉聊述時事寄之翰墨蓺文類聚八求解著作啟臣以紹泰元年忝中書侍郎掌國史于今四載臣本庸賤謬蒙盼識思報恩獎不敢廢官皇厤惟新驅馭軒昊記言記事未易其人著作之材更宜選眾御史中丞沈炯尚書左丞徐陵梁前兼大著作虞荔梁前黃門侍郎孔奐或清文贍筆或彊識稽古遷董之任允屬群才臣無容遽變市朝再妨賢路堯朝皆讓誠不可追陳力就列庶幾知免陳書杜之偉傳高祖受禪之偉啟求解著作優敕不許請詳正哀策稱大行晉宋以來皇帝大行儀注未祖一日告南郊太廟奏策奉諡梓宮將登轀輬侍中版奏已稱某諡皇帝遣奠出于陛階下方以此時乃讀哀策而前代策文猶云大行皇帝請明加詳正隋書禮儀志三永定三年七月武帝崩新除尚書左丞庾持稱云云又見通典七十九
