body:
  text: 闕名奏請議沈孝軌諸弟除服前寍遠將軍建康令沈孝軌門生陳三兒牒稱主人翁靈柩在周主人奉使關內因欲迎喪久而未返此月晦即是再周主人弟息見在此者為至月末除靈內外即吉為待主人還情禮申竟陳書沈洙傳高祖受禪有司奏奏加始興王戎號置佐史夫增崇徽號飾表車服所以闡彰厥德下變民望第二皇子新除始興王伯茂體自尊極神姿明穎玉映觿辰蘭芬綺歲清輝美譽日茂月升道鬱平河聲超袞植皇情追感聖性天深以本宗闕緒纂承藩嗣雖珪社是膺而戎章未襲豈所以光崇睿哲寵樹皇枝臣等參議宜君寍遠將軍置佐史陳書始興王伯茂傳舊制諸王受封未加戎號者不置佐史于是尚書八座奏奏封第三皇子伯山臣聞本枝惟允宗周之業以弘盤石既建皇漢之基斯遠故能協宣五運規範百王式固靈根克隆卜世第三皇子伯山發睿德于齠年表岐姿于丱日光昭丹掖暉映青闈而玉圭未秉金錫靡駕豈所以敦序維翰建樹藩戚臣等參議宜封鄱陽邵王陳書鄱陽王伯山傳天嘉元年七月丙辰尚書八座奏奏治始興王叔陵死後餘罪逆賊故侍中中軍大將軍始興王叔陵幼而狠戾長肆貪虐出撫湘南及鎮九水兩藩甿庶埽地無遺蜂目豺聲狎近輕薄不孝不仁阻兵安忍無禮無義唯戮是聞及居偏憂婬樂自恣產子就館日月相接晝伏夜遊恆習姦詭抄掠居民歷發丘墓謝太傅晉朝佐命草創江左斲棺露骸事驚聽視自大行皇帝寢爻翌日未瘳叔陵以貴介之地參侍醫藥外無戚容內懷逆弒大漸之後聖躬號擗遂因匍匐手犯乘輿皇太后奉臨又加鋒刃窮凶極逆曠古未儔賴長沙王叔堅誠孝懇至英果奮發手加挫拉身蔽聖躬叔陵仍奔東城招集兇黨餘毒方熾自害妻孥雖應時梟懸猶未攄憤怨臣等參議請依宋代故事流尸中江汙瀦其室并毀其所生彭氏墳廟還謝氏之塋陳書始興王叔陵傳高宗崩叔陵以剉藥刀所後主中項又斫太后數下還東府聚兵千人俄而蕭摩訶將兵至府西門斬其首送于臺尚書八座奏啟請徐陵改斷大行俠御服案群議斟酌舊儀梁昭明太子喪成服儀注明文見存足為準的成服日侍官理不容猶從吉禮其葬禮分吉自是山陵之時非關成服之日愚意劉舍人議于事為允陳書劉師知傳高祖崩六日成服朝臣共議大行皇帝靈座俠御人所服衣服吉凶之制博士沈文阿議宜吉服劉師知議宜服縗絰徐陵同博士請時八座以下竝請攝大乘論序夫至道弘曠無思不洽大悲平等誘進靡窮德被含生理非偏漏但迷塗易久淪惑難息若先談出世則疑性莫啟故設教立方各隨性欲唐虞之前圖牒𥳑少姬周已後經誥弘多雖復製禮作訓竝導之以俗法而真假妙趣尚冥然未覩故迹隱蔥嶺以西教祕滄海之外自漢室受命方稍東漸爰及晉朝斯風乃盛梁有天下彌具興隆歷千祀其將半涉七代而迄今法蘭導清源于前童壽振芳塵于後安叡騁壯思以發義端生肈擅玄言以釋幽致雖竝策分鑣同瀾比派而深淺競馳昭晦相雜自茲以降篤好逾廣莫不異軌同奔傳相祖習而去取隨情開抑殊軫慧愷志慚負橐勤愧聚螢謬得齒迹學徒稟承訓義遊寓講肆多歷年所名師勝友備得諮詢但綜涉疏淺鑽仰無術尋波討源多所未悟此蓋慮窮于文字思迷于弘旨明發興嗟負心非一每欲順風問道而未知厥路有三藏法師是優禪尼國婆羅門種姓頗羅墮名拘羅那他此土翻譯稱曰親依識鑒淵曠風表俊越天才高桀神辯閑縱道氣逸群德音邁俗少遊諸國歷事眾師先習外典洽通書奧苞四韋于懷抱吞六論于胸衿學窮三藏貫練五部研究大乘備盡深極法師既博綜墳籍妙達幽微每欲振玄宗于他域啟法門于未悟以身許道無憚遠遊跨萬里猶比鄰越四海如咫尺以梁太清二年方屆建業仍值梁季混淆橫流荐及法師因此避地東西遂使大法擁而不畼未至九江及遊五嶺凡所翻譯卷軸未多後適閩越敷說不少法師每懷慷慨所歎知音者希故伯牙絕絃卞和泣璧良由妙旨之典難辯盈尺之珍罕別法師遊方既久欲旋返舊國經塗所亙遂達番禺儀同三司廣州刺史陽山郡公歐陽頠叡表岳靈德洞河府經文緯武匡道佐時康流民于百越建正法于五嶺欽法師之高行慕大士之勝軌奉請為菩薩戒師恭承盡弟子禮愷昔嘗受業已少滌沈蔽服膺未久便致暌違今重奉值倍懷蹈儛復欲餐和稟德訪道陳疑雖殷勤三請而不蒙允遂怳然失圖心魂靡託衡州刺史陽山公世子歐陽紇風業峻整威武貞拔該閱文史深達治要崇瀾內湛清輝外溢飲賢味道篤信愛奇躬為請主兼申禮事法師乃欣然受請許為翻譯制旨寺主慧智法師戒行清白道氣宏壯志業閑贍觸途必舉匡濟不窮輪奐靡息征南長史袁敬德履沖明志託夷遠徽猷清𥳑冰桂齊質弼諧蕃正民譽早聞兼深重佛法崇情至理黑白二賢為經始檀越辰次昭陽歲維協洽月呂姑洗神紀句芒于廣州制旨寺便就翻譯法師既妙解聲論善識方言詞有隱而必彰義無微而不畼席閒函丈終朝靡息愷謹筆受隨出隨書一章一句備盡研覈釋義若竟方乃著文然翻譯之事殊難不可存于華綺若一字參差則理趣胡越乃可令質而得義不可使文而失旨故今所翻文質相半與僧忍等同共稟學夙夜匪懈無棄寸陰即以其年樹檀之月文義俱竟本論三卷釋論十二卷義疏八卷合二十三卷此論乃是大乘之宗極正法之祕奧妙義雲興清詞海溢深固幽遠二乘由此迷墜曠壯該含十地之所宗學如來滅後將千一百餘年彌勒菩薩投適時機降靈俯接忘己屈應為阿僧伽法師廣釋大乘中義阿僧伽者此言無著法師得一會道體二居宗該玄鑒極凝神物表欲敷闡至理故製造斯論惟識微言因茲得顯三性妙趣由此而彰冠冕彝倫舟航有識本論即無著法師之所造也法師次弟婆藪槃豆此曰天親道亞生知德備藏往風格峻峙神氣爽發稟厥兄之雅訓習大乘之弘旨無著法師所造諸論詞致淵理玄趣難曉將恐後生復成紕紊故製釋論以解本文籠小乘于形內挫外道于筆端自斯已後迄于像季方等圓教乃盛宣通慧愷不揆虛薄情慮庸淺乃欲泛芥舟于巨壑策駘足于長路庶累豪成仞聚爝為明有識君子幸宜尋閱其道必然無失墜也釋藏物六阿毗達磨俱舍釋論序正教本宗文惟三藏梵音所闡諒無異說法相深微名實繁曠若非圓明獨朗孰能通達自日隱頞多之山月翳羅睺之手時移解昧部執競興或以文釋義或以義判文雖復得失參差皆以三藏為本可謂殊塗同歸一致百慮者也尋十八部師及弟子竝各造論解其所執于一部中多有諸論此土先譯薩婆多部止有毗婆沙及雜心四卷毗婆沙明義雖廣而文句來不具足雜心說乃處中止述自部宗致四卷過存省略旨趣難可尋求此土先譯經部止有成實一論成實乃以經部駮斥餘師其閒所用或用餘部又于破立之中亦未皆盡其妙且傳譯參差難可具述佛滅度後千一百餘年有出家菩薩名婆藪盤豆器度宏曠神才壯逸學窮文字思徹淵源德隆終古名蓋當世造大小乘論凡數十部竝盛宣行靡不宗學法師德業具如別傳先于薩婆多部出家仍學彼部所立三藏復見彼法多有乖違故造此論具述彼執隨其謬處以經部破之故此論本宗是薩婆多部其中取舍以經部為正博綜群籍妙拔眾師談玄微窮于奧極述事象略而周徧顯成聖旨備摧異說立不可闚破無能擬義兼數論而深廣愈之詞不繁而義顯義雖深而易入故天竺咸稱為聰明論于大小乘學悉依此為本有三藏法師俱羅那他聰敏強記才辯無竭碩學多聞該通內外為弘法故遠遊此國值梁室將傾時事紛梗法師避地東西垂二十載欲還天竺來至番禺慧愷因請翻講攝大乘等論經涉二年文義方畢法師爾後猶欲旋歸刺史歐陽紇尚仁貴道久申敬事重復請留彌加殊禮慧愷與僧忍等更請翻講此論以陳天嘉四年歲次閼逢龍集涒灘正月二十五日于制旨寺始就開闡或品未畢仍事徙居于南海郡內續更敷說法師遊方既久精解此土音義凡所翻譯不須度語但梵音所目于義易彰今既改變梵音詞理難卒符會故于一句之中循環辯釋翻覆鄭重乃得相應慧愷謹即領受隨定隨書日夜相繼無懈晷刻至其年閏十月十日文義究竟論文二十二卷論偈一卷義疏五十三卷刺史仍請于城內講說既得溫故頗識大宗非唯闇弱多有疑滯又恐所翻不免謬失至天嘉五年歲次柔兆二月二日與僧忍等更請法師重譯論文再解義意至光大元年歲次強圉十二月二十五日治定前本始末究竟長史袁敬識鑒沈深信解明正長史長子元友愛文重法博學多蓺竝禮事法師備盡經始絓南中翻譯悉賴此貴門方希永傳來世以為後生模式佛法大海深廣無際若不局一塗能信順求學豈不同餐甘露共嗅薝蔔者哉如或專執非所喻也釋藏鼓一夾科肇論序慧達率愚通序長安釋僧肇法師所作宗本物不遷等四論但末代弘經允屬四依菩薩爰傳茲土抑亦其例至如彌天大德童壽桑門竝創始命宗圖辯格致播揚宣述所事玄虛唯斯擬聖默之所祖自降乎已還歷代古今凡著名僧傳及傳所不載者釋僧叡等三千餘僧清信檀越謝靈運等八百許人至能辯正方言節文階級善覈名教精搜義理揖此群賢語之所統有美若人超語兼默標本則句句深達佛心明末則言言備通聖教諒是大乘懿典方等博書自古自今著文著筆詳汰名賢所作諸論或六家七宗爰延十二竝判其臧否辯其差當唯此憲章無弊斯咎良由襟情泛若不知何係譬彼淵海數越九流挺拔清虛蕭然物外知公者希歸公採什如曰不知則公貴矣達猥生天幸逢此正音忻躍弗已響讌無疲每至披尋不勝手舞誓願生生盡命弘述達于肇之遺文其猶若是況中百門觀爰洎方等深經而不至增乎世諺咸至肇之所作故是誠實真諦地論通宗莊老所資猛浪之說此實巨蠱之言欺誣亡沒街巷陋音未之足拾夫神道不形心敏難繪既文拘而義遠故眾端之所詭肇之卜意豈徒然哉良有以也如復徇狎其言願生生不面至獲忍心還度斯下達留連講肆二十餘年頗逢重席末覩斯論聊寄一序託悟在中同我賢余請俟來哲夫大分深義厥號本無故建言宗旨標乎實相開空法道莫逾真俗所以次釋二諦顯佛教門但圓正之因無上般若至極之果唯有涅槃故末啟重玄明眾聖宅雖以性空擬本無本可稱語本絕言非心行處然則不遷當俗俗則不生不真為真真但名說若能放曠蕩然崇茲一道清耳虛襟無言二諦斯則淨照之功著故般若無知無名之德興而涅槃不稱余謂此說周圓罄佛淵海浩博無涯窮法體相雖復言約而義豐文華而理詣語勢連環意實孤誕敢是絕妙好辭莫不竭茲洪論所以童壽歎言解空第一肈公其人斯言有由矣彰在翰牘但宗本蕭然莫能致詰不遷等四論事開接引問荅析微所以稱論荅津律師書信來枉告良用憮然余學慚技癢人非準的中閒雖曾講授不異管內闚天豈足作範後昆踵武前哲蓋身疾弗瘳門人引去一師盛業廢而莫傳五十之年忽焉將至長夜永懷惆悵何已每有好事者日相請逼遂以罷老復成自勵如法師數子本出名家洛下奇才當今利齒必欲探覈論部任持律藏方為美器日見絕塵復有海表奇僧聚中開士皆學無常師不遠而至訪道質疑足稱一時之樂不意胡兵犯蹕虜馬飲江塔廟焚如義徒道殣即日京華故老倚席不談乃復爰訪幽阿令其訓導久廢無次何以誨人故乃荊棘生乎口中雌黃謬于舌杪矣煎水求冰未足為喻佇能近顧方陳寸款瑗白廣宏明集三十二又一本在二十七上與梁朝士書光宅寺曇瑗白竊惟至人垂誨各赴機權故外設約事三千內陳律儀八萬誠復楷訓異門無非懲惡孔定刑辟以詰姦宄釋敷羯磨用擯違法二聖分教別有司存頃見僧尼有事每越訟公府其內外殊揆科例不同或內律為輕外制成重或內法為重外網更輕凡情僶俛肆其阿便若苟欲利已則捨內重而附外輕若在陷地則棄內輕而依外重非唯穢黷時宰便為頓乖理制幸屬明令公匡弼社稷和燮陰陽舟楫大乘柱石三寶遐邇向風白黑兼慶貧道忝居僧例頗采習毗尼累獲僧曹送事訪律詳決尋佛具切戒國有憲章絓僧家諍執未審依何折斷謹致往牒佇奉還旨庶成約法永用遵模釋曇瑗上廣宏明三十二又一本在二十七上與瑗律師書惠津和南竊聞尋師萬日以禮見知而津伏奉未淹過蒙優接昔鄒陽上書乃可引為上客宋玉陳賦則一賜以良田且復康會來吳才堪師表摩騰入漢行合律儀者哉故知道在人宏德不孤立儔今訪古竝非其例豈可虛佩寵靈坐安隆渥便是名踰分外譽超身表但法輪初啟請業者如雲非直四海同風天下慕義遂令負笈之徒排肩自遠歸仁之士繼踵來儀華陰成市曾何足云舉袂如帷豈得獨高前代況乃闡禪定之初門開智慧之燈炬信實傾河倒海宣說不窮先進者陷于金城後生者摧其利齒可號熏修戒善能令十地瓔珞守持身行則使八正莊嚴允穆聖凡叶和幽顯加有懷鉛握錐之好聚螢流麥之勤或剖蜯求珠開河出寶而惠津一介無取內外靡聞學謝懸鐘言慚散粉同斯曲木空廁直蘭類此蒹葭謬參玉樹乃知滄溟汪濊不待毫滴之珠華嶽穹崇寍俟遊塵之壤譬茲秋鳳如彼春林墜獨葉不預百枝落一毛何關六翮正言身名仰委觸途憑累區區寸誠喻如皎日不意三邊有務四郊多壘致使虧贊講筵請益成廢及言悲鯁寍可具披所冀難靜障除更敦諮受不任戀結行遣祗承惠津和南廣宏明集二十二又一本在二十七上格倩僧轉輸運力詞聖上誠異宇文廢滅三寶君子為國必在禮義豈宜以勝上福田為胥下之役非止延敵輕漢亦恐致罪尤深續高僧傳二十七闕名大乘唯識論序唯識論者乃是諸佛甚深境界非是凡夫二乘所知然此論始末明三種空何者為三一者人無我空二者因緣法體空三者真歸佛性空我空者我本自無但凡夫之人愚痴顛倒于五陰中妄計為有何以知無凡夫依心識妄想分別于五陰因緣法中見我為有然此我相于五陰中實不可得若爾般若觀此五陰中一二離二實體不可得猶如兔角若有此我于一中住者應于一中見應于異中見應于和合中見云何一中無我者以有常無常過故若有我與五陰一者五陰無常我亦應無常復有我若與陰一者我是常故陰亦應常若我與陰二者一邊即同前無常一邊即同前常若離二邊者此亦不然離于二邊別相不可得是故實無神我如是知者名入人無我空因緣法體空者謂諸色等因緣法以隨俗因緣起云何隨俗因緣起世人見牛起于牛想不起馬想見馬起于馬想不起牛想色等法中亦復如是見柱起柱想不起色想見色起色想不起柱想如薪火相待無實薪以離于薪更無實火以離于火更無實薪于薪更無實火能作薪因以離于火更無實薪能作火因而見火說假名薪見薪說假名火以相待成故如是能成所成而不離能成因而有所成不離所成因而有能成如彼薪火能成所成亦實無是名因緣法體空真如法空者所謂佛性清淨之體古今一定故經云佛性者名為第一義空所言空者體無萬相故言其空無萬相者無有世閒色等有為法故無萬相非是同于無性法以其真如法體是故經云去八解脫者名不空空是故不同無法空也若如是觀是名解真如法空唯識論言唯識者明但有內心無色香等外諸境界何以得知如人目有膚翳妄見毛輪揵闥婆城等種種諸色實無前境界但虛妄見有如是諸眾生等外諸境界故言誰識若爾但應言破色不應言破心此亦有義心有二種一者相應心二者不相應心相應心者謂無常妄識虛妄分別與煩惱結使相應名相應心不相應心者所謂常住第一義諦古今一相自性清淨心今言破心者唯破妄識煩惱相應心不破佛性清淨心故得言破心也釋藏都二
