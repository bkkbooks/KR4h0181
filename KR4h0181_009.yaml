body:
  text: 卷九徐陵梁貞陽侯與陳司空書淵明頓首頓首軒轅既作遇蚩尤之兵顓頊為君阻共工之亂雖復搖山蕩谷驅電乘雷殘厥凶渠曾靡遺孽未有時當至治世在欽明元惡滔天遂陷邦家者也我大梁開金繩之寶牒紐玉鏡之珍符功烈與造化相侔德施與風雲俱遠戴日戴斗何向不賓太平之基無遠弗屆逆賊侯景殲亂本朝釁重聰彌凶逾羿浞後主天經地緯義冠人靈驅馭熊羆遂剪勍盜少康祀夏何可對揚大戊興殷彌無等級不圖天未悔禍喪亂荐臻羌賊憑陵侵蕩荊漢乘輿幽辱既陷凶徒黎獻崩騰莫不淪沒故以哀窮兆庶痛極蒼旻者也夫諸侯釋位寧非禍亂之朝宗子維城本濟殷憂之日武皇遺胄皆陷虜庭乞命偷生何能支久孤宗室之長爰自布衣辛癸之朝容身靡託追惟先業大庇生民既雪伯升之怨仍紹桓王之霸孤二三昆季情禮獲申等預藩枝偏承皇德近歲彭都之役得備戎行鞍甲之勞庶酬天寵況復邦家不造至此橫流凶狡猶存何所逃責固以提戈負劍臥泣行號言念荊巫志雪讎恥大齊德並天地明符日月隆禮詔俗張樂被民義感華夷仁侔造化玉羊銀甕嘉瑞必彰澤馬山車禎符總集若夫中原猛士本自無窮沙塞精兵斯何有量是以家國之富文景所未儔兵馬之強秦漢所未敵但親鄰之道既篤夙私明發之懷彌敦先好以為興亡繼絶聖典通規爰命無庸嗣守社稷既方憑大國庶討仇讎恩喻難違諸懷慚哽公體茲懋德毗奉中興歸自番禺志在討亂至於雲行電邁谷靜山空扼鵲尾而定王畿登牛頭而掃天闕漸臺偽帥將傳首於帝京郿塢元凶皆橫尸於軍市高庸茂烈振古希儔承此欣然深所嘉歎今者殷憂未已禍難相尋宗社無依奧主宜立夙承所眷尚在沖年王室猶難何以康濟董侯幼弱終覆漢朝馬業童蒙仍傾晉室所謂前事之不忘後事之龜兆也孤過荷恩靈預奉帷幄黃河白日亟降誠言分災恤患事非虛旨但當小國之禮無失敬恭闔境人民俱勞寤寐方窮人爵之重以報非常之功惠覽今書希能留意也上黨王文高劉德武冠曹彰爰降宗英遠于將送裴侍中英起贊奉師德俱事戎間月壘連營雲旗蔽野同集江淮翼我歸旆湛海珍等並前朝舊將夙著勳庸江左氛妖投身齊國今者皆蒙恩獎並在戎行歸附明公共剪讎難去月將晦便屆壽春已具舟艫將臨巢浦若公為內主方同國子之勳余以定家得免臧孫之嘆豈不功名富貴共保無疆前望鄉關唯增號哭蕭淵明頓首頓首文苑英華六百七十七梁貞陽侯重與裴之橫書張佛奴昨還得去月二十九日書覽以增慨昔桓公始反管仲親射其車重耳初還呂卻終焚其室頃家國多患頻遘閔凶前事不忘便為龜兆所以皇齊大德禮秩兼常威武紛紜洪恩汪濊況復旌旗照日鼓吹從風文物俱華羽衛相鬱書契已來斯未有也卿天監之始門宦有成承聖之初身名俱泰正應勤王效命酬二后之恩憂國如家報三靈之寵何有方規異志苟樹童蒙阻地險於長川忘天討之應及孤昔忝蕃維非無遊士平原之館乃乏如錐田文之家差有彈鋏雖復李廣麾下莫不封侯衛青故人多懷彼此豈可文辭簡略禮等平交披封伸紙益多歎異相鼠無儀表詩人之作茅鴟刺傲彰魯史之文宿昔相期不應如此衆軍即便頓江關相見在近不復多及蕭淵明頓首頓首文苑英華六百七十七代梁貞陽侯與荀昂兄弟書張佛奴至未枉還告但以勞悒夫興亡繼絶往帝之通規分災恤患聖王之恆典自敦龐既散詐偽萌生時託親鄰信有澆慝大齊道冠三皇風高九代仁信之本關於至誠言與之恩由於孝德孤謬蒙殊獎還嗣本朝敕諭分明言誓殊重若使邦家克定境內無虞凡廣陵歷陽皆許見還白水黃河屢奉然諾彝章禮數莫不優華斯乃不世之殊恩寧是悠常之恆事王太尉勳踰呂望德冠伊衡凡厥英謀算靡遺策豈容當滔天之巨寇違大國之隆恩計彼賢明必當不爾卿維兄及弟莫非雄才江外風塵不染凶寇賈氏三虎豈獨貴於前修荀家八龍信服在於今日近者州司不道或致流言朝聽矜明已如前及想謀元宰善保良圖南道主人以相付也見所答東海徐湛書粗具來意昔桓憑莒衆文用秦攻是假鄰國之威以備非常之變若使江東宰匠具領齊恩時命封疆遠相迎接故當攜諸舊隸率我賓遊朝服簪纓直拜園寢梁人望國自合水而浮舟齊師言歸指滄江而回旆如其彼相未悟良機將恐戎麾遂踐京邑若其求成取敗豈謂和風龍馬雲旗差不相涉一二復令張佛奴口具相見在近此不多及蕭淵明疏文苑英華六百八十六武皇帝作相時與嶺南酋豪書夫否終斯泰屯極則亨若日月之回環猶陰陽之報復近者數鍾九厄王室中微聖主欽明還承寶運即是高祖武皇帝之孫世祖孝皇帝之子重光纍聖胤國承家天下生民孰不歸德賊勃不涯疏戚希纂帝圖信是姦凶階茲禍亂自王宮再淪於醜逆虜馬四飲於江沱社稷阽危鑾輿幽辱勃身居列嶽自御強兵高視趑趄坐觀成敗既而天維重綴國步還康翻畫凶圖更謀神鼎且其兵馬之任資於長昆方牧之權由於承聖操兄戈而斬姪藉國寵而弒君不忠不義莫斯為甚比春初便遣大都督歐陽頠托城主傅泰等凶徒數十遂到臨川吾奉承朝算指畫戎略樊滕耿賈戮力爭馳天地靈祇水陸開道獲傅泰不勞於一箭擒歐陽無待於尺兵偽黨皆俘連城盡拔所收軍資不可稱算去月十六日德州刺史陳法武等願憤回戈仍梟凶豎一夫挺劍傳首上京萬里澄清人神慶躍彼豪門著姓典牧方州拘隔天朝亟離寒暑公私憤歎豈可為懷今王道平夷理增歡忭朱明戒節比復何如軍士平安境內清謐吾以庸薄叨秉國鈞恆務牽纏諸有勞弊自天數云否朝禍薦臻東夏崩騰西京蕩覆身惟許國任在勤王宣力皇家靡有寧歲一還京師保持鴻業四驅夷狄奪得江左始則杜龕元惡張彪不恭據有泰稽連蹤巨震隨機討掩觸向平夷叛臣任約徐嗣徽等屢引齊虜前年末既踐京師江畔邊城皆為戎戍賴貔貅騁力衛霍同心殲厥胡夷不日清殄去年將夏傾國大來鐵騎八千許匹甲士二十餘萬胡塵飛于北闕虜鼓震于南宮躬率偏裨聊與挑戰虜便土崩瓦解投險赴坑大小皆擒鯨鯢盡戮三江之上塞水無流千里之間伏尸相枕生獲大都督蕭軌裴英起東方老李希光王敬寶等虜中驍將唯此數人屢破關西之兵頻取淮右之地一朝俘斬無復孑遺遠邇敬欣華夷怖懾如聞彼虜稍是危亡尋命熊羆欲就征討方可以雷行趙魏電掃幽并混一車書勢在朝暮而侯瑱跋扈江州公私阻絶即平北賊仍事南征肉袒面縛歸首闕庭即為申聞優其禮秩台儀不貶位遇兼常今所擒歐陽頠傅泰等莫不弘宥政爾授其兵馬處以榮祿坦然遊狎無介懷抱年號武平國即清晏君之聞此寧不欣躍但昔緣王事遊踐貴鄉日想山川依然舊識吾既忝荷朝私位逾台袞身持帝王之柄手握天下之圖故鄉如此誠為衣繡故人不見還同宵錦天涯藐藐地角悠悠言面無由但以情企今者王猷帝載化被無垠浮海窮山罔不咸格投竿負鼎馳步蒼龍崖穴丘園爭趨金馬君之才具信美登朝如戀本鄉不能遊宦門中子弟望遣來儀當為申聞各處榮祿深加將保念嗣音郵今遣某甲等使彼指此不多陳諱白文苑英華六百八十二武皇帝作相時與北齊廣陵城主書籍甚英風常懷眷屬封疆有限寤寐增勞辱此月九日告深慰情佇方秋尚熱體中何如戎帳艱辛無乃為弊吾以庸薄謬膺台鉉既荷先帝拔擢之恩兼蒙今主責成之寄政以皇齊大德世紹和風方藉威靈庶平讎恥提攜小國願預藩臣還詔哀矜許垂容納奉敕須質便遣入朝部下諸將哀吾誠節一兒一弟無所遺吝立志立義無負上天但故丞相諸子及湛海珍等並依敕旨馳遣渡江主上又遣吏部尚書王通鴻臚卿謝岐等至和州與司馬行臺共為盟誓而蕭軌等決信叛亡苟相陵易鬱從東道馳至北郊既逼宮闈無容靜默兩兩相對俱有損傷彼聞人馬因此奔散且置兵之地溝澗且多退兵之時投赴相積近遣張都來此具是行人所見但廣陵建業才隔一江戰場去岸不盈五里軍人退散理反鄉家緣岸村人復有舟楫且蘆簰荻筏竟浦浮江千百為群前後相繼吾又勒兵案甲不聽討捕若無恐懼並應安達假使在此不可更生至彼而殂差非吾過如其枉理必是興軍見伐於有道之人加兵於無罪之國若彼王師如此又是違盟后土皇天山川社稷察其怨語寧容相祐辱告承上黨殿下及匹婁領軍應來江右師出無名此是何義小之事大差無違禮彼之陵我自是乖言玄天所伐匹馬無違翻見怨尤一何非理若彼鬼神有知寧可斯背鬼神無知何用盟歃去歲抑達磨等石頭天井連月亢陽三子才降連冬大雪黃袍盡沒白帳皆浮既因之以泥塗兼加之以疾疫蕭裴既退雪霧便除從爾以來稍成災旱定知衣冠之國禮樂相承天道不言不容都滅長江渺渺巨浪湯湯如鬭艦舟師詎有深利近梁山之戰即是前車蕪湖之役可為明鏡昔晉侯不能乘鄭馬趙將不能用楚兵一非水土難為騁力揚州卑濕厥土塗泥如遇秋霖杳同江漢假令蚩尤重出白起還生控代馬而陵波躡胡靴而湔水終難逞效詎有成功六州勇士雖有百萬十姓豪傑徒勞千億不能為患斷可知矣昔我平世天下乂安人不識於干戈時無聞於桴鼓故得凶人侯景濟我橫江天步中危實由忘戰自亂離已久人解用兵女子無愧於韓彭童兒不殊於衛霍吳鉤甚利蜀甲殊輕槊動風霜弩穿金石高樓大艦概日陵雲叱吒而起風雷吹噓如倒山嶽侯車騎國家重將分陝上流近隔以邊塵時虧表疏王途既泰貢賦相望尋令子弟侍奉京邑蕭太保龍驤於賁海王儀同虎視於洞庭若望高峰便當投袂何則凡諸將帥各護家鄉非直吾人獨憂宗社日者頻辱司馬行臺及諸公有告裴行臺當今方召此諸賢莫非英傑其餘軍士悉是驍雄庸蜀氐羌之兵烏丸百虜之騎以此衆戰誰能禦之何為比吾倍薄相懸何惡諸君身名俱滅來告以細柳之軍踰於灞上吾恐今之趙括不及廉頗也近張舍人至始奉嚴敕朝廷遣劉叔經仍往啓聞願達丹誠用停王赫伏計天慈理當懸照此身日月所鑒天地所明豈敢虛言欺妄宸極足下既未知始末容有疑怪大軍多士希惠矜弘量非此失時騰表疏幸停師旅已存盟信庶其小國永申藩禮天心無爽邇遐一同投筆悚慨不復多白陳諱頓首文苑英華六百八十二為陳高祖與周宰相書昔有天地便立帝王革昊唯農遷虞斯夏莫不三靈所佑五運相推梁德不造固天攸棄雖復東漢之末區宇沸騰西晉之亡生民蕩覆未足以方其禍亂譬彼虔劉者也吾謬以庸薄屬當興運自昔登庸清諸百越徐聞浪泊靡不征行銀洞珠宮所在清乂自還麾南極伐逆東都宣力驅馳亟淹寒暑六延梁社十剪強寇黃帝與蚩尤七十戰魏祖在軍中三十年方厥劬勞未若勤苦加以百神所感明靈應期萬里徂征虯龍表瑞於是中軍勇鋭上將橫行承此休符遂興王業梁氏以天祿斯改期運永終欽若唐風推其鼎命吾驚惶三讓拜手陳辭盈庭公卿稽顙敦逼眷言潁水徒抱素心尚想汾陽無因高蹈猥以庸薄遂膺天寵去月乙亥升禮太壇言念遷桐但有慚愧昔賓門之始境外無交雖遣行人未申嘉好今上天有命光膺寶曆永興周室方同斷金我運惟新宜修朝聘今遣侍中都官尚書周弘正銜使長安故指有白陳某白文苑英華六百六十七與周冢宰宇文護論邊境事書與周冡冢宰宇文護論邊境事書國有三慶民有四安所謂通和是由鄰睦況周陳款好一紀于茲懷抱相期百世方遠灌瓜之美久敕邊吏拾橡之尤想應無忽梁氏以漸水東為安湘小郡宜立巴州多歷年所此於荊部本包分界近得刺史符元舉啓稱蕭巋忽遣杜元茂神僧訓等將率人馬踰潰涉澌便置城隍謀為侵軼適荷鄰德合州見還不容今眷仍縱蕭氏元舉纍移論及翻相河漢更往研問便騁鋒鏑彼軍人恃勇遂致俘擒聞此紛紜甚以驚歎其商奄餘孽才力甚微為暴邊城良憑大國但情均忌器不可加兵便敕軍司以禮相放且前歲所立疆城本以南平等五郡輸薦貴朝至如安湘既屬巴郡幸承鄰惠無候涉言故下漸東唯如澧北政是標其大桶屬荊州之界耳彼此方申分好義絶規圖所貴唯和所重唯信夫以南平等郡地曠民豐雲夢之田楚王為寶吳當徑蜀晉拒強秦資彼山川並為州鎮朕若棄其仁義務廣封域寧容延歲並貢周朝今者和親已固山嶽而方謀尺寸之土用益蒹葭之地哉幸非竊疾相見鑒容江陵小寇既爾虔劉前至之言或相誣罔一二因使人宇文平口具其懷耿耿故此相白陳諱頓首文苑英華六百八十二答周主論和親書使人使持節車騎大將軍儀同三司大都督治司城使主杜子暉中軍山遂伯使副鮑宏等至省告具懷夫聖君明辟司御兆民則天象地佇育黔首故張旜以往拭玉而來同在蒼生恢宏文武雖毀戈鑄戟未擬上皇散馬休牛載懷愝伯非期與睦忽爽和風奚用殲師信由天討追尋曩好歎想兼懷言覿今書甫承家難知以冢卿執政擅同淵藪令尹當朝妄專征伐無君之謫俾墜其師無將之誅已從司寇刑名既肅國步還康希篤親鄰敬開衷款若二境交歡俱饗多福八荒期乂良副所懷今遣其位某甲等使不復多述陳某頓首文苑英華六百八十六答周處士書辱去年三月二十七日告仰披華翰甚慰翹結承歸來天目得肆間居差有弄玉之俱仙非無孟光之同隱優遊俯仰極素女之經文升降盈虛盡軒皇之圖藝雖復考槃在阿不為獨宿詎勞金液唯飲玉泉比夫煮石紛紜終年不爛燒丹辛苦至老方成及其得道冥真何勞逸之相懸也又承有方生亦在天目理當仰稟明師總斯祕要豈如張陵弟子自墜高巖孫泰門人競投滄海何其樂乎聖朝虛心版築尚想丘園若彼能赴嘉招便當謹申高命但其人往歲亦望至京師觀此風神確乎難拔故以忘懷爵祿詎持犧牲之談高視公卿獨騁蠟蛵之訓所恐有道三辟公車十徵若斯者終當不屈此既然矣請復詳言昔楚國兩龔同時紆組漢陰二老相攜抱甕兄之幽貞若其鑿壞負石方同形影結綬彈冠無容越楚況乎糞土夔龍羶臊名器己所不欲非應及人忽承來音良以多感何則潁陽巢父不曾令薦許由商洛園公未聞求徵綺季斯所未喻高懷而躊躇於矛楯也唯遲山阿近信更惠芳音如或誠言謹便聞奏第夙勞比劇不復多呈徐君白文苑英華六百七十七與章司空昭達書君白日聖朝受命天下廓清所餘殘凶唯有歐紇南通交愛北據衡疑兄弟叔侄盤阻川洞百越之賮不供王府萬里之民不由國家明公受脤嚴冬持兵杪歲開冰踐露焫火宵行便屆含淮乃其神速未騁三略非勞六奇薄交旗鼓仍平醜類自太清之末永定以來所闢疆界不過郡邑今茲赴捷二十餘州若較此功庸方茲英力漢之馬援不能為擬吳之步騭故是相懸況孫處宗之叛徒正槌蕩主耳公私慶快豈可勝言且僕一子屯窮妖徒所制五嶺遐敻存亡不測懸懷飲淚破膽復全蒙荷英恩保其身命餘年仰戴何力能勝今遣主帥某馳往稱慶徐君呈文苑英華六百八十二與顧記室書吾伏事天朝本非舊隸殿下殊恩遠垂薦拔故常戰戰栗栗甘心痛謹庶其愚老無負明據近者既居臺轄唯務奉公去年正月十五日尚書官大朝元凱既集丞郎肅然忽有陳慶之兒陳暄者帽簪釘額絛布裹頭虜袍通踝胡靴至膝直來郎座遍相排抱或坐或立且歌且詠吾即呼舍吏責列不答而走反為憾恚妄相陷辱至六月初遂作盲書便見誣謗聖朝明鑒悉知虛罔唯云吾取徐樞為臺郎南司檢問了不窮推承訓劾為信言致成隳免此事冤枉天下所無吾市徐樞宅為錢四萬任人市估文券歷然不蒙申理見枉虛巧二者樞是故少府卿鱗之子鱗殞身侯景之役又為西臺所贈兗州左衛官位甚高未知其子何忝郎署魏晉之前如為久遠宋齊以降其例甚多如徐愛阮佃夫之子可不得郎官耶紀文卿公向璡皆為列棘豈冗雜曹郎乎三者樞入身梁朝解褐嶽陽王少府墨曹承聖時為故敬帝晉安王諷席文墨具存陝西官爵乃多浮濫更補臺郎不為勝擢未知何㥯推宅貨官四者徐領軍節度自啓樞為郎敕付選序吾既不啓據又不為選職所可相關止是得中侯相聞為呈啓而已以此見罪一何冤濫吾昔在承華是弟所悉行年六十無復儕儔非意餘生忽此誣謗堯有驚於讒説孔將惑於拾塵雖復聖主機明不能委照殿下德高兩獻風美二南億兆歸心衣冠有託久願通啓披訴聖明伏見軍戎多務所以不敢祈冒弟與吾遊眷亟回星紀故人如此寧不矜歎耶侍言有便云何且為啓聞一蒙神鑒照其枉直方歿幽泉無恨灰壤伏覲謁帝承明緒言多次服矜遺老曲賜湔濯則殿下前時妄澤匪復偏私遂吳良延薦之恩無王丹所舉之謬吾得方辭武騎永附梁賓雖愧家丞庶呈秋實緣弟深眷故此敬憑干謁非宜益懷悚慨徐陵白文苑英華六百七十二答諸求官人書自古有吏部尚書者品藻人倫簡其才能尋其門胄逐其少多量其官爵但古來數千年非無明時也非無明主也自有才用雖美階級不通門戶雖高官資殊屈若斯人者其例甚多請問諸君此是何義夫一千錢一斛米之多少猶關相祿況復皇朝官爵理係玄天內典謂之為業外書稱之為命五行有驛馬之言六甲有官鬼之説必令驛馬時發官鬼克身所望階榮便當果遂如其不爾決是難諧豈可改尚書作官鬼驅老僕為驛馬耶若見問尚書何不分判用與不用許與不許僕答云君非屈滯豈可相期決言應果若今驛馬差爽便是乖信此關君命僕何以相答耶若朝散之流行止之屬門戶相似人才不殊選家斟酌無能為爾若陟大位清官悉由玄命夫人君賓用並是前緣故宋文帝云人豈無運命每有好官缺輒憶羊玄保梁武帝云世間人言有目色我特不目色范悌自此而論豈非前業且世諺云圖官在亂世覓富在荒年梁孝元帝承侯景之凶荒王太尉接荊州之禍敗爾時喪亂無復典章故使官方窮此紛雜自紹泰太平及永定中聖朝草創爾時州州自帝郡郡稱王天下干戈尚無條序兼以府庫空虛賞賜懸乏白銀之寶難得黃紙之板易營假以官榮代以錢絹義在撫綏無計多少又有非舊非勳非地非才託節將而求官因時人以買位賣官既賤皆為清顯故員外常侍路上比肩咨議參軍市中無數四軍五校車載斗量豈是朝章應其如此今衣冠禮樂日富年華主上體成王之風太傅弘周公之德西戎北狄畏我王威時既清矣時既平矣何可猶作亂世意而覓非分之官耶凡人所以稱屈滯者身已不無寸能官又不及父祖既是明時可以於邑所見諸君多踰本分猶言太屈未喻高懷若問梁朝朱領軍等並為卿相此不踰其本分耶此天子所用非關選序舊章秦有車府令趙高直為丞相漢有高廟令田千秋亦為丞相此復可為例耶僕七十之歲朝思夕計並願與諸賢為真善知識曾無嫌隙差可周旋非欲令君作此怨訴但既忝衡流應須粉墨庶其允當無負朝寄耳去年疾患亦餘氣息不能相答通作此書所望諸賢深明鄙意徐君白文苑英華六百七十七又陳書徐陵傳南史徐陵傳並有刪節
