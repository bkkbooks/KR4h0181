body:
  text: 卷八徐陵與王僧辨書太清六年六月五日孤子徐陵頓首昔者雲師火帝非無戰陳之風堯誓湯征咸用干戈之道至於搖山蕩海驅電乘雷殲厥凶渠無虧皇極若夏鍾夷羿周厄犬戎漢委珠囊秦亡寶鏡然則皆聞之矣未有膺龍圖以建國御鳳邸以承家二后欽明三靈交泰而天崩地坼妖寇橫行者也自古銅頭鐵額興暴皇年檮杌窮奇流災中國王彌石勒吞噬關河緑林青犢之群黑山白馬之衆校彼兵荒無聞前史八王故事曾未混淆九州春秋非云禍亂我皇受命中興光宅天下泰寧瑣瑣安敢執鞭建武栖栖何期扶轂抑又聞之陶唐既作天歸鳥喙之臣豐畢將興特挺鷹揚之佐明公量苞金鉉神表玉璜儷袞欽才平階佇德固以留連管樂惆悵風雲濡足維時投竿斯在去歲凶徒不逞言次巴丘鼓聲聞一柱之臺烽火照三休之殿公則懸麾羽扇猶對投壺戎羯咸奔鯨鯢俱剪樓船萬軸還繫昆明胡馬千群皆輸長樂於是乎夏首西浮雲行電邁彭波東匯谷靜山空扼鵲尾而據王畿登牛頭而掃天闕漸臺偽帥仍傳首於帝京郿塢元凶咸刳腸於軍市青羌赤狄同畀豺狼胡服夷言咸為京觀公園陵盡拜忠貫長沙神主咸安勳踰高密重以秦宮既獲魯殿猶存闢緑草於應門開青槐於武庫長安五陵之族鄠杜六遷之民襁負而歸都廛斯滿鬻脂藏脯遊騎擊鐘故市新城飛甍華屋東莞舊宅人識桑榆南頓荒田家分禾黍豈以鄉名穀熟邑號禾興而已哉若夫卦起龍文書因鳥迹劬勞王室大拯生民自開闢以來未之有也雖十六才子明允篤誠八百諸侯專心同德中宗佐命俱畫丹青光武功臣皆懸星象棧道木閣田單之奉霸齊綰璽將兵周勃之扶強漢壤蟲之比黃鵠轍鮒之仰河宗未足云也孤子階緣多幸叨簉皇華鄉國屯危公私燋迫邳彤之切長亂心胸徐庶之祈終無開允既而屏居空館多歷歲時釁犯幽祇躬當勦滅何圖釁咎災極蒼旻號慕煩冤肝腸屠殞酷痛奈何無狀奈何惟桑與梓翻若天涯杖柏栽松悠然長絶明明日月號叫無聞茫茫宇宙容身何所窮劇奈何自忝膺嘉聘仍屬亂離上下年尊偏嬰此酷昔人迎門請盜恆懷廢寢之憂當挽輿櫬猶有危途之懼況乎逆寇崩騰京師播越興居動止長隔山河朝夕饘𩛆誰經心眼程糜不繼原粟何資瞻望風雲朝夕嗚咽固乃遊魂已謝非復全生餘息空留非為全死同冰魚之不絶似蟄蟲之猶蘇良可哀也良可哀也自東都紹漢南亳興殷修好徵兵彌留星琯韓宣范武方駕連鑣蘇秦張儀朱輪華轂而孤子三危是擯四罪同科聽別馬而長號杖歸旍而永慟王稽反命既無託乘之恩椒舉相逢誰為班荊之位昔人違齊處魯時降徵求亡晉奔秦猶蒙招請問管寧於遼左追王朗於浙東並物譽時賢卿門公族懸須應務深挾情祈斯豈庸賤之儔耶非餘生之敢望也但預在輶軒誠為過誤圭璋特達通聘河陽貂珥雍容尋盟漳水差有黃門啓封非無青紙詔書郡將州司郊迎負弩鄉亭里候飾館陳兵豈是復介而奔齊寧當竊妻而逃晉已焉哉羌難得而言也漢之谷吉捐軀者幾人楚之申胥埋魂者何極孤子何所歎焉但頓伏苫廬徒延光晷夫以啁噍燕雀躑躅鳴號含識懷情未有其痛且夫曾耕雨雪猶尚悲歌蘇使幽囚無馳哽噎公履忠弘孝冠冕縉紳化感煙雲量標海嶽行糜仲月王政無塞分穀高年仁風斯遠固以衣纓仰訓黎庶投懷今日憔惶彌布洪澤雖復孤骸不返方為漠北之塵營魄知歸終結江南之草孤子徐陵頓首文苑英華六百七十七與王吳郡僧智書孤子徐陵頓首昔林宗道主時人多慕德之賓無忌雄豪天下盡希風之客況復王家沉默謝氏混玄名貴公門譽華卿子而秦峰阻敻浙水悠長咨訴無因但用窮結比青葽已戒白露方漙體中何如願保康勝鄧仲華服袞之年荀令則擁麾之日徒云早達未可同功今日相方豈不高視竊承富春頃歲多難薦臻邑閈皆空黔黎將盡御史舊榻零落不存太傅齋室荒茫無處自神麾所屆襁負斯歸新屋方華故田斯墾府吏間坐長使誦經督郵無事唯慮吹笛東苞海水俱承幕府之威西洎江沱同仰惟良之化政差邊張何其神也孤子無心靦冒苟郤光陰風疾彌留示有餘息恩將公聘窮擯虜庭博望侯極迹於黃河栘中監流滯於滄海自斯以後唯有庸賤本應埋魂趙魏折骨幽并豈意餘年復反鄉國仰屬伊公在亳渭老師周旌賁丘園採拾衡巷遂以哀駘不棄甕盎無遺還顧庸虛未應階此竊承君侯過被以光輝屢有吹噓之言頻蒙薦延之澤故得周行紫閣升降丹墀點污清朝豈不荒愧雖復華陰砥柱帶地窮深嵩高維嶽極天為重未可以方斯盛典譬此洪恩年迫桑榆豈期酬報政以川波非遠對奉無因夜夢子長之遊朝覽希道之疏浮雲西北徒懷魏帝之文行雨東南思假飛山之便窮誠已結荒係逾深方事祈寒願加珍納謹扶力白書迷乏不次孤子徐陵頓首文苑英華六百八十七梁貞陽侯與王太尉僧辨書淵明頓首頓首昔自天狼炳曜非無戰陳之風參虎揚芒便有干戈之務至於夏鍾夷羿周厄犬戎漢委珠囊秦亡寶篋彰於史籍可得而聞未有國家殲危遂若當今者也我大梁膺龍圖而受命御鳳邸以承天軒頊比於諸王湯武方於兒戲三光有乂四海無波靈貺咸臻表裏禔福非日非月蒼生仰其照臨如雲如雨天下蒙其恩蔭而屯亨有數剝極為災梟獍豺狼肆逞凶逆後主誕資上聖光啓中興大剪仇讎方平宗社雖復瀟湘舉斧庸蜀彎弓凡厥凶徒誰不殲撲豈圖天未悔禍喪亂薦臻羌虜無厭乘此多難虔劉我南國蕩覆我西京奉聞驚號肝膽崩潰雖復金行版蕩火政淪亡緑林青犢之群黑山白馬之卒八王故事曾未混淆九州春秋誰云禍亂昔隆周徙播皆憑晉鄭之功強漢阽危終假虛牟之力今者武皇之子無復一人藐是孤孫還同三叛等子頽而為暴同劉芳而入關乞命諸戎勢何支久孤宗室之長爰自布衣皇運之初彌承天德何則據鞍輟哭雖紹霸圖獨居掩涕終討家怨孤二三昆季方矢戴天被此恩慈如何酬答所以徐彭之役不吝輕軀哀荷之誠久聞朝聽況復邦家不造至此橫流宗社無依何所逃責因以提戈負劍臥泣行號言念荊巫志雪讎恥大齊觀書有洛輯瑞榮河功格蒼旻德滿天地慈孝之道通於百靈仁信之風覃於萬國是以日月所照舟車所通候海水以來賓瞻蒼雲以奉貢昔自軒農炎昊曾無宣國之規虞夏商周非有伐戎之略豈知華夷仰德遠近同心穀價無堯湯之憂糧儲同水火之賤精兵利器勢勇雷霆天馬龍媒量比山谷斯固開闢已來未之有也至於親鄰之道夙契逾深無改曩懷尊感彌篤以為興亡繼絶事昞前經推擇庸虛命守宗祀方欲仰憑神武清我寇讎旨喻難違諸懷更恧明公誕膺時運光贊本朝勒瑞薑璜書名何鼎故以通期管樂宜契風雲戮不世之渠凶殲滔天之巨寇重以三湘放命七國連從征旅東西必翦妖逆雖復棧道木閣田單之奉舊齊綰璽將兵周勃之扶隆漢中宗佐命俱畫丹青光武功臣皆懸星象非貔非虎之封同心同德之勞挍彼功庸曾何髣佛但與存與亡期於體國喪君有君寧容無主夙承所立猶則孱蒙天步方難寧可弘濟自淹留大國志荷恩私朝夕宮闈預奉顏色黃河白日亟亶誠言分災恤患事非虛旨但善相小國終資大賢定我邦家繄公是賴淮流不竭豈獨琅琊望能喻此衷懷思之無忽近陸居士有啓陳其禍亂朝旨即命河東王嶽等勒率熊羆便相抵赴道阻且長雖無之及所聞西浮夏首便當險隘之衝南捍巴陵方拒窺窬之寇上黨王皇齊寵弟是號宗英親御戎軒遠於將送裴侍中英起淮南貴族兼事戎行躍冀馬者千群披燕犀者萬隊來自河陽曾不旬日持節徐武潼三州諸軍事散騎常侍明遠將軍東徐州刺史始興縣開國侯湛海珍等並前朝舊將夙著勳庸推轂海邊屬是喪亂雖復投身有道志雪朝怨咸預戎行共指鄉國江淮舊隸悉已招攜方稟英謨共翦讎難去月將晦便屆壽春已具舟師將臨江浦使人入境行陳所懷揆日覘光遲枉還牘當使宗祊有主余同小白之勳家國無虞公保阿衡之貴何其美也豈不休哉言念此私但以號咽蕭淵明頓首文苑英華六百七十七為貞陽侯答王太尉書薑嵩至枉示具公忠義之懷家國喪亂於今積年三后蒙塵四海騰沸天命元輔匡救本朝弘濟艱難建我宗祏至於丘園版築尚想來儀公室皇枝豈不虛遲聞孤還國理會高懷但近再命行人或不宣具公既詢謀卿士訪逮藩維沿泝往來理淹旬月使乎屆止殊副所期便是再立我蕭宗重興我梁國億兆黎庶咸蒙此恩社稷宗祧曾不相愧近軍次東關頻遣信裴之橫處示其可否答對驕凶殊駭聞矚上黨王陳兵見衛欲敘安危無識之徒忽然逆戰前旌未舉即自披猖驚悼之情彌以傷惻上黨王深自矜嗟不傳首級更蒙封樹飾棺厚殯務從優禮齊朝大德信感神民方仰藉皇威敬憑元宰討逆賊於咸陽誅叛子於雲夢同心協力克定邦家覽所示權景宣書上流諸將本有忠略棄親向讎庶當不爾防姦定亂終在於公今且頓東關更待來信未知水陸何處見迎夫建國立君布在方策入盟出質有自來矣若公之忠節上感蒼旻群帥同謀必匪攜二則齊師反旆義不陵江如致爽言誓以無克韜旗側席遲復行人曹沖奉表齊都即押送也渭橋之下惟遲敘言汜水之陽預有號懼梁書王僧辨傳又為梁貞陽侯答王太尉書薑常侍皓至復枉去月三十日告具公所懷良以慨息孤雖庸薄不及通賢猶曰生民寧無心識自皇家禍亂亟積寒暄九州萬國之人蟠木流沙之地莫不行號臥泣想望休平何況於孤預在宗室家荷報雪之恩身蒙鞠養之愛者先皇之慈也蒸嘗不絶於私廟子弟得嗣於南藩者後主之惠也朱方之地建業之都誰家丘陵誰家宮廟豈有為人臣子荷此恩靈親執干戈自殉家國公之忠孝信感人神公之盟誓事同懸象雖復宗盟不造骨肉為讎安可相期盡如蕭察耶古者天子六軍是為萬乘今日凶荒致闕斯禮偏裨將挍尚握精兵州郡官曹各有交吏未有居稱扆座行曰乘輿遂無五尺之童高謝千人之長於公明允意復云何國家凋荒既乏屯衛皇齊與睦幸惠優矜何乃自起趑趄苟違鄰德克勘禍亂欲立功名咸自軍師豈在芻隸湛海珍等前朝舊將差匪齊人分給羸兵即是梁甲非云背信豈曰渝盟朝野群雄何所攜二且公天資命世再造皇家梁代之桓文蕭宗之伊管誰其遠近不稟英謨如有姦回正速齊斧尚何憂於共工何畏於有苗哉所覽來書既為疑難上黨王恭承朝旨不敢相同方篤鄰和不容全異如須減損更遲行人張廷尉種等所具此無多及蕭淵明頓首文苑英華六百七十七梁貞陽侯重與王太尉書淵明頓首頓首席威卿等還枉此月十四日告披覽未周良深慨息昔長平建策猶聞蝕昴之徵疏勒效忠時致飛泉之感豈在余涼德書不盡言遂使吾賢猶迷所執斯故銜哀掩淚仍復披陳者也孤以庸薄寧有霸圖侯服于周常懼盈滿豈望身居黃屋手御青綸揖讓而對三靈端委而朝百辟詢諸圉牧莫不皆知援誓神明固自無爽但大齊仁信之道關於至誠睦鄰之懷由於孝德遂蒙殊獎歸嗣本朝拜首陳辭敦誘彌廣既而仇讎未殄方憑大國之威宗祏阽危尤仰親仁之德僶俯恩寄號靦惟深而敕諭分明信誓殊重乃云邦家有乂社稷無虞凡廣陵歷陽皆許見還白水黃河屢奉然諾至於夏藩衝要控遏上流且命強兵為我臨據若其自有精甲能捍醜徒並用還梁皆如前旨以孤頻經忝竊屢守淮肥門生故吏遍於江右凡諸部曲並使招攜投赴戎行前後雲集霜戈雪戟無非武庫之兵龍甲犀渠皆是雲臺之仗文物以紀之聲名以發之斯實不世之隆恩寧曰循常之恆禮明公固天所授弘濟本朝曲阜同功營丘等烈若夫伊尹庖廚賤宰霍光階闥小臣諸葛亮無應變之才管夷吾非王者之相論其世業較彼勤勞書契已來罕有明德且程嬰之義自古為難荀息之忠良以喜慰但先朝秉玉鏡之符御金輪之寶菩薩之化行於十方仁壽之功沾於萬國凶人侯景遂殄邦家何況於今亦有吳會江東如掌差匪虛言淮陽在面方此非局不稼不穡多歷歲時大東小東全無機杼關中醜虜寧非冒頓之鋒齊國強兵便是軒轅之陳西南當扼喉之勢東北承撫背之機首尾交侵華夷俱騁而沖人數歲復子方賖德未感於黎蒸威不加於將帥斯等怏怏非少主臣安有碌碌因人成事公之才具雖復明允勢何如於天監時何若於大同棄與國之隆恩當滔天之猛寇匡救之德翻未有從忠許之謀誰其相曉臥薪待火方此弗危繫草從風儔之非切若能思其上策審此英圖見引軨獵之車還向長安之邸一則二則惟在大賢外相內相終當相屈正當攜諸舊隸率我賓遊朝服簪纓直拜園寢梁人望國俱登赤馬之舟齊師臨江仍轉蒼鷹之旆分袖南浦揚鞭北風民不疲勞軍無怨讟如其執事尚秉前言將恐戎麾便濟江表何則西浮夏首已據咽喉東進彭波次指心腹廣陵京口烽煙相望魯柝聞邾方之尚遠胡桑對薊比此為遙水陸爭前龍虎交至則揚都蕩定功自齊師江左臣民非關梁國豈不追慚後主崇寄之恩還負齊朝親鄰之意東門黃犬固以長悲南陽白衣何可復得立茲幼弱非曰大勳滅我宗祊何所逃舋今復遣前吉州刺史馬嵩仁至彼更具往懷想不遠而復無貽祗悔也若英謨有在方興祀夏之功明監如違便等過殷之嘆存亡社稷一在於公臨紙崩號不復多及蕭淵明頓首頓首文苑英華六百七十七又見六百八十二為貞陽侯重答王太尉書王尚書通至復枉示知欲遣賢弟子世珍以表誠質具悉憂國之懷復以庭中玉樹掌內明珠無纍胸懷志在匡救豈非劬勞我社稷弘濟我邦家慚歎之懷用忘興寢晉安王東京貽厥之重西都繼體之賢嗣守皇家寧非民望但世道喪亂宜立長君以其蒙孽難可承業成昭之德自古希儔沖質之危何代無此孤身當否運志不圖生忽荷不世之恩仍致非常之舉自惟虛薄兢懼已深若建承華本歸皇胄心口相誓惟擬晉安如或虛言神明所殛覽今所示深遂本懷戢慰之情無寄言象但公憂勞之重既稟齊恩忠義之情復及梁二華夷兆庶豈不懷風宗廟明靈豈不相感正爾回旆仍向歷陽所期質纍便望來彼衆軍不渡已著盟書斯則大齊聖主之恩規上黨英王之然諾得原失信終不為也惟遲相見使在不賖鄉國非遙觸目號咽梁書王僧辨傳貞陽侯答王太尉書周尚書弘正張廷尉種薑常侍嵩等至枉此月二十六日告并遣賢弟子世珍賢子顯等具忠款之至公養孤之恩愛甚鄧侯少子之懷情深張禹豈非憂勞社稷用忍肌膚天下含靈誰無悲愧余遭家不造敬纍吾賢言念忠誠益以號咽但皇齊大德過見優矜微借輕兵以垂將送意謂江東凋弊纍積寒暄供膳資儲理當多闕輒白上黨王止請三千人二百匹而已凱衆人殊尚有疑難將恐諸士未喻雅懷今復命周尚書及薑常侍還彼具陳一二夫以受為寇非有晉邦不送為譏終無楚國五千步卒既謝李陵三千嬴兵亦等無忌公之明義理不為嫌行人失辭尚停然諾臨江總轡企望音郵唯遲來書此不多具蕭某白文苑英華六百六十七
