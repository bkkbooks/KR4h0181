body:
  text: 卷六徐陵鴛鴦賦飛飛兮海濱去去兮迎春炎皇之季女織素之佳人未若宋玉之小史含情而死憶少婦之生離恨新婚之無子既交頸於千年亦相隨于萬里山雞映水那自得孤鸞照鏡不成雙天下真成長合會無勝比翼兩鴛鴦觀其哢吭浮沈輕軀瀺灂拂荇戲而波散排荷翻而水落特訝鴛鴦鳥長情真可念許處勝人多何時肯相厭聞道鴛鴦一鳥名教人如有逐春情不見臨邛卓家女祇為琴中作許聲藝文類聚九十二進武帝為長城公詔德懋懋官功懋懋賞皇王盛則所謂元龜司空公南徐州刺史長城縣開國侯諱志懷寅亮風度弘遠體文經武明允篤誠曩者率五嶺之彊兵誅四海之讎敵固以勒功彝鼎書勳太常克定京師勤勞自重自鎮撫枌榆永寧豐沛東涼既息北蔡無歸代馬燕犀氣雄天下裹糧坐甲固敵是求方欲大討於秦崤敦修於與睦叶謀上相爰納朕躬思所以敬答忠勳用申朝典可進爵為長城縣公藝文類聚五十一陳公九錫詔肇昔元胎剖判太素氤氳崇建人皇必憑洪宰故賢哲之后牧伯征於四方神武之君大監治乎萬國又有一匡九合渠門之賜以隆戮帶圍溫行宮之寵斯茂時危所以貞固運泰所以光熙斯乃千載同風百王不刊之道也太傅義興公允文允武乃聖乃神固天生德康濟黔首昔在休期早隆朝寄遠踰滄海大極交越皇運不造書契未聞中國其亡兵凶總至哀哀噍類譬彼窮牢悠悠上天莫云斯極否終則泰元輔應期救此將崩援茲已溺乘舟履輦架險浮深經略中塗畢殲群醜洎乎石頭姑熟流髓履腸一朝指撝六合清晏是用光昭下武翼亮中都雪三后之勍讎夷三靈之巨慝堯治禹佐未始能階殷相周師固非云擬重之以屯剝餘象荊楚大崩天地無心乘輿委御五湖薦食競謀諸夏八方棊跱莫有匡救強臣放命黜我沖人顧影於荼孺之魂甘心於寧卿之辱卻案下髻求哀之路莫從竊鈇逃責容身之地無所公神兵奄至不日清澄惟是孱蒙再膺天祿斯又巍巍蕩蕩無得而稱焉加以仗茲忠義屠彼祅逆震部夷氛稽山罷祲番禺蠡澤北鄙西郊殲厥凶徒罄無遺種斯則兆民之命修短所縣率土之基興亡是賴於是刑禮兼訓沿革有章中外咸平遐邇寧一用能使陽光合魄曜象呈暉棲閣遊庭抱仁含信宏勳該於厚地大道格於玄天羲農炎昊以來卷領垂衣之世聖人濟物未有如斯者也夫備物典策桓文是膺助理陰陽蕭曹不讓未有功高於㝢縣而賞薄於伊周凡厥人祇固懷延佇實由公謙撝自牧降損為懷嘉數遲回永言增歎豈可申茲雅尚久廢朝猷宜戒司勳敬申鴻典且重華大聖媯汭惟賢盛德之祀無忘公侯之門必復是以殷嘉亶父繼后稷之官堯命羲和纂重黎之位況其本支攸建宜誓山河者乎其進公位相國總百揆封十郡為陳公備九錫之禮加璽紱遠遊冠緑綟綬位在諸侯王上其鎮衛大將軍揚州牧如故陳書武帝紀上梁禪陳詔五運更始三正迭代司牧黎庶是屬聖賢用能經緯乾坤彌綸區宇大庇黔首闡揚鴻烈革晦以明積代同軌哲王踵武咸由此則梁德湮微禍亂薦發太清云始見困長蛇承聖之季又罹封豕爰至天成重竊神器三光亟沈七廟乏祀含生已泯鼎命斯墜我武元之祚有如綴旒靜惟屯剝夕惕載懷相國陳王有命自天降神維嶽天地合德晷曜齊明拯社稷之橫流提億兆之塗炭東誅逆叛北殲獯醜威加四海仁漸萬國復張崩樂重興絶禮儒館聿修戎亭虛候大功在舜盛績惟禹巍巍蕩蕩無得而稱來獻白環豈直皇虞之世入貢素雉非止隆周之日固以效珍川陸表瑞煙雲甘露醴泉旦夕凝涌嘉禾芝草孳植郊甸道昭於悠代勳格於皇穹明明上天光華日月革故著於玄象代德彰於圖讖獄訟有歸謳歌爰適天之曆數實有攸在朕雖庸藐暗於古昔永稽崇替為日已久敢忘列代之遺典人祇之至願乎今便遜位別宮敬禪於陳一依唐虞宋齊故事梁書敬帝紀陳書武帝紀上陳文帝登祚尊皇太后詔朕以虛薄才非弘濟竊守藩維常懼盈滿豈圖蒼昊不弔國步艱難皇嗣元良藐在崤渭二臣奉迎川塗靡從六傳還朝淹留永日今國圖無主家業事隆上奉父母之嚴規下逼群公之廷諍遂以庸質升纂帝基對揚大化彌增號懼今宜式遵舊則奉上皇后尊號為皇太后御慈訓宮一依前典若中流靜晏皇嗣歸來輒當解紱於箕山之陽歸老于琅琊之國復子明辟還承寶圖若問與夷無愧園寢藝文類聚十五始興王詔漢祖天倫伯叔逮封晉元世系琅琊傳國仰惟二后重光率由前典朕昔因藩次蒙繼本宗分在要荒久離寒燠天嘉紹祚別命皇枝歸自崤函禮隔登獻每至霜庭可履矚垣寢而懷悲風樹鳴條望章陵而增感今嗣王乖德獲罪慈訓永言主奠宜自朕躬但國步時艱皇基務切復奉家業升纂帝圖重違情禮言深哽慟可以第二皇子叔陵為始興王藝文類聚五十一陳公九錫文大哉乾元資日月以貞觀至哉坤元憑山川以載物故惟天為大陟配者欽明惟王建國翼輔者齊聖是以文武之佐磻溪蘊其玉璜堯舜之臣濙河鏤其金版況乎體得一之鴻姿寧陽九之危厄拯橫流於碣石撲燎火於崑岑驅馭於韋彭跨蹍於秦晉神功行而靡用聖道運而無名者乎今將授公典策其敬聽朕命日者昊天不弔鍾亂於我國家網漏吞舟彊胡內贔茫茫宇宙惵惵黎元方足圓顱萬不遺一太清否亢橋山之痛已深大寶屯如平陽之禍相繼上宰膺運康救兆民鞠旅於滇池之南揚旌於桂嶺之北懸三光於已墜謐四海於群飛屠猰㺄於中原斫鯨鯢於濛汜蕩寧上國光啓中興此則公之大造於皇家者也既而天未悔禍夷醜薦臻南夏崩騰西京蕩覆群胡孔熾藉亂乘間推納藩枝盜假神器冢司昏撓旁引寇讎既見貶於桐宮方謀危於漢閣皇運已殆何殊贅旒中國搖然非徒如線公赫然投袂匡救本朝復莒齊都平戎王室朕所以還膺寶歷重履宸居挹建武之風猷歌宣王之雅頌此又公之再造於皇家者也公應務之初登庸惟始三川五嶺莫不窺臨銀洞珠宮所在寧謐孫盧肇釁越貊為災番部阽危勢將淪殄公赤旗所指祅壘洞開白羽才撝凶徒紛潰非其神武久喪南藩此又公之功也大同之末邊政不修李賁狂迷竊我交愛敢稱大號驕恣甚於尉他據有連州雄豪熾於梁碩公英謨雄算電掃風行馳御樓船直跨滄海新昌典徹備履艱難蘇歷嘉寧盡為京觀三山獠洞八角蠻陬逖矣水寓之鄉悠哉火山之國馬援之所不屆陶璜之所未聞莫不懼我王靈爭朝邊候歸琛天府獻狀鴻臚此又公之功也自寇虜陵江宮闈幽辱公枕戈嘗膽提劍撫心氣涌青霄神飛紫闥而番禺連率本自諸夷言得其朋是懷同惡公仗此忠誠乘機勦定執沛令而釁鼓平新野而據鞍此又公之功也世道初艱方隅多難勳門桀黠作亂衡嶷兵切池隍衆兼夷獠公以國盜邊警知無不為恤是同盟誅其醜類莫不魚驚鳥散面縛頭懸南土黔黎重保蘇息此又公之功也長驅嶺嶠夢想京畿緣道酋豪遞為榛梗路養渠率全據大都蓄聚逋逃方謀阻亂百樓不戰雲梯之所未窺萬弩齊張高輣之所非敵公龍驤虎步嘯吒風雲山靡堅城野無彊陳清祅氛於贛石滅沴氣於雩都此又公之功也遷仕凶慝屯據大皋乞活類馬騰之軍流民多杜韜之衆推鋒轉鬭自北徂南頻歲稽誅實惟勍虜公坐揮三略遙制六奇義勇同心貔貅騁力雷奔電擊谷靜山空列郡無犬吠之驚叢祠罷狐鳴之盜此又公之功也王師討虜次屆淪波兵乏兼儲士有饑色公回麾蠡澤積穀巴丘億庾之詠斯豐壺漿之迎是衆軍民轉漕曾無砥柱之難艫舳相望如運敖倉之府犀渠貝胄顧蔑雷霆高艦層樓仰捫霄漢故使三軍勇鋭百戰無前承此兵糧遂殄凶逆此又公之功也若夫英圖邁俗義旅如雲湓壘猜攜用淹戎略公志唯同獎師克在和鵠塞非虞鴻門是會若晉侯之誓白水如蕭王之推赤心屈禮交盟人祇感咽故使舟師並路遠邇同心此又公之功也姑熟襟要崤函阻憑寇虜據其關梁大盜負其扃鐍公一校裁撝三雄並奮左賢右角沙潰土崩木甲殪於中原氈裘赴於江水他他藉藉萬計千群鄂坂之隘斯開夷庚之道無塞此又公之功也義軍大衆俱集帝京逆豎凶徒猶屯皇邑若夫表裏山河金湯嶮固疏龍首以抗殿揃華嶽以為城雜虜憑焉強兵自若公回茲地軸抗此天羅曾不崇朝俾無遺噍軍容甚穆國政方修物重覩於衣冠民還瞻於禮樂楚人滿道爭覩於葉公漢老銜悲俱觀於司隸此又公之功也內難初靖諸侯出關外郡傳烽鮮卑犯塞莫非且渠當戶中貴名王冀馬列於淮南胡笳動於徐北公舟師步甲亘野橫江殲厥群羝遂殫封豨莫不絓木而止戎車靡遺遇濘而旋歸驂盡殪此又公之功也公克黜禍難劬勞皇室而孫寧之黨翻啓狄心伊洛之間咸為虜戍雖金陵佳氣石壘天嚴朝暗戎塵夜喧胡鼓公三籌既畫八陳斯張裁舉靈旗亦抽金僕咸俘醜類悉反高墉異李廣之皆誅同龐元之盡赦此又公之功也任約叛渙梟聲不悛戎羯貪婪狼心無改穹廬氈幕抵北闕而為營烏孫天馬指東都而成陳公左甄右落箕張翼舒掃是攙搶驅其獫狁長狄之種埋於國門椎髻之酋烹於軍市投秦坑而盡沸噎濉水而不流此又公之功也一相居中自折彝鼎五湖小守妄懷同惡公夙駕兼道秉羽杖戈玉斧將揮金鉦且戒祅酋震懾遽請灰釘爇櫬以表其含弘焚書以安其反側此又公之功也賊龕凶橫陵虐具區阻兵安忍憑災怙亂自古蟲言鳥跡混沌洪荒凡或虔劉未此殘酷公雖宗居汝潁世寓東南育聖誕賢之鄉含章挺生之地眷言桑梓公私憤切卓爾英猷承規奉算戮此大憝如烹小鮮此又公之功也亂離永久群盜孔多浙左凶渠連兵搆逆豈止千兵五校白雀黃龍而已哉公以中軍無率選是親賢奸寇途窮漼然冰泮刑溏之所文命動其大威雷門之間勾踐行其嚴戮英規聖跡異代同風此又公之功也同姓有扈頑凶不賓憑藉宗盟圖危社稷觀兵匯澤勢震京師驅率南蠻已為東帝公論兵於廟堂之上決勝於尊俎之間寇賈樊滕浮江下瀨一朝揃撲無待甸師萬里澄清非勞新息此又公之功也豫章祅寇依憑山澤繕甲完聚多歷歲時結從連橫爰洎交廣呂嘉既獲吳濞已鏦命我還師征其不恪連營盡拔僞黨斯擒曜聖武於匡山回神旌於蠡漘此又公之功也自八紘九野瓜剖豆分竊帝偷王連州比縣公武靈已暢文德又宣折簡馳書風猷斯遠至於蒼蒼浴日杳杳無雷北洎丈夫之鄉南踰女子之國莫不屈膝膜拜求吏款關此又公之功也京師禍亂亟積寒暄雙闕低昂九門寥豁寧秦宮之可顧豈魯殿之猶存五都簪辨百僚卿士胡服縵纓咸為戎俗高冠厚履希復華風宋微子麥穟之歌周大夫黍離之歎方之於斯未足為悲矣公求衣昧旦昃食高舂興構宮闈具瞻遐邇膠庠宗稷之典六符十等之章還聞太始之風流重覩永平之遺事此又公之功也公有濟天下之勳重之以明德凝神體道合德符天用百姓以為心隨萬機而成務恥一物非唐虞之民歸含靈於仁壽之域上德不德無為以為夏長春生顯仁藏用忠信為寶風雨弗愆仁惠為基牛羊勿踐功成治定樂奏咸雲安上治民禮兼文質物色丘園衣裾里巷朝多君子野無遺賢菽粟同水火之饒工商富猗頓之旅是以天無蘊寶地有呈祥潏露卿雲朝團曉映山車澤馬服馭登間既景煥於圖書方葳蕤於史諜高勳踰於象緯積德冠於嵩華固無得而稱者矣朕又聞之前王宰世茂賞尊賢式樹蕃長總征群伯二南崇絶四履遐曠泱泱表海祚土維齊巖巖泰山俾侯於魯抑又勤王反鄭夾輔遷周召伯之命斯隆河陽之禮咸備況復經營宇宙寧唯斷鰲足之功弘濟蒼生非直鑿龍門之嶮而疇庸報德寂爾無聞朕所以垂拱當寧載懷慚悸者也今授公相國以南豫州之陳留南丹陽宣城揚州之吳興東陽新安新寧南徐州之義興江州之鄱陽臨川十郡封公為陳公錫茲青土苴以白茅爰定爾邦用建冢社昔旦奭分陝俱為保師晉鄭諸侯咸作卿士兼其內外禮實攸宜今命使持節兼太尉王通授相國印綬陳公璽紱使持節兼司空王瑒授陳公茅土金獸符第一至第五左竹使符第一至第十左相國秩踰三鉉任總百司位絶朝班禮由事革其以相國總百揆除録尚書之號上所假節侍中貂蟬中書監印章中外都督太傅印綬義興公印策其鎮衛大將軍揚州牧如故又加公九錫其敬聽後命以公禮為楨幹律等銜策四維皆舉八柄有章是用錫公大輅戎輅各一玄牡二駟以公賤寶崇穀疏爵待農室富京坻民知榮辱是用錫公袞冕之服赤舄副焉以公調理陰陽燮諧風雅三靈允降萬國同和是用錫公軒縣之樂六佾之舞以公宣導王猷弘闡風教光景所照鞮象必通是用錫公朱戶以居以公抑揚清濁褒德進賢髦士盈朝幽人虛谷是用錫公納陛以登以公嶷然廊廟為世鎔範折衝四表臨御八荒是用錫公武賁之士三百人以公執茲明罰期在刑措象恭無赦干紀必誅是用錫公斧鉞各一以公英猷遠量跨厲嵩溟混一車書括囊寰宇是用錫公彤弓一彤矢百玈弓十玈矢千以公天經地義貫徹幽明春露秋霜允恭粢盛是用錫公秬鬯一卣圭瓚副焉陳國置丞相以下一遵舊式往欽哉其恭循朕命克相皇天弘建邦家允興洪業以光我高祖之休命陳書武帝紀上南史九文苑英華四百四十七梁禪陳策文咨爾陳王惟昔上古厥初生民驪連栗陸之前容成大庭之代竝結繩寫鳥杳冥慌忽故靡得而詳焉自羲農軒昊之君陶唐有虞之主或垂衣而御四海或無為而子萬姓居之如馭朽索去之如脫敝屣裁遇許由便能捨帝暫逢善卷即以讓王故知玄扈璇璣非關尊貴金根玉輅示表君臨及南觀河渚東沉刻璧精華既竭耄勤已倦則抗首而笑惟賢是與䜎然作歌簡能斯授遺風餘烈昭晰圖書漢魏因循是為故實宋齊授受又弘斯義我高祖應期撫運握樞御宇三后重光祖宗齊聖及時屬陽九封豕薦食西都失馭夷狄交侵乃暨天成輕弄龜鼎惵惵黔首若崩厥角微微皇極將甚綴旒惟王乃聖乃神欽明文思二儀竝運四時合序天錫智勇人挺雄傑珠庭日角龍行虎步爰初投袂曰乃勤王電掃番禺雲撤彭蠡揃其元惡定我京畿及王賀帝弘貿茲冠履既行伊霍用保沖人震澤稽陰竝懷叛逆獯羯醜虜三亂皇都裁命偏師二邦自殄薄伐玁狁六戎盡殪嶺南叛換湘郢結連賊帥既擒凶渠傳首用能百揆時序四門允穆無思不服無遠不屆上達穹昊下漏深泉蛟魚竝見謳歌攸屬況乎長彗橫天已徵布新之兆璧日斯既實表更姓之符是以始創義師紫雲曜彩肇惟尊主黃龍負舟楛矢素翬梯山以至白環玉玦慕德而臻若夫安國字萌本因萬物之志時乘御宇良會樂推之心七百無常期皇王非一族昔木德既季而傳祚於我有梁天之曆數允集明哲式遵前典廣詢群議王公卿尹莫不攸屬敬從人祇之願授帝位於爾躬四海困窮天祿永終王其允執厥中軌儀前式以副溥天之望禋祀上帝時膺大禮永固洪業豈不盛歟陳書武帝紀上南史九梁禪陳璽書君子者自昭明德達人者先天弗違故能進退咸亨動靜元吉朕雖蒙寡庶乎景行何則三才剖判九有區分情性相乖亂離云起是以建彼司牧推乎聖賢授受者任其時來皇王者本非一族人謀是與屈己從萬物之心天意斯歸鞠躬奉百靈之命謳歌所往則攘袂以膺之菁華已竭乃褰裳而去之昔在唐虞鑒於天道舉其黎獻授彼明哲雖復質文殊軌沿革不同歷代因循斯風靡替我大梁所以考庸太室接禮二宮月正元日受終文祖但運不常夷道無恆泰山嶽傾偃河海沸騰電目雷聲之禽鉤爪鋸牙之獸咀齧含生不知紀極二后英聖相仍在天六夷貪狡爭侵中國縣王都帝人懷干紀一民尺土皆非梁地朕以不造幼罹閔凶仰憑衡佐亟移年序周成漢惠邈矣無階惟是童蒙必貽顛蹶若使時無聖哲世靡艱難猶當高蹈于滄洲自求於支伯者矣惟王應期誕秀開籙握圖性道故其難聞嘉庸以其被物乾行同其燾覆日馭比其貞明登承聖於復禹之功樹鞠子於興周之業滅陸渾於伊洛殲驪戎於鎬京大小二震之驍徒東南兩越之勍寇遽行天討無遺神策於是祖述堯舜憲章文武大樂與天地同和大禮與天地同節鼓之以雷霆潤之以風雨仁霑葭葦信及豚魚殷牖斯空夏臺虛設民惟大畜野有同人升平頌平無偏無黨加以雲飛紫蓋水躍黃龍東伐西征掩映川陸榮光曖曖已冒郊廛甘露瀼瀼亟流庭苑車轍馬跡誰不率從蟠木流沙誰不懷德祥圖遠至非唯赤伏之符靈命昭然何止黃星之氣海口河目賢聖之表既彰握旄執鉞君人之狀斯偉且自攝提無紀孟陬殄滅枉矢宵飛天弧曉映久矣夷羊之在牧時哉蛟龍之出泉革運之兆咸徵惟新之符竝集朕以欽若勛華屢回星琯昔者木運斯盡豫高祖受焉今歷去炎精神歸樞紐敬以火德傳於爾陳遠鋻前王近謀群辟明靈有悅率土同心今遣使持節兼太保侍中尚書左僕射平樂亭侯王通兼太尉司徒左長史王瑒奉皇帝璽綬受終之禮一依唐虞故事王其時陟元后寧育兆民光闡洪猷以承昊天之休命陳書武帝紀上
