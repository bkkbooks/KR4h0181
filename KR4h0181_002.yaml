body:
  text: 文帝即位大赦詔上天降禍奄集邦家大行皇帝背離萬國率土崩心若喪考妣龍圖寶曆眇屬朕躬運鍾擾攘事切機務南面須主西讓禮輕今便式膺景命光宅四海可大赦天下罪無輕重悉皆蕩滌逋租宿債吏民愆負可勿復收文武內外量加爵敘孝悌力田為父後者賜爵一級庶祗畏在心公卿畢力勝殘去殺無待百年興言號哽深增慟絶陳書文帝紀封第二子頊為始興王詔日者皇基肇建封樹枝戚朕親地攸在特啓大邦弟頊嗣承門祀雖土宇開建薦饗莫由重以遭家不造閔凶夙遘儲二遐隔轊車未返猥以眇身膺茲景命式循龜鼎冰谷載懷今既入奉大宗事絶藩祼始興國廟蒸嘗無主瞻言霜露感尋慟絶其徙封嗣王頊為安成王封第二子伯茂為始興王以奉昭烈王祀賜天下為父後者爵一級庶申罔極之情永保山河之祚陳書始興王伯茂傳詔答沈炯省表具懷卿譽馳咸雒情深宛沛日者理切倚門言歸異域復牽時役遂乖侍養雖周生之思每欲棄官戴禮垂文得遺從政前朝光宅四海劬勞萬機以卿才為獨步職居專席方深委任屢屈情禮朕嗣奉洪基思弘景業顧茲寡薄兼纏哀疚實賴賢哲同致雍熙豈便釋𥳑南闈解紱東路當令馮親入舍荀母從官用覩朝榮不虧家禮尋敕所司相迎尊纍使卿公私得所竝無廢也陳書沈炯傳改元大赦詔朕以寡味嗣纂洪業哀惸在疚治道弗昭仰惟前德幽顯遐畼恭己不言庶幾無改雖宏圖懋軌日月方弘而清廟廓然聖靈浸遠感尋永往瞻言罔極今四象運周三元告獻華夷胥洎玉帛駿奔思覃遺澤播之億兆其大赦天下改永定四年為天嘉元年鰥寡孤獨不能自存立者賜穀人五斛孝悌力田殊行異等加爵一級陳書文帝紀親祠南郊詔朕式饗上玄虔奉牲玉高禋禮畢誠敬兼弘且陰霾浹辰褰霽在日雲物韶朗風景清和慶動人祇忭流庶俗思俾黎元同此多祜可賜民爵一級陳書文帝紀原宥王琳黨與詔夫五運遞來三靈眷命皇王因之改創殷周所以樂推朕統曆承基丕隆鼎運期理攸屬數祚斯在豈僥幸所至寧卜祝可求故知神器之重必在符命是以逐鹿貽譏斷蛇定業亂臣賊子異世同尤王琳識暗挈瓶智慚衛足干紀亂常自貽顛沛而搢紳君子多被縶維雖涇渭合流蘭鮑同肆求之厥理或有脅從今九罭既設八紘斯掩天網恢恢吞舟是漏至如伏波游說永作漢蕃延壽脫歸終為魏守器改秦虞材通晉楚行藏用舍亦豈有恆宜加寬仁以彰雷作其衣冠士族預在凶黨悉皆原宥將帥戰兵亦同肆眚竝隨才銓引庶收力用陳書文帝紀贈諡死事將士詔師旅以來將士死王事者竝皆贈諡陳書文帝紀蠲得丁役詔日者凶渠肆虐衆軍進討舟艦輸積權倩民丁師出經時役勞日久今氛祲廓清宜有甄被可蠲復丁身夫妻三年于役不幸者復其妻子陳書文帝紀寬賦詔自喪亂以來十有餘載編戶凋亡萬不遺一中原氓庶蓋云無幾頃者寇難仍接算斂繁多且興師以來千金日費府藏虛竭杼軸歲空近所置軍資本充戎備今元惡克殄八表已康兵戈靜戢息肩方在思俾餘黎陶此寬賦今歲軍糧通減三分之一尚書申下四方稱朕哀矜之意守宰明加勸課務急農桑庶鼓腹含哺復在茲日陳書文帝紀録序郢州官屬詔蕭莊僞署文武官屬還朝者量加録序陳書文帝紀衡陽王喪柩至下詔夫寵章所以嘉德禮數所以崇親乃歷代之通規前王之令典新除使持節散騎常侍都督湘州諸軍事驃騎將軍湘州牧衡陽王昌明哲在躬圭璋早秀孝敬內湛聰睿外宣梁季艱虞宗社顛墜西京淪覆陷身關隴及鼎業初基外蕃逆命聘問斯阻音介莫通眷彼機橋將鄰烏白今者群公戮力多難廓清輕傳入郛無勞假道周朝敦其繼好驂駕歸來欣此朝聞庶歡昏定報施徒語曾莫輔仁人之云亡殄悴斯在奄焉薨殞倍增傷悼津門之慟空在桓岫之功不追靜言念之心焉如割宜隆懋典以協徽猷可贈侍中假黃鉞都督中外諸軍事太宰揚州牧給東園溫明祕器九旒鑾輅黃屋左纛武賁班劍百人轀輬車前後部羽葆鼓吹葬送之儀一依漢東平憲王齊豫章文獻王故事仍遣大司空持節迎護喪事大鴻臚副其羽衛殯送所須隨由備辦陳書衡陽王昌傳葬梁元帝詔梁孝元遭離多難靈櫬播越朕昔經北面有異常倫遣使迎接以次近路江寧既是舊塋宜即安卜車旗禮章悉用梁典依魏葬漢獻帝故事陳書文帝紀進賢詔朕以眇身屬當大寶負荷至重憂責實深而庶績未康胥怨猶結佇咨賢良發于夢想每有一言入聽片善可求何嘗不褒獎抽揚緘書紳帶而傅巖虛往穹谷尚淹蒲幣空陳旌弓不至豈當有乖則哲使草澤遺才將時運澆流今不逮古側食長懷寢興增歎新安太守陸山才有啓薦梁前征西從事中郎蕭策梁前尚書中兵郎王暹竝世胄清華羽儀著族或文史足用或孝德可稱竝宜登之朝序擢以不次王公已下其各進舉賢良申薦淪屈庶衆才必萃大廈可成使棫朴載哥由庚在詠陳書文帝紀羅願新安志九僑舊著籍詔自頃喪亂編戶播遷言念餘黎良可哀惕其亡鄉失土逐食流移者今年內隨其適樂來歲不問僑舊悉令著籍同土斷之例陳書文帝紀通典三種麥詔菽粟之貴重于珠玉自頃寇戎游手者衆民失分地之業士有佩犢之譏朕哀矜黔庶念康斃俗思俾阻飢方存富教麥之為用要切斯甚今九秋在節萬實可收其班宣遠近竝令播種守宰親臨勸課務使及時其有尤貧量給種子陳書文帝紀禁奢麗詔汙樽土鼓誠則難追畫卯雕薪或可易革梁氏末運奢麗已甚芻豢厭于胥史歌鐘列于管庫牛木被朱丹之采車馬飾金玉之珍逐欲澆流遷訛遂遠朕自諸生頗為內足而家敦朴素室靡浮華觀覽時俗常所扼腕今妄假時乘臨馭區極屬當淪季思聞治道菲食卑宮自安儉陋俾茲薄俗獲反淳風維雕鏤淫飾非兵器及國容所須金銀珠玉衣服雜玩悉皆禁斷陳書文帝紀以方泰為南康世子詔南康王曇朗出隔齊庭反身莫測國廟方修奠饗須主可以長男方泰為南康世子嗣南康王後陳書南康王曇朗附傳停春夏決罪詔古者春夏二氣不決重罪蓋以陽和布澤天秩是弘寬網省刑義符含育前王所以則天象地立法垂訓者也朕屬當澆季思求民瘼哀矜惻隱念甚納隍常欲式遵舊軌用長風化自今孟春訖于夏首罪人大辟事已款者宜且申停陳書文帝紀詔答沈不害省表聞之自舊章弛廢微言將絶朕嗣膺寶業念在緝熙而兵革未息軍國草創常恐前王令典一朝泯滅卿才思優洽文理可求弘惜大體殷勤名教付外詳議依事施行陳書沈不害傳以侯瑱等配食高祖廟庭詔姬業方闡望載渭濱漢曆既融道通圮上若乃儲精辰宿降靈惟嶽風雲有感夢寐是求斯固舟楫鹽梅遞相表裏長世建國罔或不然至于銘德太常從祀清廟以貽厥後來垂諸不朽者也前皇經濟區宇裁成品物靈貺式甄光膺寶命雖謨明濬發幽顯協從亦文武賢能翼宣王業故大司馬驃騎大將軍瑱故司空文育故平北將軍開府儀同三司僧明故中護軍穎故領軍將軍擬或締構艱難經綸夷險或摧鋒冒刃殉義遺生或宣哲協規綢繆帷幄或披荊汗馬終始勤劬莫不罄誠悉力屯泰以之朕以寡昧嗣膺丕緒永言勳烈思弘典訓便可式遵故實載揚盛軌可竝配食高祖廟庭俾茲大猷永傳宗祏陳書文帝紀下詔討留異昔四罪難弘大媯之所無赦九黎亂德少昊之所必誅自古皇王不貪征伐苟為時蠹事非獲已逆賊留異數應亡滅繕甲完聚由來積年進謝群龍自躍于千里退讓首鼠恆持于百心中歲密契番禺既弘天網賜以名爵敦以國姻儻望懷音猶能革面王琳竊據中流翻相應接別引南川之嶺路專為東道之主人結附凶渠唯欣禍亂既祅氛蕩定氣沮心孤類傷鳥之驚絃等窮獸之謀觸雖復遣家入質子陽之態轉遒侍子還朝隗囂之心方熾朕志相成養不計疵慝披襟解帶敦喻殷勤蜂目彌彰梟聲無改遂置軍江口嚴戍下淮顯然反叛非可容匿且縉邦膏腴稽南殷曠永割王賦長壅國民竹箭良材絶望京輦萑蒲小盜共肆貪殘念彼餘氓兼其慨息西戎屈膝自款重關秦國依風竝輸侵地三邊已乂四表咸寧唯此微妖所宜清殄可遣使持節都督南徐州諸軍事征北將軍司空南徐州刺史桂陽郡開國公安都指往擒戮罪止異身餘無所問陳書留異傳贈諡南康王曇朗詔夫追遠慎終抑聞前誥南康王曇朗明哲懋親蕃維是屬入質北齊用紓時難皇運兆興未獲旋反永言跂子日夜不忘齊使始至凶問奄及追懷痛悼兼倍常情宜隆寵數以光恆序可贈侍中安東將軍開府儀同三司南徐州刺史諡曰愍陳書南康王曇朗傳南郊恩詔朕負荷靈圖亟回星琯兢兢業業庶幾治定而德化不孚俗斃滋甚永言念之無忘日夜陽和布氣昭事上玄躬奉牲玉誠兼饗敬思與黎元被斯寬惠可普賜民爵一級其孝悌力田別加一等陳書文帝紀收侯安都詔昔漢厚功臣韓彭肇亂晉倚蕃牧敦約稱兵託六尺于龐萌野心竊發寄股肱于霍禹凶謀潛構追惟往代挻逆一揆永言自古患難同規侯安都素乏遙圖本慚令德幸屬興運預奉經綸拔跡行閒假之毛羽推于偏帥委以馳逐位極三槐任居四嶽名器隆赫禮數莫儔而志唯矜已氣在陵上招聚逋逃窮極輕狡無賴無行不畏不恭受脤專征剽掠一逞椎轂所鎮裒斂無厭寄以徐蕃接鄰齊境貿遷禁貨鬻賣居民椎埋發掘毒流泉壤睚眥僵尸罔顧彝憲朕以爰初締構頗著功績飛驂代邸預定嘉謀所以淹抑有司每懷遵養杜絶百辟日望自新款襟期于話言推丹赤于造次策馬甲第羽林息警置酒高堂陛戟無衛何嘗內隱片嫌去柏人而勿宿外協猜防入成皋而不留而勃戾不悛驕暴滋甚招誘文武密懷異圖去年十二月十一日獲中書舍人蔡景曆啓稱侯安都去月十日遣別駕周弘實來景曆私省宿訪問禁中具陳反計朕猶加隱忍待之如初爰自北門遷授南服受命經停奸謀益露今者欲因初鎮將行不軌此而可忍孰不可容賴社稷之靈近侍誠愨醜情彰暴逆節顯聞外可詳案舊典速正刑書止在同謀餘無所問陳書侯安都傳以周鐵虎配食高祖廟庭詔漢室功臣形寫宮觀魏朝猛將名配宗祧功烈所以長存世代因之不朽故侍中護軍將軍青冀二州刺史沌陽縣開國侯鐵虎誠節鯁亮力用雄敢王業初基行閒纍及垂翅賊壘正色寇庭古之遺烈有識同壯隕身不屈雖隆榮等營魂易遠言追嘉惜宜仰陪壖寢恭頒饗奠可配食高祖廟庭陳書周鐵虎傳曲赦京師詔朕以寡昧屬當負重星籥亟改冕旒弗曠不能仰協璿衡用調玉燭傍慰蒼生以安黔首兵無寧歲民乏有年移風之道未弘習俗之患猶在致令氓多觸網吏繁筆削獄犴滋章雖由物犯囹圄淹滯亦或有冤念俾納隍載勞負戾加以膚湊不適攝衛有虧比獲微痊思覃寬惠可曲赦京師陳書文帝紀賻恤周敷詔使持節散騎常侍都督南豫州緣江諸軍事鎮南將軍南豫州刺史西豐縣開國侯敷受任遐征淹時違律虛矜奸詭遂貽喪什但夙著勤誠亟勞戎旅猶深惻愴愍悼于懷可存其茅賦量所賻恤陳書周敷傳許建安等郡流民還本詔侯景以來遭亂移在建安晉安義安郡者竝許還本土其被略為奴婢者釋為良民陳書文帝紀修治古忠烈墳冢詔梁室多故禍亂相尋兵甲紛紜十年不解不逞之徒虐流生氣無賴之屬暴及徂魂江左肇基王者攸宅金行水位之主木運火德之君時更四代歲逾二百若其經綸三業縉紳民望忠臣孝子何世無才而零落山丘變移陵谷或皆翦伐莫不侵殘玉杯得于民閒漆𥳑傳于世載無復五株之樹罕見千年之表自大祚光啓恭惟揖讓爰暨朕躬聿修祖武雖復旗旗服色猶行杞宋之計每車駕巡遊眇瞻河雒之路故喬山之祀蘋藻弗虧驪山之墳松柏恆守雖戚藩舊壟士子故塋掩殣未周樵牧猶衆或親屬流隸負土無期子孫冥滅手植何寄漢高留連于無忌宋祖惆悵于子房丘墓生哀生靈共惻者也朕所以興言永日思慰幽泉維前代王侯自古忠烈墳冢被發絶無後者可檢行修治墓中樹木勿得樵採庶幽顯咸畼稱朕意焉陳書文帝紀曲赦京師詔朕自居民牧之重託在王公之上顧其寡昧鬱于治道加以屢虧聽覽事多壅積冤滯靡申幽枉弗鑒念茲罪戾有甚納隍而惠澤未流愆陽纍月今歲序云暮元正向肇欲使幽圄之內同被時和可曲赦京師陳書文帝紀改元大赦詔朕以寡德纂承洪緒日昃劬勞思弘景業而政道多昧黎庶未康兼疹患淹時亢陽纍月百姓何咎實由朕躬念茲在茲痛如疾首可大赦天下改天嘉七年為天康元年陳書文帝紀遺詔朕疾苦彌留遂至不救修短有命夫復何言但王業艱難頻歲軍旅生民多斃無忘愧惕今方隅乃定俗教未弘便及大漸以為遺恨社稷任重太子可即君臨王侯將相善相輔翊內外協和勿違朕意山陵務存儉速大斂竟群臣三日一臨公除之制率依舊典陳書文帝紀敕虞荔能敦布素乃當為高卿年事已多氣力稍減方欲仗委良須克壯今給卿魚肉不得固從所執也陳書虞荔傳策命鄱陽王於戲夫建樹藩屏翼獎王室欽若前典咸必由之惟爾夙挺圭璋坐知孝敬令德茂親僉譽所集啓建大邦實惟倫序是用敬遵民瞻錫此圭瑞往欽哉其勉樹聲業永保宗社可不慎歟陳書鄱陽王伯山傳與虞荔書君東南有美聲譽洽聞自應翰飛京許共康時斃而削迹丘園保茲獨善豈使稱空谷之望邪必願便爾俶裝且為出都之計唯遲披覯在于茲日陳書虞荔傳妙法蓮華經懺文菩薩戒弟子皇帝稽首和南十方諸佛無量尊法一切聖賢竊以前佛後佛種種因緣已說當說各各方便莫非真語悉為妙法理無二極起必同歸但因業因心稟萬類之識隨見隨著異群生之相品位分淺深覺悟有遲速法雨一味得之者參差法雷一音聞之者差別是以小乘頓教由此各名聲聞菩薩因斯分路至如鹿苑初說羊車小乘灰斷涅槃分段解脫以諸佛之善巧會衆庶之根機是曰半字未稱三點及夫會三歸一反本還源說大乘經名無量義滅化城于中路駕寶車于四衢衣裏明珠隱而還見髻中真寶于焉始得出寶塔于空虛踴菩薩于大地見希有事證微妙法最勝最尊難逢難值弟子以因地凡夫屬符負荷方欲憲章古昔用拯黎元竊以羲皇結網深失大慈成湯解羅猶非妙善揚旌丹水異道樹而降魔執玉塗山非寶坊之大集所以憑心七覺繫念四勤住菩薩乘顯無三之教學如來行開不二之門汲引群迷導示衆惑今謹于某處建如干僧如干日法華懺見前大衆至心敬禮釋迦如來多寶世尊禮妙法華大乘經典禮普賢菩薩妙光法師願多寶如來從地湧出普賢菩薩乘象空來竝入道場證明功德擊大法鼓轉妙法輪震動世閒覺悟凡品令使盡空法界無量聲聞無邊衆生皆為菩薩總持性相同到無生稽首敬禮常住三寶廣宏明集二十八下金光明經懺文菩薩戒弟子皇帝稽首和南十方諸佛無量尊法一切賢聖尋夫靈鷲山閒自有常住之相白鶴林處本無變易之法故知真解脫者誰辨去來實智慧者非有生滅而顛倒迷愚不曉三點之理無明覆蔽空有八十之疑于是四佛世尊百千菩薩俱會信相之室顯說釋迦之壽明稱歎之妙偈出懺悔之法音是曰經王微妙第一以種智為根本以功德為莊嚴能照諸天宮殿能與衆生快樂能銷變異惡星能除穀貴饑饉能遣怖畏能滅憂惱能怯怨敵能愈疾病如法修行功德已甚弟子以茲寡昧纂承洪業常恐王領之宜不符正論御世之道有乖天律庶績未康黎民弗乂方願歸依三寶憑藉冥空護念衆生扶助國土今謹于某處建如干僧如干日金光明懺見前大衆至心敬禮釋迦如來四佛世尊金光明經信相菩薩願諸菩薩久住世閒諸天善神不離土境方便利益增廣福田映慈悲雲開智慧日作眼目導為依止所成就菩提之道場安住不動之境國稽首敬禮常住三寶廣宏明集二十八下大通方廣懺文菩薩戒弟子稽首和南十方三寶竊以諸佛剎土不可言說如來稱號無有限量或過去現在共取頗羅之姓或同時異世俱有釋迦之名或明王十億或然燈三萬去來三界遍滿十方聞名者離塵受持者得道其為功德難用思議釋迦如來以無礙力遊娑羅之淨道止吉祥之福地寶池化生金花自涌說大通方廣出三寶名號譬如六天總歸一乘弟子用慈悲之心修平等之業常以萬邦有罪責自一人四生未安理為重任所以薰修在己日夜忘勞精進為心夜分未息菩薩行處皆願受持諸佛法門悉令如說欲使普天率土無復怖畏之塵蠕動蜎飛永得歸依之地今謹依經教于某處建如干僧如干日行方廣懺悔讀誦百遍右繞七匝塗香末香盡莊嚴之相正念止觀罄精懇之心見前大衆至心敬禮本師釋迦如來禮方廣經中所說三寶名字願諸佛菩薩尋聲赴響放淨光明照諸暗濁施清涼水滅茲渴愛登六度舟入三昧海總萬有而會真如齊三界而登實法稽首敬禮常住三寶廣宏明集二十八下虛空藏菩薩懺文竊以菩薩之于衆生是大依止觀察性相隨機濟拔一人未度不證善果往古今來行願如一而虛空藏菩薩最為勝上為衆中之幢王為大明之尊主具諸佛之智慧得如來之祕密至因夢見形隨緣示相一聞稱號水火不能焚溺一心稱名刀杖不能傷害壽命財産之願念而必諧色聲味觸之須求而皆遂身心疾惱憐愍療治牢獄怖畏方便解釋此蓋隨從世法安樂衆生及夫動神變相去香集之境放淨光明來閻浮之界入三昧定除煩惱熱說陀羅尼破惡業障五濁惡世一時清涼五根本罪竝皆解脫此則開世閒之眼示涅槃之路弟子承如來之教稟諸佛之慈國被菩薩之功家行大士之業方願十方剎土悉有一乘十方衆生皆修十地今謹于某處建如干僧如干日虛空藏菩薩懺見前大衆至心敬禮本師釋迦文佛禮勝花敷藏如來禮陀羅尼神咒禮虛空藏菩薩願虛空藏菩薩尋賢應赴現神通力開智慧光以種種身遊諸國土度脫衆生不乖誓願稽首敬禮常住三寶廣宏明集二十八下方等陀羅尼齊懺文竊以三世諸佛以誓願因緣十方如來以智慧方便縱無礙之辨開無盡之門法流派別宗源無限法本分散枝條不極非直摩訶般若獨有八萬四千至于陀羅尼門亦有九十二億處處宣說種種名種功德無量威神不測至如婆藪之拔地獄波旬之發菩提花聚之獲神通雷音之脫掩蔽莫不因斯章句承茲業力亦有四部弟子十方衆生聞一句而發心聽一說而悅道故知一切諸法無非真妙弟子側身修行所學者菩提旰食夙興所行者濟度一心之力攝取衆生一念之頃遍諸法相如來種智皆願總持諸佛功德悉欲流布今謹于法典本之經教見前大衆至心敬禮釋迦牟尼佛禮陀羅尼章句禮雷音比丘禮華聚菩薩願承此功德調伏衆生滅三毒心破十惡業四百之煩惱自然清淨八萬四千塵勞一時解脫得神咒之力具法印之善入陀羅尼門觀諸佛境界頓消獄火永盡無餘稽首敬禮常住三寶廣宏明集二十八下藥師齊懺文竊以諸行無常悉為纍法萬有顛倒皆成苦本熱焰鏡像如變易之不停漂草爨茅見生滅之奔迅隨業風而入苦海逐報障而趣幽途去來三界未見可安之所輪回五道終無暫息之期藥師如來有大誓願接引萬物救護衆生導諸有之百川歸法海之一味亦能施與花林隨從世俗使得安樂令無怖畏至如八難九橫五濁三災水火盜賊疾疫饑饉怨家債主王法縣官憑陵之勢萬端虔劉之法千變悉能轉禍為福改危成安復有求富貴須祿位延壽命多子息生民之大欲世間之切要莫不隨心應念自然滿足故知諸佛方便事絶思量弟子司牧寡方庶績末乂方憑藥師本願成就衆生今謹依經教于某處建如千僧如千日藥師齊懺現前大衆至心敬禮本師釋迦如來禮藥師如來慈悲廣覆不乖本願不棄世閒興四等雲降六度雨滅生死火除煩惱箭十方世界若輪燈而明朗七百鬼神尋結縷而應赴障逐香然災無復有命隨幡續漸登常住遊甚深之法性入無等之正覺行願圓滿如藥師如來廣宏明集二十八下娑羅齊懺文尋夫真解脫者本自不生實智慧者今亦無滅故知鶴林變色非變易之文鷲山常在實常住之法但世界不一應赴所以不窮衆生無邊方便所以無際隨念隨著種種法門因業因心各各示見或八十小劫端坐之相未移方八十年無餘之機已及熙連河側晨朝之色忽明娑羅樹閒中夜之聲便寂最後功德是曰茲辰弟子有緣閻浮屬當重任愍群生之顛倒嗟庶類之愚迷常願造六度之舟濟之于彼岸駕一乘之御驅之于中道今謹于太極殿設無礙大會首僧一夕娑羅大齊願法雨法雲清涼三界之火慧燈慧炬照朗百年之室常住二字人天共聞伊字三點凡聖竝悟無勞迦葉之問不待須跋之疑一切種智而為根本無量功德以自莊嚴意樹開解脫之花身田含定慧之水居處吉祥之地枕藉福德之場與二氣而俱貞隨四時而納祐日月天子照合璧于大千星辰宮殿散連珠于百億慈悲輕雨與祥風而竝飛菩提寶雲共飛煙而合彩六合四海無復塵勞六道四生俱蒙清淨廣宏明集二十八下無礙會捨身懺文竊觀雅誥奧義皇上興在豫之言禮經令典聖人揚罪己之說故亡身濟物仁者之恆心克己利人君子之常德況復菩薩大士法本行處應赴三界攝受四生運無量之四心修平等之六度國城妻子僶俯哀荒承祖宗之大業扶曳喘息當天下之重任黎民弗乂庶績未熙御朽履冰無忘兢業又以世相泡影有為露電愛河奔迅欲海飛騰稟識同焚含靈共溺垂瑱憑玉還覺萬乘非尊當寧負扆翻以萬機成纍夕惕若厲思宏汲引每旦丕顯奉為七廟聖靈奉為皇太后聖御奉為天龍鬼神幽冥空有三界四生五道六趣若色若想若怨若親若非怨親遍虛空滿法界窮過去盡未來無量名識一切種類平等大捨弟子自身及乘輿法服五服鑾輅六冕龍章玉几玄裘金輪紺馬珠交纓絡寶飾莊嚴給用之所資待生平之所玩好竝而檀那咸施三寶今謹于前殿設無礙大會奉行所願并諸功德具列于前願諸菩薩冥空幽顯俱到證明開智慧日映慈悲雲樹寶幢于大千擊法鼓于百億震動世界覺悟群生放三昧之淨光流一味之法雨引愚癡于火穽拔煩惱于棘林出輪轉河到無生岸廣宏明集二十八下
