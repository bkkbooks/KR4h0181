body:
  text: 卷七徐陵勸進元帝表臣聞封唐有聖還承帝嚳之家居代維賢終纂高皇之祚無為稱於革舄至治表於垂衣而撥亂反正非間前古至如金行重作源出東莞炎運猶昌枝分南頓豈得掩顯姓於軒轅非才子於顓頊莫不因時多難俱繼神宗者也伏惟陛下出震等於勛華鳴謙同於旦奭握圖秉鉞將在御天玉勝珠衡先彰元后神祇所命非惟太室之祥圖諜斯歸何止堯門之瑞若夫大孝聖人之心中庸君子之德固以作訓生民貽風多士一日二日研覽萬機允文允武包羅群藝擬茲三大賓是四門歷試諸艱咸熙庶績斯無間而稱也自無妄為象鍾禍上京梟獍虔劉宗社蕩墜銅頭鐵額興暴皇年封豨修蛇行災中國靈星所宅下武其興望紫極而行號瞻丹陵而殞慟家冤將報天賜黃鳥之旗國害宜誅神奉玄狐之籙剋李軼於河津征陶謙於海岱滕公擁樹雄氣方嚴張繡交兵風神彌勇忠誠貫於日月孝義感於冰霜如雷如霆非貔非虎前驅效命元惡斯殲既挂膽於西州方然臍於東市蚩尤三冢寧謂嚴誅王莽千剸非云明罰青羌赤狄同畀豺狼胡服夷言咸為京觀邦畿濟濟還見隆平宗祀愔愔方承多福自氛氳渾沌之世驪連栗陸之君卦起龍圖文因鳥迹雲師火帝非無戰陳之風堯誓湯征咸用干戈之道星躔東井時破崤潼雷震南陽初平尋邑未有援三靈之已墜救四海之群飛赫赫明明龔行天罰如當今之盛者也於是卿雲似蓋晨映姚鄉甘露如珠朝垂原寢芝房感德咸出銅池蓂莢伺辰無勞銀箭重以東漸玄菟西踰白狼高柳生風扶桑銜日莫不編名屬國歸貢鴻臚荒服來賓遐邇同慶其文昭武穆跗萼也如彼天平地成功業也如此久應旁求掌故詢詔天官斟酌繁昌經營高邑宗王啓霸非勞五德之侯清蹕無虞何事長安之邸揚龍旗以饗帝御鳳扆以承天曆數在躬疇咨為讓某官等至鄴伏承聖旨謙沖為而不宰或云洛陽未復函谷無泥旋駕金陵方膺天眷愚謂大庭少昊非有定居漢祖殷宗皆無恆宅登封岱嶽且署明堂巡狩荊州時行司隸何必西瞻虎踞乃建王宮南望牛頭方稱天闕抑又聞之玄圭既錫蒼玉無陳乃棫朴之愆期非苞茅之不貢雲和之瑟久廢甘泉孤竹之管無聞方澤豈不懼歟伏願陛下因百姓之心振萬邦之命豈可逡巡固讓方示石戶之農高謝為君徒引箕山之客未知上德之不德惟見聖人之不仁率土翹瞻蒼生何望昔蘇季張儀違鄉負俗尚復招三方以事趙請六國以尊秦況臣等預奉皇華親承朝命圭璋特達通聘河陽貂珥雍容尋盟漳水加牢貶館隨世汙隆瞻望鄉關誠均休戚但輕生不造命與時乖等一介之行人同三危之遠擯承間內殿事絶耿弇之恩封奏邊城私等劉琨之哭不勝區區之至謹拜表以聞文苑英華六百又梁書元帝紀有刪節又略見藝文類聚十四讓散騎常侍表臣聞五十知命宗師之格言六百辭滿通賢之高概昔墨子諸生褰裳求楚魯連隱士高論卻秦況乎謬蒙知己寧無感激洪私過誤置以通班司憲文昌遂諧常伯今者昆吾小器諦視不見玄黃鈞天並奏靜聽能聞鍾鼓雖神農分藥岐伯提針冥衆因緣難可匡救陛下嗣臨寶曆光闡大猷屬意銓衡留情槱棫燕臺裝玉儻不精真齊客吹竽諒宜澄簡南郊奉乘當求鄭默之才西省文辭應用羅含之學藝文類聚四十八讓五兵尚書表臣聞仲尼大聖猶云書不盡言士衡高才嘗稱文不逮意臣比衰痾日積思緒茫然頻託朋遊為裁章表雖復陳琳健筆未盡愚懷孫惠詞人頗加煩飾所以高天緬邈弗降昭回瞻拜絲綸更增憂憊臣雖不敏弱冠登朝伊言承華豫遊多士晚逢興運爰濫寵私爾時四郊多壘七雄分爭國家制度日不暇給趙宮論受命之宜隨邑奏升壇之禮而參聞祕計弗解單于之兵飛箭馳書未動聊城之將不期枚乘老叟忽降特恩馮唐暮年見申明主擢宰京邑朝坐棘林遂致洛陽無雨非比長安多盜其宜屏錮用置嚴科猶處名僚久為叨竊但著書天祿雖如劉向朔望登朝轉同王隱於其朽劣尚可從容司會文昌邈然非據藝文類聚四十八讓右僕射初表加以言尋盟好仍屬亂離先零盜其牛馬烏孫竊其印綬子卿茹雪叔向為國雖復東歸備罹此厄昔李廣遺恨不值漢初寧戚自悲不逢堯禪臣隨望聖運實在權輿時參決勝之籌頗奏發兵之讖當塗錫命非無董昭之誠典午禪文不降張華之實藝文類聚四十八讓左僕射初表臣聞七十之歲揚雄擬經六十之年平津對策若斯強壯無歎耆老臣勱則胄華軒冕才允卿相出納流譽朝野具瞻臣弘正國老儒宗情尚虛簡玄風勝業獨王當年臣種氣懷沈密文史優裕東南貴秀朝廷親賢並見壯猷皆宜左執若漢武好少則微臣已老若周文愛老則有此群才伏願天明更謀梓匠求其妙選稱是能官藝文類聚四十八初學記十二陳書張種傳為始興王讓琅琊二郡太守表甫離懷袖裁脫綺紈適荷隆私使膺圭組執玉不起摳衣未勝自甘泉通火細柳屯兵旁帶戎臣頗同疆埸言瞻漢草乃曰中州遙望胡桑已成邊郡誠復居藩體國應思馬駿之功論地惟親宜慕曹彰之勇藝文類聚五十為王儀同致仕表尺波歸海恆嘆不居爝火為薪猶悲假續況復星回日薄通人有乞老之言鐘鳴漏盡前史有夜行之誡五陵鼎族家傳軒冕四姓卿侯榮由恩澤虛名靡實世官非才年力方強不能辭退今三元肇慶六呂司春得奉萬壽之杯豫參百辟之禮便釋朝衣謹遵初服同孔光之杖載遊戶庭比廣德之車方懸私館藝文類聚十八決斷大行俠御服議梓宮祔山陵靈筵祔宗廟有此分判便驗吉凶案山陵鹵簿吉部位中公卿以下導引者爰及武賁鼓吹執蓋奉車並是吉服豈容俠御獨為縗絰邪斷可知矣若言公卿胥吏並服縗苴此與梓宮部伍有何差別若言人物並吉司事者凶豈容社絰而奉華蓋縗衣而升玉輅邪同博士議陳書劉師知傳高祖崩六日成服朝臣共議大行皇帝靈座俠御人所服衣服吉凶之制博士沈文阿議宜吉服劉師知蔡景歷江德藻謝岐等議宜服縗絰時以二議不同乃啓取左丞徐陵決斷陵云重答朝臣書老病屬纊不能多説古人爭議多成怨府傳玄見尤於晉代王商取陷於漢朝謹自三緘敬同高命若萬一不死猶得展言庶與群賢更申揚榷陳書劉師知傳徐陵決斷大行俠御服同博士議時八座以下並情從師知議陵重答謝兒報坐事付治中啓夫拾金樵路高士所羞整冠李下君子斯慎兒報不能謹潔敢觸嚴網右趾鐵繫事允法科左校論輸實由恩宥老臣過庭之訓多謝古賢折笄之杖有愧前達藝文類聚五十四謝敕賜祀三皇五帝餘饌啓竊以甘泉之殿舊禮羲農長樂之宮本圖堯舜自東京晚世曠代無聞西漢盛儀復覩今日金壺流十旬之氣玉案備千品之羞昔絳羅為薦既延王母紫蓋為壇允招太一同斯美號理致衆星臣以餘年豫聞清祀如陪瑤席遂飲瓊漿藝文類聚七十二謝敕賚燭盤賞答齊國移文啓謝敕賚燭監盤賞答齊國移文啓昔班彪草移阮瑀裁書馳譽當年遂無加賞非常大賚始自今恩雖賈逵之頌神雀竇攸之對鼮鼠漢臣射覆之言魏士投壺之賦方其寵錫獨有光前官燭斯燃更慚良吏霄光可學乃會耆年臣職居南史身典東觀謹述私榮傳之方策藝文類聚八十安成王讓録尚書表後啓臣聞間平就國乃盛漢之常儀郕霍無官實宗周之明典何則皇季之重非待歷階王爵之隆自高群辟況臣戢翼要荒亟離寒暑進慚趙勝能定楚從退匪齊文馳免秦厄固以內切皇心外貽家恥甘輸重餌降禮單于迾城十五如諸和璧市鄉三十聊同寶劍武夫力而獲諸原微臣還而反諸敵瞻言馬駿著隴右之功追念曹彰克烏丸之虜前王子弟若此勳庸偏其反而豈可勝愧藝文類聚四十八謝賚麕啓臣昨既陪羽獵仍宴上林固謝長卿之文彌慚子雲之賦預割鮮禽已同鹽浦頻蒙大臠更異梁王詰旦歸來猶為飽飫虞衡所獻復降今恩賜細君以為歡非屠門而大嚼藝文類聚九十五謝賚蛤啓比鴻雀入猶新才變秋成已聞冬獻藝文類聚九十七謝東宮賚蛤蜊啓船俗嚴戈漁人資設于彼海童冒茲水豹望樓闕之氣得波潮之下藝文類聚九十七謝勑賚烏賊啓變逯庸臣伏增銘悚藝文類聚九十七與楊僕射書夫一言所感凝暉照於魯陽一志冥通飛泉涌于疏勒況復元首康哉股肱良哉鄰國相聞風教相期者也天道窮剝鍾亂本朝情計馳惶公私哽懼而骸骨之請徒淹歲寒顛沛之祈空盈卷軸是所不圖也非所仰望也執事不聞之乎昔分鼇命鳸之世觀河拜洛之年則有日烏流災風禽騁暴天傾西北地缺東南盛旱坼三川長波含五嶽我大梁應金圖而有亢纂玉鏡而猶屯何則聖人不能為時斯固窮通之恆理也至如荊州刺史湘東王機神之本無寄名言陶鑄之餘猶為堯舜雖復六代之舞陳於總章九州之歌登於司樂虞夔拊石晉曠調鐘未足頌此英聲無以宣其盛德者也若使郊禋楚翼寧非祀夏之君戡定艱難便是匡周之霸豈徒豳王徙雍期月為都堯帝遷河周年成邑方今越裳藐藐馴雉北飛肅慎茫茫風牛南偃吾君之子含識知歸而答旨云何所投身斯其未喻一也又晉熙等郡皆入貴朝去我潯陽經塗何幾至於鐺鐺曉漏的的宵烽隔漵浦而相聞臨高臺而可望泉流寶碗遙憶湓城峰號香爐依然廬嶽日者鄱陽嗣王治兵匯派屯戍淪波朝夕箋書春秋方物吾無從以躡屩彼何路而齊鑣豈其然乎斯不然矣又近者邵陵王通和此國郢中上客雲聚魏都鄴下名卿風馳江浦豈盧龍之徑於彼新開銅駝之街於我長閉何彼途甚易非勞於五丁我路為難如登於九折地不私載何其爽歟而答旨云還路無從斯所未喻二也晉熙廬江義陽安陸皆云款附非復危邦計彼中途便當靜晏自斯以北桴鼓不鳴自此以南封疆未一如其境外脫殞輕軀幸非邊吏之羞何在匹夫之命又此賓遊通無貨殖忝非韓起聘鄭私買玉環吳札過徐躬要寶劍由來宴錫凡厥囊裝行役淹留皆已虛罄散有限之微財供無期之久客斯可知矣且據圖刎首愚者不為運斧全身庸流所鑒何則生輕一髮自重千鈞不以賈盜明矣骨肉不任充鼎俎皮毛不足入貨財盜有道焉吾無憂矣又公家遣使脫有資須本朝非隆平之時遊客豈皇華之勢輕裝獨宿非勞聚柝之儀微騎間行寧望輶軒之禮歸人將從私具驢騾緣道亭郵唯希蔬粟若曰留之無煩於執事遣之有費於官司或以顛沛為言或云資裝可懼固非通論皆是外篇斯所未喻三也又若以吾徒應還侯景侯景凶逆殲我國家天下含靈人懷憤厲既不獲投身社稷衛難乘輿三冢磔蚩尤千刀剸王莽安所謂俯首頓膝歸奉寇讎佩弭腰鞬為其皂隸日者通和方敦曩睦凶人狙詐遂駭狼心頗疑宋萬之誅彌懼荀罃之請所以奔蹄徑角專恣憑陵凡我行人偏膺讎憾政復葅斤醢骨抽舌探肝於彼凶情猶當未雪海內之所知也君侯之所具焉又聞本朝王公都人士女風行雨散東播西流京邑丘墟葌蓬蕭瑟偃師還望咸為草萊灞陵回首俱沾霜露此又君之所知也彼以何義爭免寇讎我以何親爭歸委質昔巨平貴將懸重於陸公叔向名流深知於鬷篾吾雖不敏常慕前修不圖明庶有懷翻其以此量物昔魏氏將亡群凶挺爭諸賢戮力想得其朋為葛榮之黨邪為邢杲之徒邪如曰不然斯所未喻四也假使吾徒還為凶黨侯景生於趙代家自幽恆居則台司行為連率山川形勢軍國彝章不勞請箸為籌便當屈指能算景以逋逃小醜羊豕同群身寓江皋家留河朔舂舂井井如鬼如神其不然乎抑又君之所知也且夫宮闈祕事並若雲霄英俊訏謨寧非帷幄或陽驚以定策或焚藁而奏書朝廷之士猶難參預羇旅之人何階耳目至於禮樂沿革刑政寬猛則謳歌已遠萬舞成風不知手之舞之足之蹈之也安在搖其牙齒為間諜者哉若謂復命西朝終奔東虜雖齊梁有隔尉候奚殊豈以河曲之難浮而曰江關之可濟河橋馬度寧非宋典之姦關路雞鳴皆曰田文之客何其通蔽乃爾相妨斯所未喻五也又兵交使在雖著前經儻同徇僕之尤追肆寒山之怒則凡諸元帥並釋縲囚爰及偏裨同無翦馘乃至鍾儀見赦朋笑遵途襄老蒙歸虞歌引路吾等張旜拭玉修好尋盟涉泗之與浮河郊勞至於贈賄公恩既被賓敬無違今者何愆翻蒙貶責若以此為言斯所未喻六也若曰妖氛永久喪亂悠然哀我奔波存其形魄固已銘茲厚德戴此洪恩譬渤澥而俱深方嵩華而猶重但山梁飲啄非有意於籠樊江海飛浮本無情於鐘鼓況吾等營魂已謝餘息空留悲默為生何能支久是則雖蒙養護更夭天年若以此為言斯所未喻七也若云逆豎殲夷當聽反命高軒繼路飛蓋相隨未解其言何能善謔夫屯亨治亂豈有意於前期謝常侍今年五十有一吾今年四十有四介已知命儐又杖鄉計彼侯生肩隨而已豈銀臺之要彼未從師金竈之方吾知其訣政恐南陽菊水竟不延齡東海桑田無由可望若以此為言斯所未喻八也足下清襟勝託書囿文林凡自洪荒終乎幽厲如吾今日寧有其人爰至春秋微宜商略夫宗姬殄墜霸道昏凶或執政之多門或陪臣之涼德故臧孫有禮翻囚與國之賓鄭伯無愆空怒天王之使遷箕卿於兩館縶驥子於三年斯匪貪亂之風邪寧當今之高例也至於雙崤且帝四海爭雄或搆趙而侵燕或連韓而謀魏身求盟於楚殿躬奪璧於秦庭輸寶鼎以託齊王馳安車而誘梁客其外膏脣販舌分路揚鑣無罪無辜如兄如弟逮乎中陽受命天下同規巡省諸華無聞幽辱及三方之霸也孫甘言以嫵媚曹屈詐以羈縻旍軫歲到於句吳冠蓋年馳於庸蜀則客嘲殊險賓戲已深共盡遊談誰云猜忤若使搜求故實脫有前蹤恐是叔世之姦謀而非為邦之勝略也抑又聞之雲師火帝澆淳乃異其風龍躍麟驚王霸雖殊其道莫不崇君親以詔物敦敬養以治民預有邦司曾無隆替吾奉違溫凊仍屬亂離寇虜猖狂公私播越蕭軒靡御王舫誰持瞻望鄉關何心天地自非生憑廩竹源出空桑行路含情猶其相愍常謂擇官而仕非曰孝家擇事而趨非云忠國況乎欽承有道驂駕前王郎吏明經鴟鳶知禮巡方省化咸問高年東序西膠皆尊耆耋吾以圭璋玉帛通聘來朝屬世道之屯期鍾生民之否運兼年纍載無申元直之祈銜泣吞聲長對公閭之怒情禮之訴將同逆鱗忠孝之言皆應齚舌是所不圖也非所仰望也且天倫之愛何得忘懷妻子之情誰能無纍夫以清河公主之貴餘姚書佐之家莫限高卑皆被驅略自東南醜虜抄販飢民臺署郎官俱餒墻壁況吾生離死別多歷暄寒孀室嬰兒何可言念如得身還鄉土躬自推求猶冀提攜俱免凶虐夫四聰不達華陽君所謂亂臣百姓無冤孫叔敖稱為良相足下高才重譽參贊經綸非虎非貔聞詩聞禮而中朝大議曾未矜論清禁嘉謀安能相及諤諤非周舍容容類胡廣何其無諍臣哉歲月如流平生何幾晨看旅鴈心赴江淮昏望牽牛情馳揚越朝千悲而掩泣夜萬緒而回腸不自知其為生不自知其為死也足下素挺詞鋒兼長理窟匡丞相解頤之説樂令君清耳之談向所咨疑誰能曉喻若鄙言為謬來旨必通分請灰釘甘從斧鑊何但規規默默齰舌低頭而已哉若一理存焉猶希矜眷何必期令我等必死齊都足趙魏之黃塵加幽并之片骨遂使東平拱樹長懷向漢之悲西洛孤墳恆表思鄉之夢干祈以屢哽慟增深徐陵叩頭再拜文苑英華六百九十又陳書徐陵傳在北齊與宗室書陵白臨淮負海是謂徐州顓頊高陽世有明德自興王啓霸無勞委劍之鋒開國承家實饗彤弓之賜其後金柯玉葉霞振雲從耆舊通人茂才多士或以天下之貴負石自沉王命之尊拂衣高蹈或熊衣雉製青組朱旗儒盛江東文高河北或復分齊處魯移魏居燕瓜瓞雖遙芳枝無遠昔有王敦王莽無關控鶴之宗劉曜劉淵彌非偃龍之族又有朱家別録邾子之苗何氏殊源韓侯之胤三烏五鹿時事無恆東郭西門遷訛非一吾宗雖廣未有駢枝咸自駒王同分才子正以金衡委御玉斗宵亡胡賊憑陵中原傾覆我則供犧牷於東國載主祏於南都二百餘年家于揚越此則盧諶不去裴寧仍留高宦燕秦遲回鄉壤山河有隔敘覯無緣望冀馬而增勞瞻賓鴻而永嘆昔竇公纍世光武稱其外家許都遙遠靈王思其舊宅其言雖大可以喻小況在宗親寧無停眷比月應雩龍星移殷鳥天明和煦體中何如願百年之老興居多福萬石之君寒暑清豫其外族忠孝比屋連甍信義勇於干戈詩書甘於酒醴或有漁獵三史紛綸五經都講開黌詩生負帙邦君佇德寧無挂榻之思州將欽風應有題車之命南陽坐嘯寄以共治東海行歌資其主弼梁竦不好徒為大言鄧禹平生唯望如此若栖遲偃仰因事丘中桃果三名栗園千樹執竿而釣徵聘不來負耒而耕公侯靡屈何其高也蓋復休哉如脫推延或遲並問吾階緣人乏叨簉皇華王事無淹公禮將畢既而揚都蕩覆方離獫狁之災越界風塵無復輶軒之禮屏居空館多歷歲時舋犯靈祇招延禍罰號慕無窮肝膽屠殞煩冤胸臆不自堪居無心奈何無狀奈何自徘徊河朔亟積寒暄風患彌留半體枯廢折臂為公雖非羊祜跛足而使無慚郤克固以形如稿木心若死灰匍匐苫廬才有魂氣夫迷山之客遲遙響於巖崖窮海之賓望孤煙於洲嶼況乃宗均魯衛地匪燕吳車騎相望舟艫朝夕三條不遠五達非難信乃闊然遂不蒙問昔桃花之峽長避秦嬴芝草之山遙然滄海猶復漁船可入何況平途不兼旬月勞懷既積輒命行人弦望之間遲枉歸翰儻二三兄弟能敦昭穆之詩求我漳濱幸問劉禎之疾陽春改節並念將宜扶力為書多不詮次陵白文苑英華六百八十六
