body:
  text: 虞荔鼎錄序昔虞夏之盛遠方皆至使九牧貢九金鑄九鼎于荊山之下于昆吾氏之墟白若甘攙之地圖其山川奇怪百物而為之備使人知神姦不逢其害以定其祥鼎成三足而方不炊而自沸不舉而自藏不遷而自行九鼎既成定之國都桀有亂德鼎遷于殷載祀六百殷紂暴虐鼎遷于周成王定鼎于郟鄏卜世三十卜年七百天所命也及顯王姬德大衰鼎淪入泗水秦始皇之初見于彭城大發徒出之不能得焉梁同泰寺剎下銘戒香芬馥氣勝懷蘭智劍陸離威逾交軋敝慧日于重雲浚法流于巨海嚴此三駕用拔畏途漾彼六舟拯諸淪溺但以一人入道波旬之宮已震十地弘心毒龍之災競起重欒布濩積栱崚嶒神僊岳岳俯雕檻于霞外寶鐸鏘鏘韻鈞天于雲表雷雨杳冥而未半扶桑光朏而先明迢亭峻極特立千仞灼爍崢嶸光鏡八表若曰殿之燭太空似星宮之構辰極辭曰層臺複陸廣殿穹崇塗金鈿玉映日疏風蓺文類聚七十七諫陳寶應書東山居士虞寄致書于明將軍使君節下寄離流世故漂寓貴鄉將軍待以上賓之禮申以國士之眷意氣相感何日忘之而寄沈痼彌留愒陰將盡常恐卒填溝壑涓塵莫效是以敢布腹心冒陳丹款願將軍留須臾之慮少思審之則瞑目之日所懷畢矣夫安危之兆禍福之機匪獨天時亦由人事失之毫釐差以千里是以明智之土據重位而不傾執大節而不失豈惑于浮辭哉將軍文武兼資英威不世往因多難杖劍興師援旗誓眾抗威千里豈不以四郊多壘共謀王室匡時報主寍國庇民乎此所以五尺童子皆願荷戟而隨將軍者也及高祖武皇帝肇基草昧初濟艱難于時天下沸騰民無定主豺狼當道鯨鯢橫擊海內業業未知所從將軍運洞微之監屢折從衡之辯策名委質自託宗盟此將軍妙算遠圖發于衷誠者也及主上繼業欽明睿聖選賢與能群臣輯睦結將軍以維城之重崇將軍以裂土之封豈非宏謨廟略推赤心于物者也屢申文詔款篤殷勤君臣之分定矣骨肉之恩深矣不意將軍惑于邪說翻然異計寄所以疾首痛心泣盡繼之以血萬全之策竊為將軍惜之寄雖疾侵耄及言無足采千慮一得請陳愚管願將軍少戢雷霆賒其晷刻使得盡狂瞽之說披肝膽之誠則雖死之日猶生之年也自天厭梁德多難薦臻寰宇分崩英雄互起龍戰虎爭竊號假名銳精持鋒不可勝紀人人自以為得之然夷凶翦亂拯溺扶危四海樂推三靈眷命揖讓而居南面者陳氏也豈非厤數有歸惟天所在當璧應運其事甚明一也主上承基明德遠被天網再張地維重紐夫以王琳之強侯填之力進足以搖蕩中原爭衡天下退足以屈強江外雄長偏隅然或命一旅之師或資一士之說琳則瓦解冰泮投身異域瑱則厥角稽顙委命闕廷斯又天假之威而除其患其事甚明二也今將軍以藩戚之重擁東南之眾盡忠奉上戮力勤王豈不勳高竇融寵過吳芮析珪判野南面稱孤其事甚明三也且聖朝棄瑕忘過寬厚得人改過自新咸加敘擢至如余孝頃潘純陀李孝欽歐陽頠等悉委以心腹任以牙爪胸中豁然曾無纖芥況將軍舋非張繡罪異畢諶當何慮于危亡何失于富貴此又其事甚明四也方今周齊鄰睦境外無虞并兵一向匪朝伊夕非有劉項競逐之機楚趙連從之勢可得雍容高拱坐論西伯其事甚明五也且留將軍狼顧一隅亟經摧衂聲虧魄喪膽氣衰沮高瓖向文政留瑜黃子玉此數人者將軍所親信首鼠兩端唯利是視其餘將帥亦可見矣孰能被堅執銳長驅深入縶馬埋輪奮不顧命以先士卒者乎此又其事甚明六也且將軍之勢孰如侯景將軍之眾孰如王琳武王滅侯景于前今上摧王琳于後此乃天時非復人力且兵革已後民皆厭亂其孰能棄墳墓捐妻子出萬死不顧之計從將軍于白刃之閒乎此又其事甚明七也歷觀前古鑒之往事子陽季孟傾沒相尋餘善右渠危亡繼及天命可畏山川難恃況將軍欲以數郡之地當天下之兵以諸侯之資拒天子之命強弱逆順可得侔乎此又其事甚明八也且非我族類其心必異不愛其親豈能及物留將軍身縻國爵子尚王姬猶且棄天屬而弗顧背明君而孤立危急之下豈能同憂共患不背將軍者乎至于師老力屈懼誅利賞必有韓智晉陽之謀張陳井陘之勢此又其事甚明九也且北軍萬里遠鬭鋒不可當將軍自戰其地人多顧後梁安背向為心脩旿匹夫之力眾寡不敵將率不侔師以無名而出事以無機而動以此移兵未知其利夫漢朝吳楚晉室穎顒連城數十長戟百萬拔本塞源自家圖國其有成功者乎此又其事甚明十也為將軍計者豈若不遠而復絕親留氏秦郎快郎隨遣入質釋甲偃兵一遵詔旨且朝廷許以鐵券之要申以白馬之盟朕不食言誓之宗社寄聞明者鑒未形智者不再計此成敗之效將軍勿疑吉凶之機閒不容髮方今藩維尚少皇子幼沖凡預宗枝皆蒙寵樹況以將軍之地將軍之才將軍之名將軍之勢而能克脩藩服北面稱臣者寍與劉澤同年而語其功業哉豈不身與山河等安名與金石相獘願加三思慮之無忽寄氣力綿微餘陰無幾感恩懷德不覺狂言鈇鉞之誅其甘如薺文苑英華六百八十五又見陳書南史虞寄傳少三句符瑞表白龍見于州江南岸長數十丈大可八九圍歷州城西道入天井岡僊人見于羅浮山寺小石樓長三丈所通身潔白衣服楚麗陳書武帝紀下永定三年正月廣州刺史歐陽頠表沈孝軌諸弟除服議王衛軍云久喪不葬唯主人不變其餘親各終月數而除此蓋引禮文論在家內有事故未得葬者耳孝軌既在異域雖已迎喪還期無指諸弟若遂不除永絕婚嫁此于人情或為未允中原淪陷已後理有事例宜諮沈常侍詳議陳書沈洙傳大行俠御服又議愚謂祖葬之辰始終永畢達官有追贈須表恩榮有吉鹵簿恐由此義私家放斅因以成俗上服本變吉為凶理不應猶襲紈綺劉舍人引王衛軍喪儀及檢梁昭明故事此明據已審博士左丞乃各盡事衷既未取證須更詢詳宜諮八座詹事太常中丞及中庶諸通袁樞張種周弘正弘讓沈炯孔奐陳書劉師知傳皇太子釋奠頌穆穆皇儲峨峨副主道尊上鬯德崇監撫春誦夏絃冬書秋羽漢召趍幄周朝問豎翔集禮闈逍遙義府四海無浪三階已平儲駕戾止和鸞有聲宏風講肄崇儒肅成丹書貴道黃金賤籯洙泗興業閤室增榮青槐陰市玄冕飛纓初學記十四續畫品夫丹青妙極未易言盡雖質沿古意而文變今情立萬象于胸懷傳千祀于毫翰故九樓之上備表仙靈四門之傭廣圖賢聖雲閣興拜伏之感掖庭致聘遠之別凡斯緬邈厥迹難詳今之存者或其人冥滅自非淵識博見孰究精麤擯落蹄筌方窮至理但事有否泰人經盛衰或弱齡而價重或壯齒而聲遒故前後相形優劣舛錯至如長康之美擅高往策矯然獨步終始無雙有若神明非庸識所能效如負日月豈未學所能窺荀衛曹張方之蔑矣分庭抗禮未見其人謝陸聲過于實良可於邑列于下品尤所未安斯乃情有抑揚畫無善惡始信曲高和寡非直名謳泣血謬題寍止良璞將恐疇訪理絕永成淪喪聊舉一隅庶同三益夫調墨染翰志存精謹課茲有限應彼無方燧變墨回治點不息眼眩素縟意猶未盡輕重微異則奸鄙革形絲髮不從則懽慘殊觀加以頃來容服一月三改首尾未周俄成古拙欲臻其妙不亦難乎豈可曾未涉川詎云越海俄觀魚鱉謂察蛟龍凡厥等曹未足與言畫矣陳思王云傳出文士圖生巧夫性尚分流事難兼善躡方趾之迹易不知圓行之步難遇象谷之風翔莫測呂梁之水蹈雖欲游刃理解終迷空慕落塵未全識曲若永尋河書則圖在書前取譬連山則言由象著今莫不貴斯鳥跡而賤彼龍文消長相傾有自來矣故倕斷其指巧不可為杖策坐忘既慚經國據梧喪偶寍足命家若惡居下流自可焚筆若冥心用舍幸從所好戲陳鄙見非謂毀譽千室難誣佇聞多識今之所載竝謝赫所遺猶若文章止于兩卷其中道有可采使成一家之集且古今書評高下必詮解畫無多是故備取人數既少不復區別其優劣可以意求也湘東殿下右天挺命世幼稟生知學窮性表心師造化非復景行所能希涉畫有六法真仙為難王于像人特盡神妙心敏手運不加點治斯乃聽訟部領之隙文談眾蓺之餘時復遇物援毫造次驚絕足使荀衛閣筆袁陸韜翰圖製雖寡聲聞于外非復討論木訥可得而稱焉劉璞右胤祖之子少習門風至老筆法不渝前制體韻精研亞于其父信代有其人茲名不墯沈標右雖無偏擅觸類皆涉性尚鉛華甚能留意雖未臻全美殊有可觀謝赫右寫貌人物不俟對看所須一覽便工操筆點刷研精意在切似目想毫髮皆無遺失麗服靚妝隨時變改直眉曲鬢與世爭新別體細微多自赫始遂使委巷逐末皆類效顰至于氣韻精靈未窮生動之致筆路纖弱不副壯雅之懷然中興以後象人莫及毛惠秀右其于繪事頗為詳悉太自矜持番成羸鈍遒勁不及惠遠委曲有過於稜蕭賁右雅性精密後來難尚含毫命素動必依真嘗畫團扇上為山川咫尺之內而瞻萬里之遙方寸之中乃辯千尋之峻學不為人自娛而已雖有好事罕見其迹沈粲右筆迹調媚專工綺羅屏幛所圖頗有情致張僧繇右善圖塔廟超越群工朝衣野服今古不失奇形異貌殊方夷夏實參其妙俾晝作夜未嘗厭怠惟公及私手不停筆但數紀之內無須臾之閒然聖賢矖矚小乏神氣豈可求備于一人雖云晚出殆亞前品陸肅右綏之弟久藉趨庭之教未盡敦閱之勤雖復所得不多猶有名家之法方效輪扁甘苦難投毛稜右惠遠之子便捷有餘真巧不足善于布置略不煩草若比方諸父則床上安床嵇寶鈞聶松右二人無的師範而意兼真俗賦彩鮮麗觀者悅情若辨其優劣則僧繇之亞焦寶願右雖早游張謝而靳固不傳旁求造請事均盜道之法殫極斲輪遂致兼采之勤衣文樹色時表點新異黛施朱重輕不失雖未窮秋駕而見賞春坊輸奏薄伎謬得其地今衣冠緒裔未聞好學丹青道凐良足為慨袁質右蒨之子風神俊爽不墜家聲始逾志學之年便嬰痟癇之病曾見草莊周木雁卞和抱璞兩圖筆勢遒正繼父之美若方之體物則伯仁龍馬之頌比之書翰則長胤埋骨之方雖復語迹異途而妙理同歸一致苗而不實有足悲者無名之實諒在斯人釋僧真釋僧覺右珍蘧道愍之甥覺妙曇度之子竝弱年漸漬親承訓勖珍乃易于酷似覺豈難負析薪染服之中有斯二道若品其工拙蓋嵇聶之流釋迦佛陀吉底俱摩羅菩提右此數手竝外國比丘既華戎殊體無以定其差品光宅威公雅耽好此法下筆之妙頗為京洛所知聞解蒨右全法章蘧筆力不逮通變巧捷寺壁最長請釋智顗開講法華疏菩薩戒弟子吳興沈君理和南竊聞大乘者大士之所乘也高廣普運直至道場復作四依周旋六道仰惟德厚深會經文于五誓之初請開法華題一夏內仍就剖釋道俗咸瞻延佇嘉唱慈悲利益不違本誓耳謹和南釋藏起字二號國清百錄二上文帝書請立國學臣聞立人建國莫尚于尊儒成俗化民必崇于教學故東膠西序事隆乎三代環林璧水業盛于兩京自淳源既遠澆波已扇物之感人無窮人之逐欲無節是以設訓垂範啟導心靈譬彼染藍類諸琢玉然後人倫以睦卑高有序忠孝之理既明君臣之義攸固執禮自基魯公所以難侮歌樂已細鄭伯于是前亡干戚舞而有苗至泮宮成而淮夷服長想洙泗之風載懷淹稷之盛有國有家莫不尚已梁太清季年數鍾否剝戎狄外侵姦回內奰朝聞鼓鼙夕炤烽火洪儒碩學解散甚于坑夷五典九丘湮滅逾乎帷蓋成均自斯墜業瞽宗于是不脩襃成之祠弗陳祼享釋菜之禮無稱俎豆頌聲寂寞遂踰一紀後生敦悅不見函丈之儀晚學鑽仰徒深倚席之歎陛下繼厤升統握鏡臨寓道洽寰中威加無外濁流已清重氛載廓含生熙阜品庶咸亨宜其弘振禮樂建立庠序式稽古典紆迹儒宮選公卿門子皆入于學助教博士朝夕講肄使擔簦負笈鏘鏘接衽方領矩步濟濟成林如切如磋聞詩聞禮一年可以功倍三冬于是足用故能擢秀雄州揚庭觀國入仕登朝資優學以自輔莅官從政有經業以治身轖駕列庭青紫拾地古者王世子之貴猶與國子齒降及漢儲茲禮不墜暨乎兩晉斯事彌隆所以見師嚴而道尊者也皇太子天縱生知無待審喻猶宜晦迹俯同專經請業奠爵前師肅若舊典昔闕里之堂草萊自闢舊宅之內絲竹流音前聖遺烈深以炯戒況復江表無虞海外有截豈得不開闡大猷恢弘至道寍可使玄教儒風弗興聖世盛德大業遂蘊堯年臣末學小生詞無足算輕獻瞽言伏增悚惕陳書沈不害傳又見文苑英華六百九十大行俠御服重議檢晉宋山陵儀靈輿梓宮降殿各侍中奏又成服儀稱靈輿梓宮容俠御官及香橙又檢靈輿梓宮進止儀稱直靈俠御吉服在吉鹵簿中又云梓筥俠御縗服在凶鹵簿中是則在殿吉凶兩俠御也陳書劉師知傳高祖崩六日成服朝臣共議大行皇帝靈座俠御人所服衣服吉凶之制博士沈文阿議宜服吉服劉師知議須服縗斬蔡景歷江德藻謝岐等竝同師知議文阿重議嗣君謁廟升殿儀注議民物推移質文殊軌聖賢因機而立教王公隨時以適宜夫千人無君不散則亂萬乘無主不危則亡當隆周之日公旦叔父呂召爪牙成王在喪禍幾覆國是以既葬便有公冠之儀始殯受麻冕之策斯蓋示天下以有主慮社稷之艱難逮乎末葉縱橫漢承其獘雖景文刑厝而七國連兵或踰月即尊或崩日稱詔此皆有為而為之非無心于禮制也今國諱之日雖抑哀于璽紱之重猶未序于君臣之儀古禮朝廟退坐正寢聽群臣之政今皇帝拜廟還宜御太極殿以正南面之尊此即周康在朝一二臣衛者也其壤奠之節周禮以玉作贄公侯以珪子男執璧此瑞玉也奠贄既竟又復致享天子以璧王后用琮秦燒經典威儀散滅叔孫通定禮尢失前憲奠贄不珪致享無帛公王同璧鴻臚奏賀若此數事未聞于古後相沿襲至梁行之夫稱觴奉壽家國大慶四廂雅樂歌奏歡欣今君臣吞哀萬民抑割豈同于惟新之禮乎且周康賓稱奉珪無萬壽之獻此則前準明矣三宿三咤上宗曰饗斯蓋祭儐受福寍謂賀酒邪愚以今坐正殿止行薦璧之儀無賀酒之禮謹撰謁廟還升正寢群臣陪薦儀注如別陳書沈文阿傳世祖即皇帝位剋日謁廟尚書右丞庾持奉詔遣博士議其禮文阿議詔可施行哀策稱諡議應劭風俗通前帝諡未定臣子稱大行以別嗣主近檢梁儀自梓宮將登轀輬版奏皆稱某諡皇帝登轀輬伏尋今祖祭已奉策諡哀策既在庭遣祭不應猶稱大行且哀策篆書藏于玄宮謂依梁儀稱諡以傳無窮隋書禮儀志三陳永定三年七月武帝崩國子博士領步兵校尉知儀禮沈文阿等謂云云詔可又見通典七十九
