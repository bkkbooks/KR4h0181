body:
  text: 陸瓊栗賦四時遞盛百果玄芳緑梅春馥紅桃夏香何群品之浮脆惟此質之久長外刺同夫枳棘內潔甚于冰霜伏南安而來清列御宿而懸房薦羞則椇楱竝列加籩則菱芡同行金盤兮麗色玉俎兮鮮光周人以之戰懼大官稱于柏梁初學記二十八下符討周迪告臨川郡士庶昔西京為盛信越背誕東都中興萌寵違戾是以以鷹鸇競逐菹醢極誅自古有之其來尚矣逆賊周迪本出輿臺有梁喪亂暴掠山谷我高祖躬率百越師次九川濯其泥沙假以毛羽裁解豚佩仍剖獸符卵翼之恩方斯莫喻皇運肇基頗布誠款國步艱阻竟微效力龍節繡衣藉王爵而御下熊旗組甲因地險而陵上日者王琳始二蕭勃末夷西結三湘南通五嶺衡廣戡定既安反側江郢紛梗復生攜背擁據一郡苟且百心志貌常違言迹不副特以新吳未靜地遠兵彊互相兼并成其形勢收獲器械俘虜士民竝曰私財曾無獻捷時遣一介終持兩端朝廷光大含弘引納崇遇遂乃位等三槐任均四嶽富貴隆赫超絶功臣加以出師逾嶺遠相響援按甲斷江翻然猜拒故司空愍公敦以宗盟情同骨肉城池連接勢猶脣齒彭亡之禍坐觀難作階此舋故結其黨與于時北寇侵軼西賊憑陵屝屨糇糧悉以資寇爵號軍容一遵僞黨及王師凱振大定區中天網恢弘棄之度外璽書綸誥撫慰綢繆冠蓋搢紳敦授重疊至于熊曇朗勦滅豐城克定蓋由儀同法氍之元功安西周敷之效力司勳有典懋賞斯舊惡直醜正自為仇讎悖禮姦謀因此滋甚徵出湓城歷年不就求遣侍子纍載未朝外誘逋亡招集不逞中調京輦規冀非常擅斂征賦罕歸九府擁遏二賈害及四民潛結賊異共為表裏同惡相求密加應援謂我六軍薄伐三越未寧屠破述城虜縛妻息分襲湓鎮稱兵蠡邦拘逼酋豪攻圍城邑幸國有備應時衄殄假節通直散騎常侍仁武將軍尋陽太守懷仁縣伯華皎明威將軍廬陵太守益陽縣子陸子隆竝破賊徒剋全郡境持節散騎常侍安西將軍定州刺史領豫章太守西豐縣侯周敷躬扞溝壘身當矢石率茲義勇以寡摧衆斬馘萬計俘虜干群迪方收餘燼還固墉堞使持節安南將軍開府儀同三司高州刺史新建縣侯法氍雄績早宣忠誠夙著未奉王命前率義旅既援敷等又全子隆裹糧擐甲仍躡飛走批熊之旅驅馳越電振武之衆叱咤移山以此追奔理無遺類雖復朽株將拔非待尋斧落葉就殞無勞烈風但去草絶根在于未蔓撲火止燎貴乎速滅分命將帥實資英果今遣鎮南儀同司馬湘東公相劉廣德兼平西司馬孫曉北新蔡太守魯廣達持節安南將軍吳州刺史彭澤縣侯魯悉達甲士萬人步出興口又遣前吳興太守胡櫟樹功將軍前宣城太守錢法成天門義陽二郡太守樊毅雲麾將軍合州刺史南固縣侯焦僧度嚴武將軍建州刺史辰縣子張智達持節都督江吳二州諸軍事安南將軍江州刺史安吳縣侯吳明徹樓艦馬步直指臨川前安成內史劉士京巴山太守蔡僧貴南康內史劉峰廬陵太守陸子隆安成內史闕慎竝受儀同法氍節度同會故郡又命尋陽太守華皎光烈將軍巴州刺史潘純陀平西將軍郢州刺史欣樂縣侯章昭達竝率貔豹徑造賊城使持節散騎常侍鎮南將軍開府儀同三司湘州刺史湘東郡公度分遣偏裨相繼上道戈船蔽水彀騎彌山又詔鎮南將軍開府儀同三司歐陽頠率其子弟交州刺史盛新除太子右率邃衡州刺史侯曉等以徑越之兵踰嶺北邁千里同期百道俱集如脫稽誅更淹旬晦司空大都督安都已平賊異凱歸非久飲至禮畢乘勝長驅勦撲凶醜如燎毛髮已有明詔罪惟迪身黎民何辜一皆原宥其有因機立功賞如別格執迷不改刑茲罔赦陳書周迪傳天嘉三年春使江州刺史吳明徹都督衆軍與高州刺史黃法氍豫章太守周敷討迪于是尚書下符下符討陳寶應告晉安士庶昔隴西旅拒漢不稽誅遼東叛渙魏申宏略若夫無諸漢之策勳有扈夏之同姓至于納吳濞之子致橫海之師違姒啓之命有甘誓之討況乃族不繫于宗盟名無紀于庸器而顯成三叛舋深四罪者乎案閩寇陳寶應父子卉服支孽本迷愛敬梁季喪亂閩隅阻絶父既豪俠扇動蠻陬椎髻箕坐自為渠帥無聞訓義所資姦諂爰肆蜂豺俄而解印炎行方謝網漏吞舟日月居諸棄之度外自東南王氣實表聖基斗牛聚星允符王迹梯山航海雖若款誠擅割瓌珍竟微職貢朝廷遵養含弘寵靈隆赫起家臨郡兼晝繡之榮裂地置州假藩麾之盛即封戶牖仍邑櫟陽乘華轂者十人保斃廬而萬石又以盛漢君臨推恩婁敬隆周朝會乃長滕侯由是紫泥青𥿄遠賁恩澤鄉亭龜組頒及嬰孩自谷遷喬孰復為擬而苞藏鴆毒敢行狼戾連結留異表裏周迪盟歃婚姻自為脣齒屈彊山谷推移歲時及我彀騎防山定秦望之西部戈船下瀨克匯澤之南川遂敢舉斧竝助凶孽莫不應弦摧衄盡殪醜徒每以罪在酋渠憫茲驅逼所收俘馘竝勒矜放仍遣中使爰降詔書天網恢弘猶許改思異既走險迪又逃刑誑侮王人為之川藪遂使袁熙請席遠歎頭行馬援觀蛙猶安井底至如遏絶九賦剽掠四民闔境資財盡室封奪凡厥倉頭皆略黔首蝥賊相扇叶契連蹤乃復踰超瀛溟寇擾浹口侵軼嶺嶠掩襲述城縛掠吏民焚燒官寺此而可縱孰不可容今遣沙州刺史俞文冏明威將軍程文季假節宣猛將軍成州刺史甘他假節雲旗將軍談瑱假節宣猛將軍前監臨海郡陳思慶前軍將軍徐智遠明毅將軍宜黃縣開國侯慧紀開遠將軍新除晉安太守趙彖持節通直散騎常侍壯武將軍定州刺史康樂縣開國侯林馮假節信威將軍都督東討諸軍事益州刺史余孝頃率羽休二萬蒙衝蓋海乘跨滄波掃蕩巢窟此皆明恥教戰濡須鞠旅纍從楊僕亟走孫恩斬蛟中流命馮夷而鳴鼓黿鼉為駕𨏼方壺而建旗義安太守張紹賓忠誠款到纍使求軍南康內史裴忌新除輕車將軍劉峰東衡州刺史錢道戢竝即遣人仗與紹賓同行故司空歐陽公昔有表奏請宣薄伐遙途意合若伏波之論兵長逝遺誠同子顏之勿赦征南薨謝上策無忘周南餘恨嗣子弗忝廣州刺史歐陽紇克符家聲聿遵廣略舟師步卒二萬分趨水扼長鯨陸掣封狶董率衡廣之師會我六軍潼州刺史李䐗明州刺史戴晃新州刺史區白獸壯武將軍修行師陳留太守張遂前安成內史闕慎前廬陵大守陸子隆前豫章太守任蠻奴巴山太守黃法慈戎昭將軍湘東公世子徐敬成吳州刺史魯廣達前吳州刺史遂興縣開國侯詳使持節都督征討諸軍事散騎常侍護軍將軍昭達率緹綺五千組甲二萬直渡邵武仍頓晉安案轡揚旌夷山堙谷指期掎角以制飛走前宣威太守錢肅臨川太守駱牙太子左衛率孫詡尋陽太守莫景隆豫章太守劉廣德竝隨機鎮遏絡驛在路使持節散騎常侍鎮南將軍開府儀同三司江州刺史新建縣開國侯法氍戒嚴中流以為後殿斧鉞所臨罪惟元惡及留異父子其黨主帥雖有請泥函谷相背淮陰若能翻然改圖因機立效非止肆眚仍加賞擢其建晉士民久被驅迫者大軍明加撫慰各安樂業流寓失鄉即還本土其餘立功立事已具賞格若執迷不改同惡趑趄斧鉞一臨罔知所赦陳書陳寶應傳天嘉四年命章昭達都督衆軍由建安南道度嶺以討寶應并詔宗正絶其屬籍于是尚書下符琴賦龍門琦樹上籠雲霧根帶千仞之溪葉泫三危之露忽紛糅而交下終摧殘而莫顧逢蔡子之見矜識奇響于餘煙飛青雀兮歌綺殿引黃鶴兮慘離筵吟高松兮落春葉斷輕絲兮改夏絃歡曲舉而情踊躍引調奏而涕流漣亦有辭鄉去國對此悲年初學記十六列上測獄款不款人數別制已後有壽羽兒一人坐殺壽慧劉磊渴等八人坐偷馬仗家口渡北依法測之限訖不款劉道朔坐犯七次偷依法測立首尾二日而款陳法滿坐被使封藏阿法受錢未及上而款陳書沈洙傳梁代舊律測囚日一上起晡鼓盡二更及比部郎范泉刪定律令以舊法測立時久非人所堪分其刻數日再上廷尉以新制過輕請集會尚書省詳議周弘正曰未知獄所測人有幾人款幾人不款須前責取人名及數并其罪目然後更集得廷尉監沈仲由列稱測獄刻數議比部范泉新制尚書周弘正明議咸允虞書惟輕之旨殷頌敷正之言竊尋廷尉監沈仲由等列新制以後凡有獄十一人其所測者十人款者唯一愚謂染罪之囚獄官宜明加辨析窮考事理若罪有可疑自宜啓審分判幸無濫測若罪有實驗乃可啓審測立此則枉直有分刑宥斯理范泉今牒述漢律云死罪及除名罪證明白考掠已至而抵隱不服者處當列上杜預注云處當證驗明白之狀列其抵隱之意竊尋舊制深峻百中不款者一新制寬優十中不款者九參會兩文寬猛實異處當列上禾見釐革愚謂宜付典法更詳處當列上之文陳書沈洙傳舍人盛權議奏劾南康王方泰臣聞王者之心匪漏網而私物至治之本無屈法而由慈謹案南康王陳方泰宗屬雖遠幸託葭莩刺舉莫成共治罕績聖上弘以悔往許其録用宮闈寄切宿衛是尸豈有金門旦啓玉輿曉蹕百司馳騖千隊騰驤憚此翼從之勞妄興晨昏之請翻以危冠淇上袨服桑中臣子之愆莫斯為大宜從霜𥳑允置冬官臣等參議請依見事解方泰所居官下宗正削爵土謹以白𥳑奏聞陳書南康王曇朗附傳奏劾武陵王伯禮臣聞車屨不俟君命之通規夙夜匪懈臣子之恆節謹案雲旗將軍持節都督吳興諸軍事吳興太守武陵王伯禮夙擅英猷久馳令問惟良寄重枌鄉是屬聖上愛育黔黎留情政本共化求瘼早赴皇心遂復稽緩歸驂取移涼懊遲回去鷁空淹載路淑慎未彰違惰斯在繩愆檢迹以為懲戒臣等參議以見事免伯禮所居官以王還第謹以白𥳑奏聞陳書武陵王伯禮傳太建初為吳興太守十一年春被代徵還遷延不發其年十月散騎常侍御史中丞徐君敷奏云云詔贈沙門竺法頵沙門竺法頵遠還西山作詩以贈因亦嘲之省其二經聊為之讚道樹經讚峨峨王舍國鬱鬱靈竹園中有神化長空觀體善權私呵晞光景豈識真跡端恢恢道明元解發至神歡飄忽淩虛起無云受慧難三昧經讚迹超十二燒戒由三昧成賢行極妙住道志慧以明九本既殊動四禪不同冥淵哉不起滅始自無從生借問道氣倫安測泥沍靈廣宏明集四十代答張君祖詩序省贈法頵詩經通妙遠亹亹清綺雖言不盡意殆亦幾矣夫詩者志之所之意迹之所寄也忘妙元解神無不畼夫未能冥達元通者惡得不有仰鑽之詠哉吾想茂德之形容雖栖守殊塗標寄元同仰代答之未足盡美亦各言其志也廣宏明集四十法性自然論寓茲先生喟然歎曰夫萬法萬性皆自然之理也夫唯自然故不得而遷貿矣故善人雖知善之不足憑也善人終不能一時而為惡惡人復以惡之不足誡也惡人亦不能須臾而為善又體仁者不自知其為善體愚者不自覺其為惡皆自然而然也座右之賓假氏大夫忽然作色而謂曰固哉先生之說也違大道而謬聖人之言先生曰大道誰主聖人何言大夫曰大道無主而無所不主聖人無言而無所不言先生曰請言其所言言性命之所由致乎請說其所主主善惡之報應乎大夫曰何為其不然也蓋天地扶大道之功以載育聖人合天地之德以設教序仁義五德以檢其心說詩書六藝以訓其業此聖人之言也若積善之家必有餘慶積不善之家必有餘殃故曰聖人無親常與善人六極序而隆行懲五福陳而善心勸三世為將覩覆敗之權七葉修善有興隆之性陳賞寵而不侯邴昌疏而紹國斯道家之效也何先生言皆自然之理而不可遷貿者哉先王笑而應曰世所謂捋繩之人繩盡而不知遷若大夫之徒是也敬課管陋為吾子陳之蓋二儀著而六子施百姓育而五材用此句者隔萬法而盡然焉人為生最靈膺自然之秀氣稟妍媸盈減之質懷哀樂喜怒之情挺窮達修短之命封愚智善惡之性夫哀樂喜怒伏之于情感物而動窮達修短藏之于命事至而後明妍媸盈減著之于形有生而表見愚知善惡封之于性觸用而顯徹此八句者總人事而竭焉皆由自然之數無有造為之者夫有造為之者必勞有出入之者必漏有酬酢之者必謬此三者非造物之功也故墨子曰使造三年成一葉天下之葉少哉蓋聖人設權巧以成教借事似以勸威見強勇之暴寡怯也懼刑戮之弗禁乃陳禍淫之威傷敦善之不勸也知性命之不可易序福善以獎之故聽其言也似若不爽徵其事也萬不一驗子以本枝繁植斯履道之所致蒸嘗莫主由遺行之所招身居逸樂為善士之明報體事窮苦是惡人之顯戮孫叔少不埋蛇長無令尹之貴邴吉前無陰德終闕丞相之尊若然則天道以重華文命答鯀叟之極愚以商均丹朱酬堯舜之至聖大伯三世無玩兵之咎而假嗣于仲虞漢祖七葉不聞篤善之行遂造配天之業箕稱享用五福身抱夷滅之痛孔云慶鍾積善躬事旅人之悲顏冠七十之上有不秀之咨冉在四科之初致斯人之歎而商臣纍王荊南冒頓世居塞北首山無解顏之鬼汩水有抱怨之魂康成以姓改鄉不濟小聖之禍王褒哀變隴木適受非妄之災二生居衛覆舟之痛誰罪三仁在亳剖心之酷何辜若乃側近邦畿密近世代非墳籍所載在耳目之前者至有腹藏孟門之險心庫豺虺之毒役慮唯以害他為念行已必用利我為先錐刀推其尖鋭溪壑訝其難滿內則百兩外縈千鍾內實優偃綺羅坐列甘膩鳴金綰玉富逸終身自有懷白璧而為襟瑩明珠而成性心不能行啓蟄之殺手不忍折方長之條懷殊材而莫采蓄美志而誰眄偏糅于冗雜之中見底于鄉閭之末抱飢寒而溘死與麋鹿而共埋享嘗寂漠孀孩無寄名字不聞湮沈電滅如斯可恨豈一人哉是知桀跖之凶殘無懼來禍之將及閔曾之篤行勿擬後慶之當臻故鶡冠子曰夫命者自然者也賢者未必得之不肖者未必失之斯之謂矣大夫曰若子引百家之言則列子之為名者必廉廉斯貧為名者必讓讓斯賤若然者則貧賤者立名之士所營而至也則富貴者貪競之徒所求而得也何名自然之數哉先生曰此乃一隅之說非周于理者也夫富貴自有貪競富貴非貪競所能得貧賤自有廉讓貧賤非廉讓所欲邀自有富貴而非貪求貧賤而不廉讓且子罕言命道藉人宏故性命之理先聖之所憚說善惡報應天道有常而關哉譬如溫風轉華寒飆揚雪有委溲糞之下有纍玉階之上風飆無心于厚薄而華霰有穢淨之殊途天道無心干愛僧而性命有窮通之異術子聞于公待封而封至嚴母望喪而喪及若見善人便言其後必昌若遇惡人便言其後必亡此猶終身守株而冀狡兔之更獲耳大夫于是斂容而謝曰若僕者所執偏迷而昧通途守狹近而失遐曠今承德音煥然蒙啓譬猶疏蜀伏尸歷萬古而忽悟中山沈醉未千朝而遽醒請事斯語以銘諸紳或問曰朱子託憑虛之談畼方寸之底論情指事深有趣焉但詳之先典有所未達夫人哀樂喜怒之情包善惡之性資待之方不足于是爭奪之事斯興才識均者不能相御天生仁聖實使司牧樂者聖人之所作禮者先王之所制三千之儀以檢其迹五音之和以導其心設爵以勸善縣刑以懲惡纖毫不漏酬酢如響玉帛云乎非無為所薦鼓鐘斯合豈自然而諧千科滿目靡非力用所構百貫參差悉由智思而造吾子湯武之臣隸周孔之學徒出入戶牖伏膺名教而云善人知善之不足憑也惡人知惡之不足誡也善不能招慶禍不能報惡是何背理之談也且翩翱蠕動猶知去就況人為最靈而同一自然之物此豈高厚之詩何取譬之非類情所未達敬待清酬答曰若盧敖北遭若士自傷足跡之未曠河宗東窺溟海方歎秋水之不多吾子習近成性未易可與談遠大者也今子以屈伸俯仰心慮所為雕鏤剪琢身手所作禮樂者聖人之所作聖人者天地之所生請為吾子近取諸身則可以遠通諸物子以耳聞眼見足蹈手握意謂孰使之然身有疴疾冷熱皆不自知哀樂喜怒興廢安在何地有識者自知識之所在者乎有智者自知智之所存者乎若識遍身中傷則識裂智若隨事起事謝則智滅果識不知識智不知智于是推近以達遠觸類而長之故知禮樂不自知其所由而製聖人不自知其所由而生兩像亦不知所由而立矣于是殊形異慮委積充盈靜動合散自生自滅動靜者莫有識其主生滅者不自曉其根蓋自然之理著矣所謂非自然者乃大自然也是有為者乃大無為也子云天生聖人是使司牧何故唐虞疊聖加以五臣文武重光益以十亂豈天道之不能一其終始將末代貽咎于天地大舜大堯非欲生不肖之子龍逢比干豈樂身就誅割孔子歷聘棲遑卒云執鞭不憚顏稱回何敢死終使慈父請車彼三聖三仁可謂妙取捨矣天能令東海亢旱不如理孝婦之怨地能使高城復塹未若救杞梁之殞故榮落死生自然定分若聖與仁不能自免深味鄙句理存顯然廣宏明集二十五奏流拘那羅陀嶺表所譯衆部多明無塵唯識言乖治術有蔽國風不隸諸華可流荒服續高僧傳一拘那羅陀華言親依或云波羅末陀譯云真諦本西天竺優禪尼國人
