body:
  text: 武帝受禪大赦詔五德更運帝王所以御天三正相因夏殷所以宰世雖色分辭翰時異文質揖讓征伐迄用參差而育德振民義歸一揆朕以寡昧時屬艱危國步屢屯天維三絶肆勤先后拯厥橫流藉將帥之功兼猛士之力一匡天下再造黔黎梁氏以天祿永終曆數攸在遵與能之典集大命于朕躬顧惟菲德辭不獲亮式從天眷俯協民心受終文祖升禋上帝繼迹百玉君臨萬宇若涉川水罔知攸濟寶業初建皇祚維新思俾惠澤覃被億兆可大赦天下改梁太平二年為永定元年賜民爵二級文武二等鰥寡孤獨不能自存者人穀五斛逋租宿債皆勿復收其有犯鄉里清議贓污淫盜者皆洗除先注與之更始長徒敕繫特皆原之亡官失爵禁錮奪勞一依舊典陳書武帝紀下以梁主為江陰王詔禮陳杞宋詩詠二客弗臣之重歷代斯敦梁氏欽若人祇憲章在昔濟河沈璧高謝萬邦茅賦所加宜遵舊典其以江陰郡奉梁主為江陰王行梁正朔車旗服色一依前準宮館資待務盡優隆陳書武帝紀下刪改科令詔朕聞唐虞道盛設畫象而不犯夏商德衰雖孥戮其末備洎乎末代綱目滋繁矧屬亂離憲章遺紊朕始膺寶曆思廣政樞外可搜舉良才刪改科令群僚博議務存平簡隋書刑法志追贈兄道談驃騎大將軍太尉封始興郡王詔天倫所感義本因心名器追崇則惟恆典亡兄梁故南兗州刺史長城縣公德範沈邃風度寬厚性與天通深乎靡測昔彈冠入仕譽重城華宣力艱難遂顧洪業雖時非季漢勢異桓王海內挹其風流生民懷其大德者矣朕受天明命爰膺寶曆言尋永往興慕增懷可奉贈太尉公藝文類聚四十六沈炯太尉始興昭烈王碑永定元年下詔贈周鐵虎詔天地之寶所貴曰生形魄之徒所重唯命至如捐生立節效命酬恩追遠懷昔信宜加等散騎常侍嚴威將軍太子左衛率潼州刺史領信義太守沌陽縣開國侯鐵虎器局沈厚風力勇壯北討南征竭忠盡力摧鋒江夏致陷凶徒神氣彌雄肆言無撓豈直溫序見害方其理鬚龐德臨危猶能瞋目忠貞如此惻愴兼深可贈侍中護軍將軍青冀二州刺史加封一千戶并給鼓吹一部侯如故陳書周鐵虎傳封兄子蒨為臨川王詔東都齊國義乃親賢西漢城陽事兼功烈散騎常侍使持節都督會稽等十郡諸軍事宣毅將軍會稽太守長城縣侯學尚清優神寓凝正文參禮樂武定祅氛心力謀猷為家治國擁旄作守期月有成辟彼關河功踰蕭寇萑蒲之盜自反耕農篁竹之豪用稟聲朔朕以虛寡屬當興運提彼三尺賓于四門王業艱難賴乎此子宜隆上爵稱是元功可封臨川郡王邑二千戶兄子梁中書侍郎頊襲封始興王弟子梁中書侍郎曇朗襲封南康王禮秩一同正王陳書武帝紀下封從子陳擬等詔維城宗子實固有周盤石懿親用隆大漢故會盟則異姓為後啓土則非劉勿王所以糾合枝幹廣樹蕃屏前王懋典列代恆規從子持節員外散騎常侍明威將軍雍州刺史監南徐州擬持節通直散騎侍郎貞威將軍北徐州刺史褒從子晃炅從孫假節員外散騎常侍明威將軍訬假節信威將軍北徐州刺史吉陽縣開國侯喧假節通直散騎侍郎信武將軍祏假節散騎侍郎雄信將軍青州刺史廣梁太守詳貞威將軍通直散騎侍郎慧紀從孫敬雅敬泰並枝戚密近劬勞王室宜列河山以光利建擬可承修縣開國侯褒鍾陵縣開國侯晃建城縣開國侯炅上饒縣開國侯訬虔化縣開國侯喧仍前封祏豫章縣開國侯詳遂興縣開國侯慧紀宜黃縣開國侯敬雅寧都縣開國侯敬泰平固縣開國侯各邑百戶陳書陳擬傳改官制詔夫設官分職因事重輕羽儀車馬隨時隆替晉之五校鳴笳啓途漢之九卿傳呼並列虞官夏禮豈曰同科殷朴周文固無恆格朕膺茲寶曆代是天工留念官方庶允時衷梁天監中左右驍騎領朱衣直閣並給儀從北徐州刺史唱義之初首為此職亂離歲久朝典不存後生年少希聞舊則今去左右驍騎宜通文武文官則用腹心武官則用功臣所給儀從同太子二衛率此外衆官尚書詳為條制陳書武帝紀下親祠南赦詔朕受命君臨初移星琯孟陬嘉月備禮泰壇景候昭華人祇允慶思令億兆咸與惟新且往代祅氛于今猶梗軍機未息徵賦咸繁事不獲已久知下斃言念黔黎無忘寢食夫罪無輕重巳發覺未發覺在今昧爽以前皆赦除之西寇自王琳以下並許返迷一無所問近所募義軍本擬西寇並宜解遣留家附業挽訂軍資未送者並停元年軍糧逋餘者原其半州郡縣軍戍並不得輒遣使民間務存優養若有侵擾嚴為法制陳書武帝紀下原沈泰部曲妻兒詔罰不及嗣自古通典罪疑惟輕布在方策沈泰反覆無行遐邇所知昔有微功仍荷朝寄剖符名郡推轂纍藩漢口班師還居方嶽良田有逾于四百食客不止于三千富貴顯榮政當如此鬼害其盈天奪之魄無故猖狂自投獯醜雖復知人則哲惟帝其難光武有蔽于龐萌魏武不知于于禁但令朝廷無我負人其部曲妻兒各令復業所在及軍人若有恐脅侵掠者皆以劫論若有男女口為人所藏並許詣臺申訴若樂隨臨川王及節將立效者悉皆聽許陳書武帝紀下擢用舊員詔梁時舊仕亂離播越始還朝廷多未銓序又起兵已來軍勳甚衆選曹即條文武簿及節將應九流者量其所擬陳書武帝紀下南康始興二王諸主宜隆禮數詔南康始興王諸妹已有封爵依禮止是藩主此二王者有殊恆情宜隆禮數諸主儀秩及尚主可並同皇女陳書武帝紀下分恤東陽詔開廩賑絶育民之大惠巡方恤患前王之令典朕當斯季俗膺此樂推君德未孚民瘼猶甚重茲多壘彌疚納隍良由四聰弗達千里勿應博施之仁何其或爽殘斃之軌致此未康吳州縉州去歲蝗旱郢田雖咒鄭渠終涸室靡盈積之望家有填壑之嗟百姓不足兆民何賴近己遣中書舍人江德藻銜命東陽與令長二千石問民疾苦仍以入臺倉見米分恤雖德非既飽庶微慰阻飢陳書武帝紀下定救日儀詔此乃前代承用意有未同合朔仰助太陽宜備袞冕之服自今以去永可為準陳書武帝紀下五月景辰朔日有食之有司奏舊儀御前殿服朱紗袍通天冠詔云云又見南史九討熊曇朗詔曇朗噬逆罪不容誅分命衆軍仍事掩討方加梟磔以明刑憲陳書武帝紀下遺虞荔書喪亂已來賢哲凋散君才用有美聲聞許洛當今朝廷惟新廣求英雋豈可棲遲東土獨善其身今令兄子將接出都想必副朝廷虛遲也陳書虞荔傳下璽書敕州郡夫四正革代商周所以應天五勝相推軒羲所以當運梁德不造喪亂積年東夏崩騰西都蕩覆蕭勃干紀非唯趙倫侯景滔天踰于劉載貞陽反篡賊約連兵江左纍屬于鮮卑金陵久非于梁國有自氤氳混沌之世龍圖鳳紀之前東漢興平之初西朝永嘉之亂天下分崩未有若于梁朝者也朕以虛薄屬當興運自昔登庸首清諸越徐門浪泊靡不征行浮海乘山所在戡定冒訴風塵騁馳師旅六延梁祀十翦強寇豈曰人謀皆由天啓梁氏以天祿斯改期運永終欽若唐虞推其鼎玉朕東西退讓拜手陳辭避舜子于箕山之陽求支伯于滄洲之野而公卿敦逼率土翹惶天命難稽遂享嘉祚今月乙亥升禮太壇言念遷桐但有慚德自梁氏將末頻月亢陽火運斯終秋霖奄降翌日成禮圓丘宿設埃雲晚霽星象夜張朝景重輪泫三危之膏露晨光合璧帶五色之卿雲顧惟寡薄彌慚休祉昧旦丕顯方思至治卿等擁旄方嶽相任股肱剖符名宇方寄恤隱王曆惟新念有欣慶想深求民瘼務在廉平愛惠以撫孤貧威刑以禦強猾若有萑蒲之盜或犯戎商山谷之酋擅強幽險皆從肆赦咸使知聞如或迷途俾在無貸今遣使人具宣往旨念思善政副此虛懷陳書武帝紀下即位告天文皇帝臣霸先敢用玄牡昭告于皇皇后帝梁氏以圮剝薦臻曆運有極欽若天應以命于霸先夫肇有蒸民乃樹司牧選賢與能未常厥姓放勳重華之世咸無意于受終當塗典午之君雖有心于揖讓皆以英才處萬乘高勳御四海故能大庇黔首光宅區縣有梁末運仍葉遘屯獯醜憑陵久移神器承聖在外非能祀夏天未悔禍復罹寇逆嫡嗣廢黜宗枝僭詐天地蕩覆紀綱泯絶霸先爰初投袂大拯橫流重舉義兵實戡多難廢王立帝實有厥功安國定社用盡其力是謂小康方期大道既而煙雲表色日月呈瑞緯聚東井龍見譙邦除舊布新既彰玄象遷虞事夏且協謳訟九域八荒同布衷款百神群祀皆有誠願梁帝高謝萬邦授以大寶霸先自惟菲薄讓德不嗣至于再三辭弗獲許僉以百姓須主萬機難曠皇靈眷命非可謙拒畏天之威用膺嘉祚永言夙志能無慚德敬簡元辰升壇受禪告類上帝用答民心永保于我有陳惟明靈是饗陳書武帝紀下南史九
