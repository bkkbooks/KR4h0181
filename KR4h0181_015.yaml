body:
  text: 許亨奏南郊不宜祭五祀昔梁武帝云天數五地數五五行之氣天地俱有故南北郊內竝祭五祀臣案周禮以血祭社稷五祀鄭玄云陰祀自血起貴氣臭也五祀五官之神也五神主五行隸于地故與埋沈疈辜同為陰祀既非煙柴無關陽祭故何休云周爵五等者法地有五行也五神位在北郊圓丘不宜重設隋書禮儀志一天嘉中南郊太中大夫領大著作攝太常卿許亨奏制曰可又見通典四十二奏南郊宜除風伯雨師星位梁武帝議箕畢自是二十八宿之名風師雨師自是箕畢下隸非即星也故郊雩之所皆兩祭之臣案周禮大宗伯之職云槱燎祀司中司命風師雨師鄭眾云風師箕也雨師畢也詩云月離于畢俾滂沱矣如此則風伯雨師即箕畢星矣而今南郊祀箕畢二星復祭風伯雨師恐乖祀典隋書禮儀志一亨又奏制曰若郊設星位任即除之又見通典四十二奏郊祀宜三獻梁儀注曰一獻為質三獻為文事天之事故不三獻臣案周禮司樽彝所言三獻施于宗祧而鄭注一獻施于群小祀今用小祀之禮施于天神大帝梁武此義為不通矣且樽俎之物依于質文拜獻之禮主于虔敬今請凡郊丘祀事準于宗祧三獻為允隋書禮儀志一亨又奏制曰依議又見通典四十二與沈炯書虎丘山者吳岳之神秀者也雖復峻極異于九天隱磷殊于太一衿帶城傍獨超眾嶺控繞川澤頤絕群岑若其峰崖刻削窮造化之瑰詭絕㵎杳冥若鬼神之髣髴珍木靈草茂瓊枝與碧葉飛禽走獸必負義而膺仁是以歷代高賢輕舉棲託梵臺雲起寶剎星懸自非玉牒開祥金精蘊耀豈其神怪若此者乎蓺文類聚八請墾植沙漲表乙亥歲八月丹徒蘭陵二縣界遺山側一旦因濤水涌生沙漲周旋千餘頃竝膏腴堪墾植陳書武帝紀永定二年大行俠御服議雖不悉準案山陵有凶吉羽儀成服唯凶無吉文武俠御不容獨鳴玉珥貂情禮二三理宜縗斬陳書劉師知傳高祖崩六日成服朝臣共議大行皇帝靈座俠御人所服衣服吉凶之制博士沈文阿議宜服吉服劉師知議須服縗絰中書舍人蔡景歷亦云又議俠御之官本出五百爾日備服居廬仍于本省引上登殿豈應變服貂玉若別攝餘官以充簪珥則爾日便有不成服者山陵自有吉凶二儀成服凶而不吉同上荅陳征北書蒙降札書曲垂引逮伏覽循回載深欣畼竊以世求名駿行地能致千里時愛奇寶照車遂有徑寸但雲咸斯奏自輟巴渝杞梓方雕豈盼樗櫪仰惟明將軍使君侯節下英才挺茂雄姿秀拔運屬時艱志匡多難振衡岳而綏五嶺滌灨源而澄九派帶甲十萬彊弩數千誓勤王之師總義夫之力鯨鯢式翦役不踰時氛霧廓清士無血刃雖漢誅祿產舉朝實賴絳侯晉討約峻中外一資陶牧比事論功彼奚足算加以抗威兗服冠蓋通于北門整旆徐方詠歌溢于東道能使邊亭臥鼓行旅露宿巷不拾遺市無異價洋洋乎功德政化曠古未儔諒非膚淺所能殫述是以天下之人向風慕義接踵披衿雜遝而至矣或帝室英賢貴遊令望齊楚秀異荊吳岐嶷武夫則猛氣紛紜雄心四據陸拔山岳水斷虯龍六鈞之弓左右馳射萬人之劍短兵交接攻壘若文鴦焚艦如黃蓋百戰百勝貔貅為群文人則通儒博識英才偉器雕麗暉煥摛掞絢藻子雲不能抗其筆元瑜無以高其記尺翰馳而聊城下清談奮而嬴軍卻復有三河辯客改哀樂于須臾六奇謀士斷髮反于倏忽治民如子賤踐境有成折獄如仲由片辭從理直言如毛遂能厲主威銜使若相如不辱君命懷忠抱義感恩徇己誠斷黃金精貫白日海內雄賢牢籠斯備明將軍徹鞍下馬推案止食申爵以榮之築館以安之輕財重氣卑躬厚士盛矣哉盛矣哉抑又聞之戰國將相咸推引賓遊中代岳牧竝盛延僚友濟濟多士所以成將軍之貴但量能校實稱才任使員行方止各盡其宜受委責成誰不畢力至如走賤妄庸人耳秋冬讀書終慚專學刀筆為吏竟闕異等衡門衰素無所聞達薄官輕資焉能遠大自陽九遘屯天步艱阻同彼貴仕溺于巨寇亟鄰危殆備踐薄冰今王道中興慇憂啟運獲存微命足為幸甚方歡飲啄是謂來蘇然皇鑾未反宛洛蕪曠四壁固三軍之餘長夏無半菽之產遨遊故人聊為借貸屬此樂土洵美忘歸竊服高義暫謁門下明將軍降以顏色二三士友假其餘論菅蒯不棄折𥳑賜留欲以雞鶩廁鴛鴻于池沼將移瓦礫參金碧之聲價昔折脅遊秦忽逢盼采檐簦入趙便致留連今雖羈旅方之非匹樊林之賁何用克堪但眇眇纖蘿憑喬松以自聳蠢蠢輕蚋託驂尾而遠騖竊不自涯願備下走且為腹背之毛脫充鳴吠之數增榮改觀為幸已多海不厭深山不讓高敢布心腹惟將軍覽焉陳書蔡景歷傳與釋智顗書絫年仰系不易可言承今夏在石像前行道欣羨無極又聞欲于天台營道場當在夏竟耳學徒遠近歸依者理應轉多安心林野法喜自娛禪講不輟耳四十二字門令附雖留多時讀竟不解無因諮訪為恨轉積南嶽亦時有信照禪師在嶽嶺徒眾不異大師在時善公于山講釋論彼於邑遟望還綱維大法不者歸鍾嶺攝山亦是棲心之處何必適遠方詣道場希勿忘京師邊地之人豈知迴向傾心無時不積未因接顏色東望欷滿敬德信人今返白書不具弟子毛喜和南又書弟子諸弟及兒等悉蒙平安第三任鄱陽郡第二為豫章王司馬第四大延卿第五入閣任度支郎大兒由在東宮為中書舍人仰蒙垂顧以大善知識大同學輒復遠諮釋藏起字二號國清百錄二秋色尚熱道體何如禪禮無乃損德弟子老病相仍湯藥無效兼不得自閑轉有困爾仰承移往佛隴永恐不復接顏色悲慨但深仰惟本以曠濟為業獨守空巖更恐違菩薩普被之旨近與徐丹陽諸善知識共詳量等是一山鍾嶺天台亦何分別必希善加三思不滯于彼我京師彌可言師一二因拔師口具其閒願敬道德弟子毛喜和南同上適奉南嶽信山眾平安弟子有荅具述甲乙後信來當有音外也今奉寄牋香二片熏陸香二斤檳榔三百子不能得多示表心責也弟子毛喜和南同上又書慶講今者仰餐敷說訓往綽然道俗嗟味般若照明豈是拙辭所能稱述弟子毛喜和南同上奏劾陳裒臣聞建旟求瘼實寄廉平褰帷恤隱本資仁恕如或貪汙是肆徵賦無厭天網雖疏茲焉弗漏謹案鍾陵縣開國侯合州刺史臣裒因藉多幸預逢抽擢爵由恩被官以私加無德無功坐尸榮貴譙肥之地久淪非所皇威剋復物仰仁風新邦用輕彌俟寬惠應斯作牧其寄尤重爰降曲恩祖行宣室親承規誨事等言提雖廉潔之懷誠無素蓄而稟茲嚴訓可以厲精遂乃擅行賦斂專肆貪取求粟不厭愧王忱之出賬徵魚無限異羊續之懸枯寘以嚴科實惟明憲臣等參議請依旨免裒所應復除官其應禁錮及後選左降本資悉依免官之法陳書宗元饒傳奏劾蔡景歷臣聞士之行已忠以事上廉以持身苟違斯道刑茲罔赦謹案宣遠將軍豫章內史新豐縣開國侯景歷因藉多幸豫奉興王皇運權輿頗參締構天嘉之世贓賄狼藉聖恩錄用許以更鳴裂壤崇階不遠斯復不能改節自勵以報曲成遂乃專擅貪汙彰于遠近一則已甚其可再乎宜寘刑書以明秋憲臣等參議以見事免景歷所居官下鴻臚削爵土謹奉白𥳑以聞陳書蔡景歷傳測獄刻數議竊尋沈議非頓異范正是欲使四時均其刻數兼斟酌其佳以會優劇陳書沈洙傳梁代舊律測囚日一上起晡鼓盡二更范泉定律分其刻數日再上沈洙議用晝漏朝夕上測各十七刻眾議以為宜依范泉前制高宗曰沈長史議得中宜更博議左丞宗元饒議春宮輔弼未極時選疏臣梁世薄宦祿不代耕季年板蕩竄身窮谷幸屬聖期得奉昌運朝廷以臣微涉蓺學遠垂徵引擢臣以貴仕資臣以厚秩二宮恩遇有異凡流木石知感犬馬識養臣獨何人罔懷報德伏惟皇太子天下之本養善春宮臣陪侍經籍于今五載如愚所見多有曠官輔弼丞疑未極時選至如文宗學府廉絜正人當趨奉龍樓晨游夕論恆聞前聖格言往賢政道如此則非僻之語無從而入臣年事侵迫非有邀求政是懷此不言則為有負明聖敢奏狂瞽願留中不泄南史七十一大行俠御服議既稱成服本備喪禮靈筵服物皆悉縞素今雖無大行俠御官事案梁昭明太子薨成服俠侍之官悉著縗斬唯著鎧不異此即可擬愚謂六日成服俠靈座須服縗絰陳書劉師知傳高祖崩六日成服朝臣共議大行皇帝靈座俠御人所服衣服吉凶之制博士沈文阿議宜服吉服師知議又議左丞引梓宮祔山陵靈筵祔宗廟必有吉凶二部成服不容上凶博士猶執前斷終是山陵之禮若龍駕啟殯鑾輿兼設吉凶之儀由來本備準之成服愚有未安夫喪禮之制自天子達案王文憲喪服明記云官品第三侍靈人二十官品第四下達士禮侍靈之數竝有十人皆白布絝褶著白絹帽內喪女侍數如外而著齊縗或問內外侍靈是同何忽縗服有異荅云若依君臣之禮則外侍斬內侍齊頃世多故禮隨事省諸侯以下臣吏蓋微至于侍奉多出義附君臣之節不全縗冠之費實闕所以因其常服止變帽而已婦人侍者皆是卑隸君妾之道既純服章所以備矣皇朝之典猶自不然以此而推是知服斬彼有侍靈則猶俠御既著白帽理無彤服且梁昭明儀注今則見存二文顯證差為成準且禮出人情可得消息凡人有喪既陳筵几繐帷靈房變其常儀蘆箔草廬即其凶禮堂室之內親賓具來齊斬麻緦差池哭次玄冠不弔莫非素服豈見門生故吏綃縠閒趨左姬右姜紅紫相揉況四海遏密率土之情是同三軍縞素為服之制斯一遂使千門旦啟非塗堊于彤闈百僚戾止變服麤于朱韍而耀金在列鳴玉節行求之懷抱固為未愜準以禮經彌無前事豈可成服之儀譬以山陵之禮葬既始終已畢故有吉凶之儀所謂成服本成喪禮百司外內皆變吉容俠御獨不何謂成服若靈無俠御則已有則必應縗服陳書劉師知傳時以二議不同乃啟取左丞徐陵決斷陵斷同博士議師知又議矯敕出安成王今四方無事王可還東府經理州務陳書世祖沈皇后傳侍中沈府君集序陳亢有云趨庭學詩又聞君子毛萇亦云登高能賦可為大夫言其善觀民風則與圖王政若沈恭子者斯乃當世賢焉至如敦厚之詞足以吟詠情性身之文也貞固之節可以宣被股肱邦之光也然此者君之小道猶曰餘行何則德之所本教之所由實乃孝篤天倫義感殊類有美于斯鬱為高士則余與夫子古所謂世親者歟亦所謂友益者歟疇昔一面朅來二紀自總角而接清塵蒙長者之嘉釂屯險驟更懽娛中阻班超既反盛憲猶存春秋美景朝遊夕宴酒酣得意賦詩聯章顧余不肖齒義懸絕降德亡年交情彌至增榮廣價知己難忘南浦之送未淹北邙之辭仍及于時屬有烽燧方勤帷扆遂使褐裘莫計寶劍無追痛此生芻同茲宿草九原方遠百身寍贖若乃帳懸秋月一雁孤飛花落春風數鶯爭弄伯牙之絃寂寥長絕山陽之管惆悵徒聞夫盛烈清徽便傳乎帝載遺文餘論被在乎民謠者斯所以沒而猶彰死且不朽今乃撰西還所著文章名為後集蓺文類聚五十五請以第六皇弟昌封衡陽王表臣聞宗子維城隆周之懋軌封建藩屏有漢之弘規是以卜世斯永實資邢衛鼎命靈長實賴河楚伏惟陞下神猷光大聖德欽明道高日月德侔造化往者王業惟始天步方艱參奉權謨匡合義烈威略外舉神武內定故以再康禹迹大庇生民者矣及聖武升遐王師遠次皇嗣敻隔繼業靡歸宗祧危殆綴旒非喻既而傳車言反公卿定策纂我洪基光昭景運民心有奉園寢克寍后來其蘇復在茲日物情天意皎然可求王琳逆命逋誅歲久今者連結犬羊乘流縱舋舟旗野陣綿江蔽陸兵疲民獘杼軸用空中外騷然蕃籬罔固乃旰食當朝憑流授律蒼兕既馳長虵自翦廓清四表澄滌八絃雄圖遐舉仁聲遠畼德化所覃風行草偃故以功深于微禹道大于惟堯豈直社稷用寍斯乃黔黎是賴第六皇弟昌近以妙年出質提契寇手偏隔關徼旋踵末由陛下天倫之愛既深克讓之懷常切伏以大德無私至公有在豈得徇匹夫之恆情忘王業之大計憲章故實式遵典禮欽若姬漢建樹賢戚湘中地維形勝控帶川阜扞城之寄匪親勿居宜啟服衡疑兼崇徽飾臣等參議以昌為使持節散騎常侍都督湘州諸軍事驃騎將軍湘州牧封衡陽郡王邑五千戶加給皁輪三望車後部鼓吹一部班劍二十人啟可奉行陳書衡陽獻王昌傳大行俠御服議靈筵祔宗廟梓宮祔山陵實如左丞議但山陵鹵簿備有吉凶從靈輿者儀服無變從梓宮者皆服苴縗爰至士禮悉同此制此自是山陵之儀非關成服今謂梓宮靈扆共在西階稱為成服亦無鹵簿直是爰自胥吏上至王公四海之內必備縗絰案梁昭明太子薨略是成例豈容凡百士庶悉皆服重而侍中至于武衛最是近官反鳴玉紆青與平吉不異左丞既推以山陵事愚意或謂與成服有殊若爾日俠御文武不異維侍靈之人主書宣傳齋幹應敕悉應不改陳書劉師知傳
